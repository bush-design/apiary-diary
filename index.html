<script>
// Lazy-load Supabase and EmailJS only when online — app works fully without them
let _sbLoaded = false, _ejLoaded = false;

function loadScript(src) {
  return new Promise((resolve) => {
    if (!navigator.onLine) { resolve(false); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

async function loadLibraries() {
  if (!navigator.onLine) return;
  if (!_sbLoaded) {
    _sbLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
    if (_sbLoaded) {
      try {
        window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        subscribeRealtime();
        await pullFromSupabase();
        await flushPending();
      } catch(e) { _sbLoaded = false; }
    }
  }
  if (!_ejLoaded) {
    _ejLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if (_ejLoaded) {
      try { emailjs.init(EMAILJS_PUBLIC); } catch(e) { _ejLoaded = false; }
    }
  }
}
</script>

function loadMovements(){try{return JSON.parse(localStorage.getItem('apiary_movements')||'[]');}catch(e){return[];}}

async function addMovement(mov){
  const movements=[...loadMovements(),mov];
  saveMovements(movements);
  await pushToSupabase('hive_movements',movements);
  // Auto-log movement entries into yard site diaries
  const totalOnLoad=(parseInt(mov.alive_hives)||0)+(parseInt(mov.dead_hives)||0);
  const hiveChange = totalOnLoad>0 ? totalOnLoad : mov.hives ? parseInt(mov.hives)||0 : (parseInt(mov.pallets)||0)*4+(mov.half_pallet?2:0)+(parseInt(mov.singles)||0);

  async function logToSite(siteKey, opName, isDeduction){
    if(!siteKey||!opName) return;
    const k = eKey(opName, siteKey, 'spring');
    const existing = STATE.entries[k]||[];
    const lastHives = parseInt(existing[0]?.hives)||0;
    const newHives = isDeduction ? Math.max(0,lastHives-hiveChange) : lastHives+hiveChange;
    let desc;
    const truckStr=(parseInt(mov.pallets)||0)+(mov.half_pallet?'½':'')+'p'+(parseInt(mov.singles)>0?' + '+mov.singles+'s':'');
  const hiveStr=(parseInt(mov.alive_hives)||0)+(parseInt(mov.dead_hives)>0?` alive, ${mov.dead_hives} dead`+' hives':' alive hives');
  const hiveDetail=parseInt(mov.alive_hives)>0?' ('+hiveStr+')':'';
  if(mov.direction==='to_orchard') desc=`MOVEMENT OUT: ${truckStr}${hiveDetail} → ${mov.to_orchard}`;
    else if(mov.direction==='from_orchard') desc=`MOVEMENT IN: ${truckStr}${hiveDetail} ← ${mov.from_orchard}`;
    else if(isDeduction) desc=`MOVED OUT: ${truckStr}${hiveDetail} → ${mov.to_site}`;
    else desc=`MOVED IN: ${truckStr}${hiveDetail} ← ${mov.from_site}`;
    const movEntry = {
      date: mov.date,
      hives: String(newHives),
      comments: desc,
      logged_by: mov.logged_by,
      saved_at: new Date().toISOString(),
      _movement: true
    };
    const updated = {...STATE.entries, [k]: [movEntry, ...existing]};
    saveLocal(updated);
    await pushToSupabase(k, updated[k]);
    STATE.entries = updated;
  }

  if(mov.direction==='to_orchard'){
    await logToSite(mov.from_site, mov.from_op, true);
  } else if(mov.direction==='from_orchard'){
    await logToSite(mov.to_site, mov.to_op, false);
  } else if(mov.direction==='yard_yard'){
    await logToSite(mov.from_site, mov.from_op, true);   // deduct from source
    await logToSite(mov.to_site, mov.to_op, false);      // add to destination
  }
}

function getOrchardTotals(){
  // Returns {orchard: {pallets, singles, hives}} from all movements
  const movements=loadMovements();
  const totals={};
  ORCHARDS.forEach(o=>totals[o]={pallets:0,singles:0,hives:0});
  movements.forEach(m=>{
    const pallets=parseInt(m.pallets)||0;
    const singles=parseInt(m.singles)||0;
    const hives=pallets*4+singles;
    if(m.direction==='to_orchard'){
      const o=m.to_orchard;
      if(!totals[o])totals[o]={pallets:0,singles:0,hives:0};
      totals[o].pallets+=pallets;totals[o].singles+=singles;totals[o].hives+=hives;
    } else {
      const o=m.from_orchard;
      if(!totals[o])totals[o]={pallets:0,singles:0,hives:0};
      totals[o].pallets=Math.max(0,totals[o].pallets-pallets);
      totals[o].singles=Math.max(0,totals[o].singles-singles);
      totals[o].hives=Math.max(0,totals[o].hives-hives);
    }
  });
  return totals;
}

function getYards(opName){
  const base=OPERATIONS[opName].yards;
  const custom=loadCustomYards()[opName]||{};
  return {...base,...custom};
}
function addCustomSite(opName,batchName,siteName){
  const cy=loadCustomYards();
  if(!cy[opName])cy[opName]={};
  if(!cy[opName][batchName])cy[opName][batchName]={type:'run',sites:[]};
  if(!cy[opName][batchName].sites.includes(siteName))cy[opName][batchName].sites.push(siteName);
  saveCustomYards(cy);
  // Sync to Supabase
  pushToSupabase('custom_yards',cy);
}
function removeCustomSite(opName,batchName,siteName){
  const cy=loadCustomYards();
  if(!cy[opName]?.[batchName]) return;
  cy[opName][batchName].sites=cy[opName][batchName].sites.filter(s=>s!==siteName);
  if(!cy[opName][batchName].sites.length) delete cy[opName][batchName];
  if(!Object.keys(cy[opName]||{}).length) delete cy[opName];
  saveCustomYards(cy);
  pushToSupabase('custom_yards',cy);
}

async function pushToSupabase(key, data){
  if(!navigator.onLine||!window._sb){
    const pending=JSON.parse(localStorage.getItem('apiary_pending')||'[]');
    if(!pending.find(p=>p.key===key)) pending.push({key,data});
    localStorage.setItem('apiary_pending',JSON.stringify(pending));
    return;
  }
  updateSyncDot('syncing');
  try{
    const {error}=await window._sb.from('entries').upsert({entry_key:key,data:data,updated_at:new Date().toISOString()},{onConflict:'entry_key'});
    if(error)throw error;
    updateSyncDot('online');
  }catch(e){
    updateSyncDot('error');
    showToast('Sync error — saved locally');
    const pending=JSON.parse(localStorage.getItem('apiary_pending')||'[]');
    if(!pending.find(p=>p.key===key)) pending.push({key,data});
    localStorage.setItem('apiary_pending',JSON.stringify(pending));
  }
}

async function pullFromSupabase(){
  if(!navigator.onLine||!window._sb) return;
  updateSyncDot('syncing');
  try{
    const {data,error}=await window._sb.from('entries').select('entry_key,data');
    if(error)throw error;
    if(data&&data.length){
      const merged={...STATE.entries};
      const mergedFlags=loadFlags();
      data.forEach(row=>{
        if(row.entry_key==='hive_movements'){
          if(row.data&&Array.isArray(row.data)) saveMovements(row.data);
          return;
        }
        if(row.entry_key==='custom_yards'){
          if(row.data&&typeof row.data==='object') saveCustomYards(row.data);
          return;
        }
        if(row.entry_key.endsWith('__flag')){
          // It's a flag — restore to local flags store
          if(row.data&&!row.data.deleted){
            mergedFlags[row.entry_key]=row.data;
          } else {
            delete mergedFlags[row.entry_key];
          }
        } else {
          merged[row.entry_key]=row.data;
        }
      });
      saveLocal(merged);
      saveFlags(mergedFlags);
      STATE.entries=merged;
    }
    updateSyncDot('online');
    render();
  }catch(e){
    updateSyncDot('error');
  }
}

async function flushPending(){
  const pending=JSON.parse(localStorage.getItem('apiary_pending')||'[]');
  if(!pending.length) return;
  updateSyncDot('syncing');
  const failed=[];
  for(const p of pending){
    try{
      const {error}=await window._sb.from('entries').upsert({entry_key:p.key,data:p.data,updated_at:new Date().toISOString()},{onConflict:'entry_key'});
      if(error)throw error;
    }catch(e){failed.push(p);}
  }
  localStorage.setItem('apiary_pending',JSON.stringify(failed));
  if(failed.length===0){showToast('All entries synced');updateSyncDot('online');}
  else updateSyncDot('error');
}

// ── Real-time subscription ────────────────────────────────────────────────────
function subscribeRealtime(){
  window._sb.channel('entries').on('postgres_changes',{event:'*',schema:'public',table:'entries'},payload=>{
    const {entry_key,data}=payload.new||{};
    if(entry_key&&data){
      STATE.entries[entry_key]=data;
      saveLocal(STATE.entries);
      render();
    }
  }).subscribe();
}

// ── Email report ──────────────────────────────────────────────────────────────
function buildDailyReport(opName, date, userName){
  const yards=OPERATIONS[opName].yards;
  const allSites=Object.values(yards).flatMap(y=>y.sites);
  let lines=[];
  lines.push(`APIARY DIARY — DAILY REPORT`);
  lines.push(`Operation: ${opName}`);
  lines.push(`Date: ${date}`);
  lines.push(`Logged by: ${userName||'Unknown'}`);
  lines.push(`${'─'.repeat(40)}`);

  let totalHives=0,totalDead=0,hasData=false;

  Object.entries(yards).forEach(([batchName,batchData])=>{
    const batchLines=[];
    batchData.sites.forEach(site=>{
      Object.entries(ROUNDS).forEach(([rk,rd])=>{
        const list=STATE.entries[eKey(opName,site,rk)]||[];
        const todayEntries=list.filter(e=>e.date===date);
        if(!todayEntries.length) return;
        hasData=true;
        todayEntries.forEach(e=>{
          batchLines.push(`\n  ${site} — ${rd.label}`);
          const fields=['hives','singles','doubles','light','dead','check','pol_pallet','part_pallet','pol_singles','qr','virgin','cell_needed','tops','splits','carrot','fd_harv','harv_34','on_34','fd_on'];
          fields.forEach(k=>{if(e[k]!==undefined&&e[k]!==''){batchLines.push(`    ${k.replace(/_/g,' ')}: ${e[k]}`)}});
          if(e.score_breakdown){
            const bd=e.score_breakdown;
            const parts=[0,1,2,3,4,5,6].filter(n=>bd[n]&&bd[n]!=='').map(n=>`${n}:${bd[n]}`);
            if(parts.length) batchLines.push(`    Spring scores: ${parts.join(', ')}`);
          }
          if(e.treatment) batchLines.push(`    Treatment: ${e.treatment}`);
          if(e.comments) batchLines.push(`    Notes: ${e.comments}`);
          totalHives+=parseInt(e.hives||0)||0;
          totalDead+=parseInt(e.dead||0)||0;
        });
      });
    });
    if(batchLines.length){
      lines.push(`\nBATCH: ${batchName}`);
      lines.push(...batchLines);
    }
  });

  if(!hasData) return null;

  lines.push(`\n${'─'.repeat(40)}`);
  lines.push(`TOTALS FOR TODAY`);
  lines.push(`Total hives visited: ${totalHives}`);
  lines.push(`Total dead: ${totalDead}`);
  lines.push(`\nSent automatically from Apiary Diary`);
  return lines.join('\n');
}

async function maybeQuarterlyBackup(){
  // Check once per day when app loads online
  const today=new Date();
  const lastKey='apiary_quarterly_sent';
  const last=localStorage.getItem(lastKey);
  if(last){
    const lastDate=new Date(last);
    const daysDiff=Math.floor((today-lastDate)/86400000);
    if(daysDiff<85) return; // not 3 months yet (~85 days)
  }
  // It's been 3 months (or never sent) — send for all operations
  if(!navigator.onLine) return;
  // Load EmailJS if needed
  if(!window._ejLoaded){
    _ejLoaded=await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if(_ejLoaded){try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}}
  }
  if(!window._ejLoaded||!window.emailjs) return;
  let sent=false;
  for(const opName of Object.keys(OPERATIONS)){
    const report=buildFullReport(opName);
    if(!report) continue;
    try{
      await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
        to_email:REPORT_EMAIL,
        date:todayStr(),
        report:report,
        operation:opName+' — QUARTERLY BACKUP',
        user:'Automatic backup'
      });
      sent=true;
    }catch(e){console.warn('Quarterly backup failed:',e);}
  }
  if(sent){
    localStorage.setItem(lastKey,today.toISOString());
    showToast('Quarterly backup sent to '+REPORT_EMAIL,4000);
  }
}

// ── Summary calc ──────────────────────────────────────────────────────────────
function calcSummary(opName){
  const sites=allSitesFor(opName);
  // include custom yards
  let hives=0,dead=0,alive=0,deadHives=0,singles=0,doubles=0,light=0,pol=0,part=0,carrot=0;
  let fdOn=0,on34=0,hcFdOn=0,hcHdOn=0;
  let st=0,sc=0,logged=0,flagged=0;
  sites.forEach(site=>{
    // Find the single most recent entry across ALL rounds for this site
    let best=null, bestRk=null;
    Object.keys(ROUNDS).forEach(rk=>{
      const list=STATE.entries[eKey(opName,site,rk)]||[];
      list.forEach(e=>{if(!best||e.date>best.date){best=e;bestRk=rk;}});
    });
    // Also find most recent date for overdue check
    const allDates=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[]).map(e=>e.date));
    const latestDate=allDates.sort().reverse()[0];
    if(!latestDate||daysBetween(latestDate)>21)flagged++;
    if(!best)return;
    logged++;
    // For each field, use the most recent entry that actually has a value for it
    // This prevents empty fields in a new entry zeroing out previous counts
    const allSiteEntries=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[])).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const lastVal=k=>{
      for(const e of allSiteEntries){const v=parseInt(e[k]);if(!isNaN(v)&&v!==0)return v;}
      return 0;
    };
    hives+=lastVal('hives');dead+=lastVal('dead');singles+=lastVal('singles');doubles+=lastVal('doubles');
    alive+=lastVal('alive_hives');deadHives+=lastVal('dead_hives');
    light+=lastVal('light');pol+=lastVal('pol_pallet');part+=lastVal('part_pallet');carrot+=lastVal('carrot');
    fdOn+=lastVal('fd_on');
    on34+=lastVal('on_34');
    hcFdOn+=lastVal('honeycomb_fd');
    hcHdOn+=lastVal('honeycomb_hd');
    // Spring score from most recent spring entry
    const springE=STATE.entries[eKey(opName,site,'spring')]?.[0];
    const bd=springE?.score_breakdown||{};
    [0,1,2,3,4,5,6].forEach(s=>{const v=parseInt(bd[s]);if(!isNaN(v)&&v>0){st+=s*v;sc+=v;}});
  });
  const avgScore=sc>0?(st/sc).toFixed(1):null;
  const barCounts=[0,1,2,3,4,5,6].map(s=>{let c=0;sites.forEach(site=>{const v=parseInt(STATE.entries[eKey(opName,site,'spring')]?.[0]?.score_breakdown?.[s]);if(!isNaN(v))c+=v;});return c;});
  return{hives,dead,alive,deadHives,singles,doubles,light,pol,part,carrot,fdOn,on34,hcFdOn,hcHdOn,avgScore,barCounts,scoreHives:sc,logged,total:sites.length,flagged};
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return el;
}

function renderOverviewTab(){

  const searchWrap=h('div',{style:{position:'relative',marginBottom:'14px'}});
  const searchInp=h('input',{type:'text',placeholder:'Search yards…',style:{display:'block',width:'100%',padding:'9px 10px 9px 34px',border:'.5px solid #ddd',borderRadius:'20px',fontSize:'14px',background:'#fff',boxSizing:'border-box'}});
  searchWrap.appendChild(h('div',{style:{position:'absolute',left:'11px',top:'50%',transform:'translateY(-50%)',fontSize:'14px',color:'#bbb',pointerEvents:'none'}},'⌕'));

  searchWrap.appendChild(clearBtn);
  screen.appendChild(searchWrap);

  const resultsContainer=h('div',null);
  screen.appendChild(resultsContainer);

  function renderYards(query){
    resultsContainer.innerHTML='';
    const q=(query||'').toLowerCase().trim();
    let anyResults=false;
    Object.entries(yards).forEach(([batchName,batchData])=>{
      const matchingSites=batchData.sites.filter(site=>!q||site.toLowerCase().includes(q)||batchName.toLowerCase().includes(q));
      if(!matchingSites.length) return;
      anyResults=true;
      const section=h('div',{style:{marginBottom:'18px'}});
      section.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'#888',marginBottom:'7px',paddingLeft:'2px'}},batchName,batchData.type==='standalone'?h('span',{style:{color:'#bbb',fontWeight:'400'}},' · single site'):null));
      matchingSites.forEach(site=>{
        const allE=Object.entries(ROUNDS).map(([rk,r])=>{const list=STATE.entries[eKey(op,site,rk)]||[];return list.length?{roundDef:r,entry:list[0]}:null;}).filter(Boolean);
        const latest=allE.sort((a,b)=>b.entry.date.localeCompare(a.entry.date))[0]||null;
        const days=latest?daysBetween(latest.entry.date):null;
        const overdue=!latest||days>21;
        const bd=STATE.entries[eKey(op,site,'spring')]?.[0]?.score_breakdown||{};
        let at=0,ac=0;[0,1,2,3,4,5,6].forEach(n=>{const v=parseInt(bd[n]);if(!isNaN(v)&&v>0){at+=n*v;ac+=v;}});
        const avg=ac>0?Math.round(at/ac):null;
        // Skip movement-only entries for overview
        const allEFiltered=allE.filter(x=>!x.entry._movement);
        const latestReal=allEFiltered.sort((a,b)=>b.entry.date.localeCompare(a.entry.date))[0]||null;
        const card=h('div',{className:'card'+(overdue?' overdue':''),style:{position:'relative',overflow:'hidden',flexDirection:'column',alignItems:'stretch'},onClick:()=>setState({tab:'diary',run:batchName,site,diaryView:'entries',round:STATE.round})});
        if(overdue)card.appendChild(h('div',{className:'flag-tag'},!latestReal?'NOT VISITED':`${days}d AGO`));
        const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
        const left=h('div',{style:{flex:'1',paddingRight:'8px'}});
        // Bigger site name
        left.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'3px',color:'#1a1a1a'}},site));
        if(latestReal){
          left.appendChild(h('div',{style:{fontSize:'12px',color:'#777',marginBottom:'4px'}},latestReal.roundDef.short+' · '+fmtDate(latestReal.entry.date)+(!overdue&&days!==null?' · '+days+'d ago':'')));
          // Show all filled fields from last entry
          const e=latestReal.entry;
          const allSiteE=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).filter(x=>!x._movement)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
          const lv=k=>{for(const en of allSiteE){const v=parseInt(en[k]);if(!isNaN(v)&&v>0)return v;}return 0;};
          const fields=[];
          if(lv('hives'))fields.push({l:'Hives',v:lv('hives'),c:'#333'});
          if(lv('alive_hives'))fields.push({l:'Alive',v:lv('alive_hives'),c:'#3d7a4f'});
          if(lv('dead_hives')||lv('dead'))fields.push({l:'Dead',v:lv('dead_hives')||lv('dead'),c:'#e24b4a'});
          if(lv('singles'))fields.push({l:'Singles',v:lv('singles'),c:'#555'});
          if(lv('doubles'))fields.push({l:'Doubles',v:lv('doubles'),c:'#555'});
          if(lv('light'))fields.push({l:'Light',v:lv('light'),c:'#ef9f27'});
          if(lv('fd_on'))fields.push({l:'FD on',v:lv('fd_on'),c:'#555'});
          if(lv('on_34'))fields.push({l:'3/4 on',v:lv('on_34'),c:'#555'});
          if(lv('honeycomb_fd'))fields.push({l:'HC FD',v:lv('honeycomb_fd'),c:'#555'});
          if(lv('honeycomb_hd'))fields.push({l:'HC ½',v:lv('honeycomb_hd'),c:'#555'});
          if(fields.length){
            const fieldRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'4px'}});
            fields.forEach(f=>fieldRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'600',color:f.c,background:'#f5f5f3',borderRadius:'6px',padding:'2px 7px'}},f.v+' '+f.l)));
            left.appendChild(fieldRow);
          }
          if(e.treatment)left.appendChild(h('div',{className:'tx-pill'},'Tx: '+e.treatment));
        } else {
          left.appendChild(h('div',{style:{fontSize:'12px',color:'#bbb'}},'No entries yet'));
        }
        row.appendChild(left);
        const right=h('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexShrink:'0'}});
        if(avg!==null)right.appendChild(scoreCircle(avg,32,14));
        row.appendChild(right);card.appendChild(row);
        if(latestReal?.entry?.comments)card.appendChild(h('div',{style:{marginTop:'7px',fontSize:'12px',color:'#555',background:'#f8f8f6',borderRadius:'5px',padding:'5px 8px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},latestReal.entry.comments));
        const flag=getFlag(op,site);
        if(flag){
          const fb=h('div',{style:{marginTop:'7px',background:'#fff8e6',border:'1px solid #ef9f27',borderRadius:'6px',padding:'6px 10px',fontSize:'12px',color:'#b07800',display:'flex',gap:'6px',alignItems:'flex-start',cursor:'pointer'}},
            h('span',{style:{fontWeight:'700',flexShrink:'0'}},'! '),h('span',null,flag.comment));
          fb.addEventListener('click',e=>{e.stopPropagation();showFlagModal(op,site);});
          card.appendChild(fb);
        }
        section.appendChild(card);
      });
      resultsContainer.appendChild(section);
    });
    if(!anyResults&&q){
      resultsContainer.appendChild(h('div',{style:{textAlign:'center',padding:'30px 0',color:'#bbb',fontSize:'14px'}},'No yards found for "'+query+'"'));
    }
  }

  searchInp.addEventListener('input',e=>{
    const q=e.target.value;
    clearBtn.style.display=q?'block':'none';
    renderYards(q);
  });
  clearBtn.addEventListener('click',()=>{
    searchInp.value='';
    clearBtn.style.display='none';
    renderYards('');
  });

  renderYards('');
  return screen;
}

    },'Cancel'));
    card.appendChild(btnRow);

  overlay.appendChild(card);

    const driverWrap=h('div',null);

    driverSel.appendChild(h('option',{value:''},'— Driver —'));
    DRIVERS.forEach(d=>driverSel.appendChild(h('option',{value:d},d)));
    driverSel.addEventListener('change',e=>{
      loadDriver.val=e.target.value;

      if(e.target.value==='Other'){
        const existing=headerCard.querySelector('#driver-other-input');

          const oi=h('input',{id:'driver-other-input',type:'text',placeholder:'Enter name',style:{display:'block',width:'100%',padding:'8px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'14px',background:'#fafafa',boxSizing:'border-box',marginTop:'6px'}});

          driverWrap.appendChild(oi);

        const oi=headerCard.querySelector('#driver-other-input');
        if(oi) oi.remove();
      }
    });
    driverWrap.appendChild(driverSel);
    dvRow.appendChild(driverWrap);
    // Vehicle
    const vehWrap=h('div',null);
    vehWrap.appendChild(h('label',{className:'lbl'},'Vehicle'));
    const vehSel=h('select',{style:{display:'block',width:'100%',padding:'9px 8px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'14px',background:'#fafafa',boxSizing:'border-box'}});

    VEHICLES.forEach(v=>vehSel.appendChild(h('option',{value:v},v)));
    vehSel.addEventListener('change',e=>loadVehicle.val=e.target.value);
    vehWrap.appendChild(vehSel);
    dvRow.appendChild(vehWrap);
    headerCard.appendChild(dvRow);

    headerCard.appendChild(h('label',{className:'lbl'},'Notes (optional)'));
    const ta=h('textarea',{rows:'2',placeholder:'e.g. Truck run 1',style:{display:'block',width:'100%',padding:'9px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',resize:'vertical',boxSizing:'border-box'}});
    ta.addEventListener('input',e=>loadNotes.val=e.target.value);
    headerCard.appendChild(ta);
    wrap.appendChild(headerCard);

    const pickupContainer=h('div',null);
    wrap.appendChild(pickupContainer);
    const addPickupArea=h('div',null);
    wrap.appendChild(addPickupArea);

    function totalHivesForPickup(p){
      // If alive+dead hives entered, use that; otherwise estimate from pallets
      const alive=parseInt(p.alive_hives)||0;
      const dead=parseInt(p.dead_hives)||0;
      if(alive+dead>0) return alive+dead;
      return (parseInt(p.pallets)||0)*4+(p.half_pallet?2:0)+(parseInt(p.singles)||0);
    }
    function remaining(p){
      const used=(p.splits||[]).reduce((a,s)=>(a+(parseInt(s.hives)||0)),0);
      return Math.max(0,totalHivesForPickup(p)-used);
    }

    function renderPickups(){
      pickupContainer.innerHTML='';
      if(!pickups.length) return;
      const allDone=pickups.every(p=>remaining(p)===0);
      const totalSplits=pickups.reduce((a,p)=>a+(p.splits||[]).length,0);
      const anyUnassigned=pickups.some(p=>remaining(p)>0);

      // Each pickup card
      pickups.forEach(p=>{
        const rem=remaining(p);
        const isDone=rem===0;
        const totalHives=totalHivesForPickup(p);
        const assignedHives=totalHives-rem;
        const pct=totalHives>0?Math.round((assignedHives/totalHives)*100):0;
        const card=h('div',{style:{background:'#fff',border:`2px solid ${isDone?'#3d7a4f':'#ef9f27'}`,borderRadius:'10px',padding:'10px 12px',marginBottom:'8px'}});

        // Header row — prominent site name + pallet count
        const topRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}});
        const leftDiv=h('div',{style:{flex:'1'}});
        leftDiv.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',color:'#222',marginBottom:'4px'}},p.site));
        // Truck space row
        const countRow=h('div',{style:{display:'flex',gap:'8px',alignItems:'center',marginBottom:'4px',flexWrap:'wrap'}});
        const palStr=(parseInt(p.pallets)||0)+(p.half_pallet?'½':'')+'p';
        countRow.appendChild(h('span',{style:{fontSize:'20px',fontWeight:'800',color:isDone?'#3d7a4f':'#ef9f27',lineHeight:'1'}},palStr));
        if(parseInt(p.singles)>0) countRow.appendChild(h('span',{style:{fontSize:'18px',fontWeight:'800',color:'#888',lineHeight:'1'}},p.singles+'s'));
        // Alive/dead counts
        if(parseInt(p.alive_hives)>0||parseInt(p.dead_hives)>0){
          countRow.appendChild(h('span',{style:{fontSize:'13px',color:'#3d7a4f',fontWeight:'700',background:'#e6f2eb',borderRadius:'10px',padding:'2px 8px'}},`${p.alive_hives||0} alive`));
          if(parseInt(p.dead_hives)>0) countRow.appendChild(h('span',{style:{fontSize:'13px',color:'#e24b4a',fontWeight:'700',background:'#fde8e8',borderRadius:'10px',padding:'2px 8px'}},`${p.dead_hives} dead`));
        } else {
          countRow.appendChild(h('span',{style:{fontSize:'12px',color:'#aaa'}},'= '+totalHives+' hives'));
        }
        leftDiv.appendChild(countRow);
        // Progress bar
        const barBg=h('div',{style:{width:'100%',height:'6px',background:'#f0f0ee',borderRadius:'3px',overflow:'hidden',marginBottom:'4px'}});
        barBg.appendChild(h('div',{style:{width:pct+'%',height:'100%',background:isDone?'#3d7a4f':'#ef9f27',borderRadius:'3px',transition:'width .3s'}}));
        leftDiv.appendChild(barBg);
        leftDiv.appendChild(h('div',{style:{fontSize:'11px',color:isDone?'#3d7a4f':'#ef9f27',fontWeight:'600'}},
          isDone?'All assigned ✓':`${assignedHives}/${totalHives} hives assigned (${rem} remaining)`
        ));
        topRow.appendChild(leftDiv);
        const rightDiv=h('div',{style:{display:'flex',alignItems:'flex-start',gap:'6px',marginLeft:'8px',flexShrink:'0'}});
        rightDiv.appendChild(h('button',{style:{background:'none',border:'none',color:'#e24b4a',fontSize:'20px',cursor:'pointer',padding:'0',lineHeight:'1'},
          onClick:()=>{const idx=pickups.findIndex(x=>x.id===p.id);if(idx>-1)pickups.splice(idx,1);rebuildAll();}
        },'×'));
        topRow.appendChild(rightDiv);
        card.appendChild(topRow);

        // Existing splits
        if((p.splits||[]).length>0){
          p.splits.forEach((s,si)=>{
            const splitRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#f0faf3',borderRadius:'6px',padding:'5px 8px',marginBottom:'4px'}});
            splitRow.appendChild(h('span',{style:{fontSize:'13px',color:'#333'}},`→ ${s.dest} — ${s.hives||0} hive${(s.hives||0)!==1?'s':''}`));
            splitRow.appendChild(h('button',{style:{background:'none',border:'none',color:'#aaa',fontSize:'14px',cursor:'pointer',padding:'0'},
              onClick:()=>{p.splits.splice(si,1);renderPickups();}
            },'×'));
            card.appendChild(splitRow);
          });
        }

        // Add split form (inline, only if hives remaining)
        if(rem>0){
          const splitForm=h('div',{style:{marginTop:'8px',paddingTop:'8px',borderTop:'.5px solid #f0f0f0'}});
          const destSel=h('select',{style:{display:'block',width:'100%',padding:'7px 8px',border:'1px solid #ef9f27',borderRadius:'6px',fontSize:'13px',background:'#fffbf0',marginBottom:'6px',boxSizing:'border-box'}});
          if(loadDirection.val==='yard_yard'){
            // Use op→batch→site navigator for destination
            destSel.style.display='none'; // hide the select, use navigator instead
            const destNavArea=h('div',{style:{marginBottom:'6px'}});
            const destSelectedDisplay=h('div',{style:{display:'none',marginBottom:'6px'}});
            splitForm.appendChild(destNavArea);
            splitForm.appendChild(destSelectedDisplay);
            makeSiteNavigator(destNavArea,(site,opName)=>{
              destSel.value=site;
              // store for split save
              destSel._selectedSite=site;
              destSel._selectedOp=opName;
              destNavArea.style.display='none';
              destSelectedDisplay.style.display='block';
              destSelectedDisplay.innerHTML='';
              destSelectedDisplay.appendChild(h('div',{style:{background:'#f0faf3',border:'1px solid #3d7a4f',borderRadius:'6px',padding:'7px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                h('span',{style:{fontSize:'13px',fontWeight:'600',color:'#333'}},site+' ('+opName+')'),
                h('button',{style:{background:'none',border:'none',color:'#aaa',fontSize:'12px',cursor:'pointer'},
                  onClick:()=>{destSel._selectedSite='';destNavArea.style.display='block';destSelectedDisplay.style.display='none';}
                },'Change')
              ));
            }, p.site);
          } else {
            const destLabel=loadDirection.val==='to_orchard'?'— Assign orchard —':'— Assign yard site —';
            const destOptions=loadDirection.val==='to_orchard'?ORCHARDS:getPOLSites();
            destSel.appendChild(h('option',{value:''},destLabel));
            destOptions.forEach(o=>{if(o!==p.site)destSel.appendChild(h('option',{value:o},o));});
            splitForm.appendChild(destSel);
          }

          // Hive count for this split
          const rem2=remaining(p);
          const splitHiveWrap=h('div',{style:{marginBottom:'6px'}});
          splitHiveWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#9b59b6',textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},`Hives (${rem2} remaining)`));
          const splitHiveInp=h('input',{type:'number',inputmode:'numeric',min:'1',max:String(rem2),placeholder:String(rem2),style:{width:'100%',padding:'7px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
          splitHiveInp.value=rem2; // default to all remaining
          splitHiveWrap.appendChild(splitHiveInp);
          splitForm.appendChild(splitHiveWrap);

          const assignBtnRow=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}});
          // + Assign (split this pickup)
          assignBtnRow.appendChild(h('button',{style:{padding:'7px',background:'rgba(155,89,182,0.1)',border:'1px solid '+movColor,borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:movColor,cursor:'pointer'},
            onClick:()=>{
              const dest=loadDirection.val==='yard_yard'?(destSel._selectedSite||''):destSel.value;
              if(!dest){showToast(loadDirection.val==='to_orchard'?'Select an orchard':'Select a yard site');return;}
              const sh=parseInt(splitHiveInp.value)||0;
              if(!sh){showToast('Enter number of hives for this split');return;}
              if(sh>remaining(p)){showToast(`Only ${remaining(p)} hives remaining to assign`);return;}
              const destOp=loadDirection.val==='yard_yard'?(destSel._selectedOp||''):(loadDirection.val==='from_orchard'?(Object.values(OPERATIONS['A2Bee'].yards).flatMap(y=>y.sites).includes(dest)?'A2Bee':'DH Alex'):'');
              if(!p.splits)p.splits=[];
              p.splits.push({dest,dest_op:destOp,hives:sh});
              renderPickups();
            }
          },'+ Assign'));
          // Assign ALL remaining pickups to same destination
          assignBtnRow.appendChild(h('button',{style:{padding:'7px',background:'rgba(155,89,182,0.05)',border:'1px dashed '+movColor,borderRadius:'6px',fontSize:'11px',fontWeight:'700',color:movColor,cursor:'pointer'},
            onClick:()=>{
              const dest=loadDirection.val==='yard_yard'?(destSel._selectedSite||''):destSel.value;
              if(!dest){showToast(loadDirection.val==='to_orchard'?'Select an orchard':'Select a yard site');return;}
              const destOp=loadDirection.val==='yard_yard'?(destSel._selectedOp||''):(loadDirection.val==='from_orchard'?(Object.values(OPERATIONS['A2Bee'].yards).flatMap(y=>y.sites).includes(dest)?'A2Bee':'DH Alex'):'');
              // Assign ALL pickups with remaining hives to this destination
              pickups.forEach(pk=>{
                const r=remaining(pk);
                if(r<=0) return;
                if(!pk.splits)pk.splits=[];
                pk.splits.push({dest,dest_op:destOp,hives:r});
              });
              renderPickups();
            }
          },'Assign all → here'));
          splitForm.appendChild(assignBtnRow);
          card.appendChild(splitForm);
        }
        pickupContainer.appendChild(card);
      });

      // Save button — shown once all pickups have all hives assigned
      if(pickups.length>0){
        const allDone2=pickups.every(p=>remaining(p)===0&&(p.splits||[]).length>0);
        const anyAssigned=pickups.some(p=>(p.splits||[]).length>0);
        if(anyAssigned){
          const label=allDone2?`Save load (${totalSplits} movement${totalSplits!==1?'s':''})`:`${pickups.filter(p=>remaining(p)>0).length} pickup${pickups.filter(p=>remaining(p)>0).length!==1?'s':''} still unassigned`;
          pickupContainer.appendChild(h('button',{
            style:{width:'100%',padding:'13px',background:allDone2?movColor:'#aaa',color:'#fff',border:'none',borderRadius:'8px',fontSize:'15px',fontWeight:'700',cursor:'pointer',marginTop:'8px'},
            onClick:async()=>{
              if(!allDone2){
                // Build a clear warning showing exactly which pickups have unassigned hives
                const probs=pickups.filter(p=>remaining(p)>0);
                const existing=document.getElementById('unassigned-warning');
                if(existing) existing.remove();
                const warn=h('div',{id:'unassigned-warning',style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
                const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'20px',width:'100%',maxWidth:'340px'}});
                box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px',color:'#c0392b'}},'Unassigned hives'));
                box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'12px'}},'The following pickups have hives not yet assigned to a destination:'));
                probs.forEach(p=>{
                  const rem2=remaining(p);
                  box.appendChild(h('div',{style:{background:'#fff8e6',border:'1px solid #ef9f27',borderRadius:'8px',padding:'8px 12px',marginBottom:'6px'}},
                    h('div',{style:{fontWeight:'700',fontSize:'14px'}},p.site),
                    h('div',{style:{fontSize:'13px',color:'#ef9f27',fontWeight:'600'}},`${rem2} hive${rem2!==1?'s':''} (${Math.floor(rem2/4)}p ${rem2%4}s) unassigned`)
                  ));
                });
                box.appendChild(h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'14px'}},'Go back and assign them, or save anyway if the count was a mistake.'));
                const btnRow3=h('div',{style:{display:'flex',gap:'8px'}});
                btnRow3.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
                  onClick:()=>warn.remove()},'Fix it'));
                btnRow3.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:'700',cursor:'pointer'},
                  onClick:async()=>{warn.remove();/* fall through to save */
                    const ts2=Date.now();let j=0;
                    for(const p of pickups){for(const s of (p.splits||[])){
                      const isOutMov2=loadDirection.val==='to_orchard';const isYYMov2=loadDirection.val==='yard_yard';
                      await addMovement({direction:loadDirection.val,date:loadDate.val,notes:loadNotes.val,driver:loadDriver.val,vehicle:loadVehicle.val,from_site:(isOutMov2||isYYMov2)?p.site:'',from_op:(isOutMov2||isYYMov2)?p.op:'',to_orchard:isOutMov2?s.dest:'',from_orchard:(!isOutMov2&&!isYYMov2)?p.site:'',to_site:(!isOutMov2)?s.dest:'',to_op:(!isOutMov2)?s.dest_op:'',pallets:s.pallets,singles:s.singles,logged_by:STATE.userName||'Unknown',id:ts2+(j++),truckload_id:ts2});
                    }}
                    showToast(`${totalSplits} movements saved`);setState({tab:'orchards'});
                  }},'Save anyway'));
                box.appendChild(btnRow3);
                warn.appendChild(box);
                warn.addEventListener('click',e=>{if(e.target===warn)warn.remove();});
                document.body.appendChild(warn);
                return;
              }
              const ts=Date.now();
              let i=0;
              for(const p of pickups){
                for(const s of (p.splits||[])){
                  const isOut=loadDirection.val==='to_orchard';
                  const isOutMov=loadDirection.val==='to_orchard';
                  const isYYMov=loadDirection.val==='yard_yard';
                  const mov={
                    direction:loadDirection.val,
                    date:loadDate.val,
                    notes:loadNotes.val,
                    driver:loadDriver.val,
                    vehicle:loadVehicle.val,
                    from_site:(isOutMov||isYYMov)?p.site:'',
                    from_op:(isOutMov||isYYMov)?p.op:'',
                    to_orchard:isOutMov?s.dest:'',
                    from_orchard:(!isOutMov&&!isYYMov)?p.site:'',
                    to_site:(!isOutMov)?s.dest:'',
                    to_op:(!isOutMov)?s.dest_op:'',
                    pallets:p.pallets,
                    singles:p.singles,
                    half_pallet:p.half_pallet||false,
                    alive_hives:p.alive_hives||'',
                    dead_hives:p.dead_hives||'',
                    hives:s.hives,
                    logged_by:STATE.userName||'Unknown',
                    id:ts+(i++),
                    truckload_id:ts
                  };
                  await addMovement(mov);
                }
              }
              showToast(`${totalSplits} movement${totalSplits!==1?'s':''} saved`);
              setState({tab:'orchards'});
            }
          },label));
        }
      }
    }

    // Builds an op→batch→site navigator, calls onSelect(site, opName) when done
    function makeSiteNavigator(container, onSelect, excludeSite){
      const nav={op:null,batch:null};
      function renderNav(){
        container.innerHTML='';
        if(!nav.op){
          // Op list
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Operation'));
          Object.entries(OPERATIONS).forEach(([opName,op])=>{
            const btn=h('button',{style:{display:'block',width:'100%',padding:'10px 12px',marginBottom:'6px',background:'#fff',border:`.5px solid ${op.accent}44`,borderLeft:`3px solid ${op.accent}`,borderRadius:'8px',cursor:'pointer',textAlign:'left',fontSize:'14px',fontWeight:'600',color:'#333'},
              onClick:()=>{nav.op=opName;nav.batch=null;renderNav();}},opName);
            container.appendChild(btn);
          });
        } else if(!nav.batch){
          // Batch list with back
          const bc=h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'8px',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:()=>{nav.op=null;renderNav();}},
            h('span',{style:{color:movColor}},'‹'),h('span',null,' '+nav.op));
          container.appendChild(bc);
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Batch'));
          Object.entries(OPERATIONS[nav.op].yards).forEach(([batchName,batchData])=>{
            const btn=h('button',{style:{display:'block',width:'100%',padding:'9px 12px',marginBottom:'5px',background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',cursor:'pointer',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center'},
              onClick:()=>{nav.batch=batchName;renderNav();}},
              h('span',{style:{fontSize:'14px',fontWeight:'500',color:'#333'}},batchName),
              h('span',{style:{fontSize:'12px',color:'#bbb'}},batchData.sites.length+' sites ›')
            );
            container.appendChild(btn);
          });
        } else {
          // Site list with back
          const bc=h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'8px',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:()=>{nav.batch=null;renderNav();}},
            h('span',{style:{color:movColor}},'‹'),h('span',null,' '+nav.op+' / '+nav.batch));
          container.appendChild(bc);
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Site'));
          OPERATIONS[nav.op].yards[nav.batch].sites.forEach(site=>{
            if(site===excludeSite) return;
            const btn=h('button',{style:{display:'block',width:'100%',padding:'9px 12px',marginBottom:'5px',background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',cursor:'pointer',textAlign:'left',fontSize:'14px',color:'#333'},
              onClick:()=>onSelect(site,nav.op)},site);
            container.appendChild(btn);
          });
        }
      }
      renderNav();
    }

    function renderAddPickupForm(){
      addPickupArea.innerHTML='';
      const pickupData={site:'',op:'',pallets:'',singles:''};
      const isYY=loadDirection.val==='yard_yard';
      const isOut=loadDirection.val==='to_orchard';
      const card=h('div',{className:'form-card',style:{marginBottom:'12px'}});
      card.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'600',color:'#666',marginBottom:'10px'}},
        isOut?'+ Pick up from yard':isYY?'+ Pick up from yard':'+ Pick up from orchard'));

      if(isYY){
        // Op → Batch → Site navigator
        const navArea=h('div',{style:{marginBottom:'10px'}});
        const selectedDisplay=h('div',{style:{display:'none'}});
        card.appendChild(navArea);
        card.appendChild(selectedDisplay);
        makeSiteNavigator(navArea,(site,opName)=>{
          pickupData.site=site;pickupData.op=opName;
          navArea.style.display='none';
          selectedDisplay.style.display='block';
          selectedDisplay.innerHTML='';
          selectedDisplay.appendChild(h('div',{style:{background:'#f3e8ff',border:'1.5px solid '+movColor,borderRadius:'8px',padding:'9px 12px',marginBottom:'10px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('div',null,
              h('div',{style:{fontWeight:'600',fontSize:'14px',color:'#333'}},site),
              h('div',{style:{fontSize:'12px',color:'#888'}},opName)
            ),
            h('button',{style:{background:'none',border:'none',color:movColor,fontSize:'12px',fontWeight:'600',cursor:'pointer'},
              onClick:()=>{pickupData.site='';pickupData.op='';navArea.style.display='block';selectedDisplay.style.display='none';}
            },'Change')
          ));
        }, null);
      } else {
        // Simple dropdown for Yard→Orchard and Orchard→Yard
        const sw=h('div',{style:{marginBottom:'10px'}});
        sw.appendChild(h('label',{className:'lbl'},isOut?'From yard site':'From orchard'));
        const sel=h('select',{style:{display:'block',width:'100%',padding:'9px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box'}});
        sel.appendChild(h('option',{value:''},isOut?'— Select yard site —':'— Select orchard —'));
        (isOut?getPOLSites():ORCHARDS).forEach(s=>sel.appendChild(h('option',{value:s},s)));

          pickupData.site=e.target.value;
          if(isOut) pickupData.op=Object.values(OPERATIONS['A2Bee'].yards).flatMap(y=>y.sites).includes(e.target.value)?'A2Bee':'DH Alex';
        });
        sw.appendChild(sel);card.appendChild(sw);
      }

      // Truck space row — pallets + half pallet toggle + singles
      const truckRow=h('div',{style:{marginBottom:'10px'}});
      truckRow.appendChild(h('label',{className:'lbl'},'Truck space'));
      const truckGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'6px',alignItems:'end'}});
      // Pallets
      const palWrap=h('div',null);
      palWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'3px'}},'Full pallets'));
      const palInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'8px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
      palInp.addEventListener('input',e=>pickupData.pallets=e.target.value);
      palWrap.appendChild(palInp);
      truckGrid.appendChild(palWrap);
      // Half pallet toggle
      const halfWrap=h('div',{style:{textAlign:'center',paddingBottom:'2px'}});
      halfWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'3px'}}),'½');
      const halfBtn=h('button',{type:'button',style:{width:'36px',height:'36px',borderRadius:'50%',border:'1.5px solid #ddd',background:'#fff',fontSize:'14px',cursor:'pointer',fontWeight:'700',color:'#aaa',transition:'all .15s'}},'+½');
      halfBtn.addEventListener('click',()=>{
        pickupData.half_pallet=!pickupData.half_pallet;
        halfBtn.style.background=pickupData.half_pallet?'#9b59b6':'#fff';
        halfBtn.style.color=pickupData.half_pallet?'#fff':'#aaa';
        halfBtn.style.border=pickupData.half_pallet?'1.5px solid #9b59b6':'1.5px solid #ddd';
      });
      halfWrap.appendChild(halfBtn);
      truckGrid.appendChild(halfWrap);
      // Singles
      const sinWrap=h('div',null);
      sinWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'3px'}},'Singles'));
      const sinInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'8px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
      sinInp.addEventListener('input',e=>pickupData.singles=e.target.value);
      sinWrap.appendChild(sinInp);
      truckGrid.appendChild(sinWrap);
      truckRow.appendChild(truckGrid);
      card.appendChild(truckRow);

      // Hive count row — alive + dead
      const hiveRow=h('div',{style:{marginBottom:'10px'}});
      hiveRow.appendChild(h('label',{className:'lbl'},'Hives on this pickup'));
      const hiveGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}});
      [{label:'Alive',key:'alive_hives',color:'#3d7a4f'},{label:'Dead',key:'dead_hives',color:'#e24b4a'}].forEach(({label,key,color})=>{
        const nw=h('div',null);
        nw.appendChild(h('label',{style:{fontSize:'10px',color:color,textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},label));
        const ni=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'8px 10px',border:`.5px solid ${color}55`,borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
        ni.addEventListener('input',e=>pickupData[key]=e.target.value);
        nw.appendChild(ni);hiveGrid.appendChild(nw);
      });
      hiveRow.appendChild(hiveGrid);
      card.appendChild(hiveRow);

      card.appendChild(h('button',{style:{width:'100%',padding:'10px',background:'rgba(155,89,182,0.1)',border:'1.5px solid '+movColor,borderRadius:'8px',fontSize:'13px',fontWeight:'700',color:movColor,cursor:'pointer'},
        onClick:()=>{
          if(!pickupData.site){showToast(isOut?'Select a yard site':isYY?'Select a yard site':'Select an orchard');return;}
          if(!pickupData.pallets&&!pickupData.singles&&!pickupData.half_pallet){showToast('Enter truck space (pallets or singles)');return;}
          pickups.push({...pickupData,id:nextId++,splits:[]});
          renderPickups();
          renderAddPickupForm();
        }
      },'+ Add to truck'));
      addPickupArea.appendChild(card);
    }

    function rebuildAll(){renderPickups();renderAddPickupForm();}
    rebuildAll();
    screen.appendChild(wrap);
  }

      // ── Orchards tab ──
  else if(STATE.tab==='orchards'){
    const totals=getOrchardTotals();
    const active=ORCHARDS.filter(o=>totals[o]&&totals[o].hives>0);
    const movements=loadMovements();

    // Detail view for a single orchard
    if(STATE.selectedOrchard){
      const o=STATE.selectedOrchard;
      const t=totals[o]||{hives:0,pallets:0,singles:0};
      // Breadcrumb
      const bc=h('div',{className:'breadcrumb'});
      bc.appendChild(h('span',{style:{cursor:'pointer',color:'#9b59b6'},onClick:()=>setState({selectedOrchard:null})},'Orchards'));
      bc.appendChild(document.createTextNode(' / '));
      bc.appendChild(h('span',{style:{color:'#333'}},o));
      screen.appendChild(bc);
      // Summary bar
      screen.appendChild(h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'}},
        h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#fff'}},t.hives),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.04em'}},'Total hives')),
        h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#fff'}},t.pallets),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.04em'}},'Pallets')),
        h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#fff'}},t.singles),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.04em'}},'Singles'))
      ));
      // Build breakdown: group active movements into orchard by source site
      const siteBreakdown={};
      movements.forEach(m=>{
        if(m.direction==='to_orchard'&&m.to_orchard===o){
          const site=m.from_site;
          if(!siteBreakdown[site])siteBreakdown[site]={pallets:0,singles:0,moves:[]};
          siteBreakdown[site].pallets+=parseInt(m.pallets)||0;
          siteBreakdown[site].singles+=parseInt(m.singles)||0;
          siteBreakdown[site].moves.push(m);
        }
        if(m.direction==='from_orchard'&&m.from_orchard===o){
          const site=m.to_site;
          if(!siteBreakdown[site])siteBreakdown[site]={pallets:0,singles:0,moves:[]};
          siteBreakdown[site].pallets-=parseInt(m.pallets)||0;
          siteBreakdown[site].singles-=parseInt(m.singles)||0;
        }
      });
      const activeSites=Object.entries(siteBreakdown).filter(([,v])=>(v.pallets+v.singles)>0);
      if(!activeSites.length){
        screen.appendChild(h('div',{style:{textAlign:'center',padding:'20px 0',color:'#ccc',fontSize:'14px'}},'All hives have returned from this orchard'));
      } else {
        screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},'Hives currently from:'));
        activeSites.sort((a,b)=>b[1].pallets-a[1].pallets).forEach(([site,data])=>{
          const hives=(data.pallets*4)+data.singles;
          const card=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'10px',padding:'12px 13px',marginBottom:'7px'}});
          const topRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
          topRow.appendChild(h('div',null,
            h('div',{style:{fontWeight:'600',fontSize:'15px'}},site),
            h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},`${data.pallets} pallet${data.pallets!==1?'s':''} · ${data.singles} single${data.singles!==1?'s':''}`)
          ));
          topRow.appendChild(h('div',{style:{textAlign:'center',flexShrink:'0',marginLeft:'10px'}},
            h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#2a1f3d'}},hives),
            h('div',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase'}},'hives')
          ));
          card.appendChild(topRow);
          // Show individual movements for this site
          const siteMoves=data.moves.sort((a,b)=>b.date.localeCompare(a.date));
          if(siteMoves.length){
            const movList=h('div',{style:{marginTop:'8px',borderTop:'.5px solid #f0f0f0',paddingTop:'8px'}});
            siteMoves.forEach(m=>{
              movList.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#777',marginBottom:'3px'}},
                h('span',null,`${m.pallets||0}p + ${m.singles||0}s moved in`+(m.notes?' — '+m.notes:'')),
                h('span',{style:{color:'#aaa',flexShrink:'0',marginLeft:'8px'}},fmtDate(m.date))
              ));
            });
            card.appendChild(movList);
          }
          screen.appendChild(card);
        });
      }

    // List view — all orchards
    } else {
      if(!active.length){
        screen.appendChild(h('div',{className:'empty-msg'},'No hives currently in orchards'));
      } else {
        screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},`${active.length} orchards with hives`));
        const totalHives=active.reduce((a,o)=>a+totals[o].hives,0);
        screen.appendChild(h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
          h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'22px',fontWeight:'700',color:'#fff'}},totalHives),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.05em'}},'Total hives in orchards')),
          h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'22px',fontWeight:'700',color:'#fff'}},active.length),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.05em'}},'Active orchards'))
        ));
        active.forEach(o=>{
          const t=totals[o];
          const card=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'10px',padding:'11px 13px',marginBottom:'7px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'},
            onClick:()=>setState({selectedOrchard:o})});
          card.appendChild(h('div',null,
            h('div',{style:{fontWeight:'600',fontSize:'15px'}},o),
            h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},`${t.pallets} pallet${t.pallets!==1?'s':''} · ${t.singles} single${t.singles!==1?'s':''}`)
          ));
          const right=h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
          right.appendChild(h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#2a1f3d'}},t.hives),
            h('div',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase'}},'hives')
          ));
          right.appendChild(h('span',{style:{color:'#ccc',fontSize:'18px'}},'›'));
          card.appendChild(right);
          screen.appendChild(card);
        });
      }
    }
  }

  // ── History tab ──
  else if(STATE.tab==='history'){
    const movements=[...loadMovements()].reverse();
    if(!movements.length){screen.appendChild(h('div',{className:'empty-msg'},'No movements logged yet'));}
    else{
      screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},`${movements.length} movements`));
      movements.forEach(m=>{
        const isOut=m.direction==='to_orchard';
        const isYY=m.direction==='yard_yard';
        const title=isOut?`${m.from_site} → ${m.to_orchard}`:isYY?`${m.from_site} → ${m.to_site}`:`${m.from_orchard} → ${m.to_site}`;
        const sub=`${m.pallets||0}p · ${m.singles||0}s`;
        const meta=[m.driver,m.vehicle].filter(Boolean).join(' · ');
        const card=h('div',{style:{background:'#fff',border:`.5px solid ${isOut?'#ef9f27':isYY?'#6ab0e0':'#3d7a4f'}33`,borderLeft:`3px solid ${isOut?'#ef9f27':isYY?'#6ab0e0':'#3d7a4f'}`,borderRadius:'10px',padding:'11px 13px',marginBottom:'7px',overflow:'hidden'}});
        const mainRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
        mainRow.appendChild(h('div',{style:{flex:'1'}},
          h('div',{style:{fontWeight:'600',fontSize:'14px'}},title),
          h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},sub+(meta?' · '+meta:'')),
          m.notes?h('div',{style:{fontSize:'12px',color:'#555',marginTop:'4px',background:'#f8f8f6',borderRadius:'5px',padding:'4px 8px'}},m.notes):null
        ));
        mainRow.appendChild(h('div',{style:{textAlign:'right',flexShrink:'0',marginLeft:'8px'}},
          h('div',{style:{fontSize:'12px',color:'#aaa'}},fmtDate(m.date)),
          h('div',{style:{fontSize:'11px',color:'#bbb',marginTop:'2px'}},m.logged_by||'')
        ));
        card.appendChild(mainRow);
        // Delete button
        const delBtn=h('button',{style:{marginTop:'8px',padding:'4px 10px',background:'none',border:'.5px solid #f4a0a0',borderRadius:'20px',fontSize:'11px',color:'#c0392b',cursor:'pointer',fontWeight:'600',float:'right'},
          onClick:()=>{
            // Confirm
            const overlay=h('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
            const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'22px',width:'100%',maxWidth:'300px'}});
            box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px'}},'Delete movement?'));
            box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'6px'}},title));
            box.appendChild(h('div',{style:{fontSize:'12px',color:'#999',marginBottom:'18px'}},'This will also remove the auto-generated diary entry from the yard history.'));
            const btnRow2=h('div',{style:{display:'flex',gap:'10px'}});
            btnRow2.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
              onClick:async()=>{
                // Delete movement from list
                const updated=loadMovements().filter(x=>x.id!==m.id);
                saveMovements(updated);
                await pushToSupabase('hive_movements',updated);
                // Delete matching diary entries from affected yard sites
                async function removeDiaryEntry(opName, siteKey){
                  if(!opName||!siteKey) return;
                  const k=eKey(opName,siteKey,'spring');
                  const existing=STATE.entries[k]||[];
                  // Match by _movement flag and movement id stored in comments
                  const filtered=existing.filter(e=>!(e._movement&&e.date===m.date&&e.comments&&(
                    e.comments.includes(m.to_orchard||'')||
                    e.comments.includes(m.from_orchard||'')||
                    e.comments.includes(m.to_site||'')||
                    e.comments.includes(m.from_site||'')
                  )));
                  if(filtered.length!==existing.length){
                    const updEntries={...STATE.entries,[k]:filtered};
                    saveLocal(updEntries);
                    await pushToSupabase(k,filtered);
                    STATE.entries=updEntries;
                  }
                }
                const isOut=m.direction==='to_orchard';
                const isYY=m.direction==='yard_yard';
                if(isOut) await removeDiaryEntry(m.from_op,m.from_site);
                else if(!isOut&&!isYY) await removeDiaryEntry(m.to_op,m.to_site);
                else if(isYY){
                  await removeDiaryEntry(m.from_op,m.from_site);
                  await removeDiaryEntry(m.to_op,m.to_site);
                }
                overlay.remove();
                showToast('Movement and diary entry deleted');
                setState({tab:'history'});
              }
            },'Yes, delete'));
            btnRow2.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
              onClick:()=>overlay.remove()
            },'Cancel'));
            box.appendChild(btnRow2);
            overlay.appendChild(box);
            overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
            document.body.appendChild(overlay);
          }
        },'Delete');
        card.appendChild(delBtn);
        screen.appendChild(card);
      });
    }
  }

  app.appendChild(screen);
  return app;
}

function renderYardsTab(opName){
  const screen=h('div',{className:'screen'});
  const opData=OPERATIONS[opName];
  const allYards=getYards(opName);
  const custom=loadCustomYards()[opName]||{};

  screen.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'4px',marginTop:'4px'}},'Manage Yards'));
  screen.appendChild(h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'16px',lineHeight:'1.5'}},'Add new yards and batches to '+opName+'. Built-in yards cannot be removed.'));

  // ── Add new site form ──
  const addCard=h('div',{className:'form-card',style:{marginBottom:'20px'}});
  addCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#555',marginBottom:'12px'}},'+ Add new yard'));

  // Batch — existing or new
  addCard.appendChild(h('label',{className:'lbl'},'Batch'));
  const batchSel=h('select',{className:'inp',style:{marginBottom:'8px'}});
  batchSel.appendChild(h('option',{value:''},'— Select batch —'));
  Object.keys(allYards).forEach(b=>batchSel.appendChild(h('option',{value:b},b)));
  batchSel.appendChild(h('option',{value:'__new__'},'+ Create new batch'));
  addCard.appendChild(batchSel);

  const newBatchWrap=h('div',{style:{display:'none',marginBottom:'8px'}});
  newBatchWrap.appendChild(h('label',{className:'lbl'},'New batch name'));
  const newBatchInp=h('input',{type:'text',placeholder:'Batch name',className:'inp'});
  newBatchWrap.appendChild(newBatchInp);
  addCard.appendChild(newBatchWrap);
  batchSel.addEventListener('change',e=>{
    newBatchWrap.style.display=e.target.value==='__new__'?'block':'none';
  });

  addCard.appendChild(h('label',{className:'lbl',style:{marginTop:'8px',display:'block'}},'Yard name'));
  const siteInp=h('input',{type:'text',placeholder:'New yard name',className:'inp',style:{marginBottom:'12px'}});
  addCard.appendChild(siteInp);

  addCard.appendChild(h('button',{style:{width:'100%',padding:'11px',background:opData.color,color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
    onClick:()=>{
      let batchName=batchSel.value==='__new__'?newBatchInp.value.trim():batchSel.value;
      const siteName=siteInp.value.trim();
      if(!batchName){showToast('Select or enter a batch name');return;}
      if(!siteName){showToast('Enter a yard name');return;}
      // Check not duplicate
      const yards=getYards(opName);
      if(yards[batchName]?.sites.includes(siteName)){showToast('That yard already exists in this batch');return;}
      addCustomSite(opName,batchName,siteName);
      showToast(`${siteName} added to ${batchName}`);
      setState({tab:'settings'});
    }
  },'Add yard'));
  screen.appendChild(addCard);

  // ── Existing yards ──
  Object.entries(allYards).forEach(([batchName,batchData])=>{
    const isCustomBatch=!!custom[batchName];
    const section=h('div',{style:{marginBottom:'16px'}});
    section.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'#888',marginBottom:'6px',paddingLeft:'2px'}},
      batchName+(isCustomBatch?' (custom)':'')));
    batchData.sites.forEach(site=>{
      const isCustomSite=custom[batchName]?.sites?.includes(site);
      const row=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',padding:'9px 12px',marginBottom:'5px',display:'flex',justifyContent:'space-between',alignItems:'center'}});
      row.appendChild(h('span',{style:{fontSize:'14px',color:'#333'}},site+(isCustomSite?' ✎':'')));
      if(isCustomSite){
        row.appendChild(h('button',{style:{background:'none',border:'none',color:'#e24b4a',fontSize:'13px',fontWeight:'600',cursor:'pointer',padding:'0'},
          onClick:()=>{
            removeCustomSite(opName,batchName,site);
            showToast(`${site} removed`);
            setState({tab:'settings'});
          }
        },'Remove'));
      } else {
        row.appendChild(h('span',{style:{fontSize:'11px',color:'#ccc'}},'built-in'));
      }
      section.appendChild(row);
    });
    screen.appendChild(section);
  });
  return screen;
}

function renderApp(){
  const op=STATE.op;
  if(!op) return renderOpSelector();
  if(op==='__movements__') return renderMovementsScreen();
  const opData=OPERATIONS[op];
  document.documentElement.style.setProperty('--op-color',opData.color);
  document.documentElement.style.setProperty('--op-accent',opData.accent);
  const allSites=Object.values(getYards(op)).flatMap(y=>y.sites);
  const flaggedCount=allSites.filter(site=>{const dates=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).map(e=>e.date));const latest=dates.sort().reverse()[0];return !latest||daysBetween(latest)>21;}).length;
  const app=h('div',{className:'app'});
  const header=h('div',{className:'header'});
  const topRow=h('div',{className:'header-top'});
  topRow.appendChild(h('button',{className:'back-btn',onClick:()=>setState({op:null})},'‹ Ops'));
  topRow.appendChild(h('div',{className:'header-sub'},'Apiary Diary'));
  topRow.appendChild(h('div',{className:'sync-dot',style:{marginLeft:'auto'}}));
  header.appendChild(topRow);
  header.appendChild(h('div',{className:'header-title'},op+' — '+(STATE.userName||'')));
  const tb=h('div',{className:'tab-bar'});
  [{key:'overview',label:'Overview'+(flaggedCount>0?` ⚑${flaggedCount}`:'')},{key:'diary',label:'Diary'},{key:'export',label:'Export / Sync'},{key:'settings',label:'Yards'}].forEach(t=>{
    tb.appendChild(h('button',{className:'tab-btn'+(STATE.tab===t.key?' active':''),onClick:()=>setState({tab:t.key})},t.label));
  });
  header.appendChild(tb);
  app.appendChild(header);
  if(STATE.tab==='overview')app.appendChild(renderOverviewTab());
  else if(STATE.tab==='diary')app.appendChild(renderDiaryTab());
  else if(STATE.tab==='export')app.appendChild(renderExportTab());
  else if(STATE.tab==='settings')app.appendChild(renderYardsTab(op));
  return app;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  root.appendChild(renderApp());
  document.querySelectorAll('.sync-dot').forEach(d=>{d.className='sync-dot '+STATE.syncStatus;});
  // Always re-show name prompt if not set
  if(!STATE.userName){
    root.appendChild(renderNamePrompt());
  }
}

// ── Online/offline ────────────────────────────────────────────────────────────
window.addEventListener('online',async()=>{
  document.getElementById('offline-bar').classList.remove('show');
  updateSyncDot('syncing');
  if(!_sbLoaded){
    _sbLoaded=await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
    if(_sbLoaded){try{window._sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);subscribeRealtime();}catch(e){_sbLoaded=false;}}
  }
  if(_sbLoaded){await flushPending();await pullFromSupabase();}
  if(!_ejLoaded){
    _ejLoaded=await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if(_ejLoaded){try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}}
  }
});
window.addEventListener('offline',()=>{
  document.getElementById('offline-bar').classList.add('show');
  updateSyncDot('error');
});

// ── Service Worker (offline caching) ─────────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='apiary-v3';
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./']).catch(()=>{}))));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('supabase.co')||e.request.url.includes('emailjs')||e.request.url.includes('jsdelivr'))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;}).catch(()=>caches.match('./'))));
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot(){
  // Show app immediately with local data
  render();
  if(!navigator.onLine){
    document.getElementById('offline-bar').classList.add('show');
    updateSyncDot('error');
    return;
  }
  // Load Supabase library first, then pull data
  updateSyncDot('syncing');
  _sbLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
  if(_sbLoaded){
    try{
      window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      await pullFromSupabase(); // pulls all data and re-renders
      subscribeRealtime();
      await flushPending();
      updateSyncDot('online');
    }catch(e){
      console.warn('Supabase init failed:',e);
      updateSyncDot('error');
    }
  } else {
    updateSyncDot('error');
    showToast('Could not connect to cloud — using local data');
  }
  // Load EmailJS in background then check quarterly backup
  loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js').then(async loaded=>{
    _ejLoaded=loaded;
    if(loaded){
      try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}
      // Check if quarterly backup is due
      await maybeQuarterlyBackup();
    }
  });
}
boot();
