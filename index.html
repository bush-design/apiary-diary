          hdrLeft.appendChild(h('div',{style:{fontWeight:'700',fontSize:'15px',color:'#1a1a1a'}},site));
          hdrLeft.appendChild(h('div',{style:{fontSize:'12px',color:'#888',marginTop:'2px'}},netPal+'p'+(netSing?' · '+netSing+'s':'')+(hasReturns?' remaining':' in orchard')));
          hdr.appendChild(hdrLeft);
          hdr.appendChild(h('div',{style:{textAlign:'center',flexShrink:'0',marginLeft:'12px'}},
            h('div',{style:{fontSize:'24px',fontWeight:'800',color:'#2a1f3d',lineHeight:'1'}},netHives),
            h('div',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.03em'}},'hives')
          ));
          addBody.appendChild(hdr);

          // Progress bar (only if some have returned)
          if(hasReturns){
            const body=h('div',{style:{padding:'10px 14px',background:'#fafafa',borderBottom:'.5px solid #f0f0ee'}});
            const pct=data.sent>0?Math.round(((data.sent-data.returned)/data.sent)*100):100;
            const barWrap=h('div',{style:{marginBottom:'5px'}});
            const bar=h('div',{style:{width:'100%',height:'5px',background:'#e8e8e6',borderRadius:'3px',overflow:'hidden'}});
            bar.appendChild(h('div',{style:{width:pct+'%',height:'100%',background:'#9b59b6',borderRadius:'3px'}}));
            barWrap.appendChild(bar);
            body.appendChild(barWrap);
            body.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#aaa'}},
              h('span',null,data.sent+'p sent'),
              h('span',null,data.returned+'p returned'),
              h('span',{style:{color:'#9b59b6',fontWeight:'600'}},netPal+'p still here')
            ));
            addBody.appendChild(body);
          }

          // Movement timeline
          const movBody=h('div',{style:{padding:'10px 14px'}});
          const allMoves=data.moves.sort((a,b)=>b.date.localeCompare(a.date));
          allMoves.forEach(m=>{
            const isIn=m.type==='in';
            const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px'}});
            const left=h('div',{style:{display:'flex',gap:'6px',alignItems:'center'}});
            left.appendChild(h('span',{style:{fontSize:'11px',fontWeight:'700',color:isIn?'#ef9f27':'#3d7a4f',background:isIn?'#fff8e6':'#e6f2eb',borderRadius:'6px',padding:'2px 6px'}},isIn?'↓ In':'↑ Out'));
            left.appendChild(h('span',{style:{fontSize:'13px',color:'#444'}},
              (parseInt(m.pallets)||0)+'p'+(parseInt(m.singles)>0?' · '+m.singles+'s':'')+(m.notes?' — '+m.notes:'')
            ));
            row.appendChild(left);
            row.appendChild(h('span',{style:{fontSize:'11px',color:'#bbb',flexShrink:'0',marginLeft:'8px'}},fmtDate(m.date)));
            movBody.appendChild(row);
          });
          addBody.appendChild(movBody);
          screen.appendChild(card);
        });
      }

    // List view — all orchards
    } else {
      if(!active.length){
        screen.appendChild(h('div',{className:'empty-msg'},'No hives currently in orchards'));
      } else {
        screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},`${active.length} orchards with hives`));
        const totalHives=active.reduce((a,o)=>a+totals[o].hives,0);
        screen.appendChild(h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
          h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'22px',fontWeight:'700',color:'#fff'}},totalHives),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.05em'}},'Total hives in orchards')),
          h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'22px',fontWeight:'700',color:'#fff'}},active.length),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.05em'}},'Active orchards'))
        ));
        active.forEach(o=>{
          const t=totals[o];
          const card=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'10px',padding:'11px 13px',marginBottom:'7px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'},
            onClick:()=>setState({selectedOrchard:o})});
          addBody.appendChild(h('div',null,
            h('div',{style:{fontWeight:'600',fontSize:'15px'}},o),
            h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},`${t.pallets} pallet${t.pallets!==1?'s':''} · ${t.singles} single${t.singles!==1?'s':''}`)
          ));
          const right=h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
          right.appendChild(h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#2a1f3d'}},t.hives),
            h('div',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase'}},'hives')
          ));
          right.appendChild(h('span',{style:{color:'#ccc',fontSize:'18px'}},'›'));
          card.appendChild(right);
          screen.appendChild(card);
        });
    }
    }
  }

  // ── Return Trip tab ──
  else if(STATE.tab==='return_trip'){
    const movements=loadMovements();

    // Build per-orchard, per-source-yard net position
    const orchardSites={};
    movements.forEach(m=>{
      if(m.direction==='to_orchard'&&m.from_site&&m.to_orchard){
        if(!orchardSites[m.to_orchard])orchardSites[m.to_orchard]={};
        if(!orchardSites[m.to_orchard][m.from_site])orchardSites[m.to_orchard][m.from_site]={pallets:0,singles:0,op:m.from_op||''};
        orchardSites[m.to_orchard][m.from_site].pallets+=parseInt(m.pallets)||0;
        orchardSites[m.to_orchard][m.from_site].singles+=parseInt(m.singles)||0;
      }
      if(m.direction==='from_orchard'&&m.to_site&&m.from_orchard){
        if(!orchardSites[m.from_orchard])orchardSites[m.from_orchard]={};
        if(!orchardSites[m.from_orchard][m.to_site])orchardSites[m.from_orchard][m.to_site]={pallets:0,singles:0,op:m.to_op||''};
        orchardSites[m.from_orchard][m.to_site].pallets-=parseInt(m.pallets)||0;
        orchardSites[m.from_orchard][m.to_site].singles-=parseInt(m.singles)||0;
      }
    });

    const activeOrchards=Object.entries(orchardSites).filter(([,sites])=>
      Object.values(sites).some(s=>s.pallets>0||s.singles>0)
    );

    if(!activeOrchards.length){
      screen.appendChild(h('div',{className:'empty-msg'},'No hives currently in orchards'));
    } else {
      screen.appendChild(h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'12px',lineHeight:'1.5'}},'Enter how many pallets you are taking from each yard today. Leave blank to skip.'));

      // Track taking amounts: {orchard__site: pallets}
      const taking={};

      // Live truck total
      const truckTile=h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'12px 14px',marginBottom:'12px'}});
      const truckNum=h('div',{style:{fontSize:'26px',fontWeight:'800',color:'#fff',lineHeight:'1'}});
      const truckSub=h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,0.45)',marginTop:'4px'}});
      truckTile.appendChild(truckNum);
      truckTile.appendChild(truckSub);
      screen.appendChild(truckTile);

      function updateTruckTotal(){
        const totalPal=Object.values(taking).reduce((a,v)=>a+(parseInt(v)||0),0);
        const totalHives=totalPal*4;
        truckNum.textContent=totalPal+'p = '+totalHives+' hives';
        truckSub.textContent=totalPal>0?'Tap "Build load" to pre-fill the movement form':'Enter pallets below';
      }
      updateTruckTotal();

      // Build load button (sticky at bottom)
      const buildBtn=h('button',{style:{width:'100%',padding:'13px',background:'#9b59b6',color:'#fff',border:'none',borderRadius:'10px',fontSize:'15px',fontWeight:'700',cursor:'pointer',marginBottom:'12px',opacity:'0.4',pointerEvents:'none'},
        onClick:()=>{
          const plan=[];
          Object.entries(taking).forEach(([key,pallets])=>{
            if(!parseInt(pallets)) return;
            const [orchard,...siteParts]=key.split('__');
            const site=siteParts.join('__');
            const op=(orchardSites[orchard]||{})[site]?.op||'';
            plan.push({orchard,site,pallets:String(pallets),singles:'0',op});
          });
          if(!plan.length){showToast('Enter pallets to take for at least one yard');return;}
          STATE._returnPlan=plan;
          setState({tab:'movements',_returnMode:true});
        }
      },'Build load');
      screen.appendChild(buildBtn);

      function updateBuildBtn(){
        const hasSome=Object.values(taking).some(v=>parseInt(v)>0);
        buildBtn.style.opacity=hasSome?'1':'0.4';
        buildBtn.style.pointerEvents=hasSome?'auto':'none';
        updateTruckTotal();
      }

      // Orchard cards
      activeOrchards.forEach(([orchard,sites])=>{
        const activeSites=Object.entries(sites).filter(([,s])=>s.pallets>0||s.singles>0);
        const orchTotal=activeSites.reduce((a,[,s])=>a+s.pallets,0);

        const card=h('div',{style:{background:'#fff',borderRadius:'12px',marginBottom:'10px',overflow:'hidden',border:'.5px solid #ddd'}});

        // Orchard header
        const hdr=h('div',{style:{padding:'11px 14px',background:'#f8f8f6',borderBottom:'.5px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center'}});
        hdr.appendChild(h('div',{style:{fontWeight:'700',fontSize:'15px',color:'#1a1a1a'}},orchard));
        hdr.appendChild(h('div',{style:{fontSize:'12px',color:'#888'}},orchTotal+'p in orchard'));
        card.appendChild(hdr);

        // Per-yard rows
        activeSites.sort((a,b)=>b[1].pallets-a[1].pallets).forEach(([site,data])=>{
          const key=orchard+'__'+site;
          const row=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',borderBottom:'.5px solid #f5f5f3'}});

          // Site name + pallets in orchard
          const left=h('div',{style:{flex:'1'}});
          left.appendChild(h('div',{style:{fontWeight:'600',fontSize:'14px',color:'#333'}},site));
          left.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',marginTop:'2px'}},data.pallets+'p in orchard'));
          row.appendChild(left);

          // Input: pallets taking today
          const inp=h('input',{type:'number',inputmode:'numeric',min:'0',max:String(data.pallets),placeholder:'0',style:{width:'60px',padding:'7px 8px',border:'1.5px solid #ddd',borderRadius:'8px',fontSize:'16px',fontWeight:'700',textAlign:'center',background:'#fafafa',boxSizing:'border-box'}});
          inp.addEventListener('input',e=>{
            const v=Math.min(parseInt(e.target.value)||0,data.pallets);
            if(v>0){
              inp.value=String(v);
              taking[key]=String(v);
              inp.style.border='1.5px solid #9b59b6';
              inp.style.color='#9b59b6';
            } else {
              delete taking[key];
              inp.style.border='1.5px solid #ddd';
              inp.style.color='#333';
            }
            updateBuildBtn();
          });
          row.appendChild(inp);
          row.appendChild(h('span',{style:{fontSize:'13px',color:'#aaa',flexShrink:'0'}},'pallets'));
          card.appendChild(row);
        });

        screen.appendChild(card);
      });
    }
  }

  // ── Manage Orchards tab ──
  else if(STATE.tab==='manage_orchards'){
    const custom=loadCustomOrchards();
    screen.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'4px',marginTop:'4px'}},'Manage Orchards'));
    screen.appendChild(h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'16px',lineHeight:'1.5'}},'Add new orchards or remove custom ones. Built-in orchards cannot be deleted.'));

    // Add new orchard
    const addCard=h('div',{className:'form-card',style:{marginBottom:'20px'}});
    addCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#555',marginBottom:'10px'}},'+ Add new orchard'));
    const inp=h('input',{type:'text',placeholder:'Orchard name',className:'inp',style:{marginBottom:'10px'}});
    addCard.appendChild(inp);
    addCard.appendChild(h('button',{style:{width:'100%',padding:'11px',background:'#2a1f3d',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
      onClick:()=>{
        const name=inp.value.trim();
        if(!name){showToast('Enter an orchard name');return;}
        if(getAllOrchards().includes(name)){showToast('Already exists');return;}
        const updated=[...loadCustomOrchards(),name];
        saveCustomOrchards(updated);
        pushToSupabase('custom_orchards',updated);
        showToast(name+' added');
        setState({tab:'manage_orchards'});
      }
    },'Add orchard'));
    screen.appendChild(addCard);

    // Built-in list
    screen.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.07em',color:'#888',marginBottom:'8px'}},'All orchards'));
    getAllOrchards().forEach(orchard=>{
      const isCustom=custom.includes(orchard);
      const row=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',padding:'10px 13px',marginBottom:'5px',display:'flex',justifyContent:'space-between',alignItems:'center'}});
      row.appendChild(h('span',{style:{fontSize:'14px',color:'#333'}},orchard+(isCustom?' ✎':'')));
      if(isCustom){
        row.appendChild(h('button',{style:{background:'none',border:'.5px solid #f4a0a0',borderRadius:'6px',padding:'4px 10px',fontSize:'12px',color:'#c0392b',cursor:'pointer',fontWeight:'600'},
          onClick:()=>{
            const overlay=h('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
            const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'22px',width:'100%',maxWidth:'300px'}});
            box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px'}},'Remove orchard?'));
            box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'18px'}},orchard));
            const btnRow=h('div',{style:{display:'flex',gap:'10px'}});
            btnRow.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
              onClick:()=>{
                const updated=loadCustomOrchards().filter(o=>o!==orchard);
                saveCustomOrchards(updated);
                pushToSupabase('custom_orchards',updated);
                overlay.remove();
                showToast(orchard+' removed');
                setState({tab:'manage_orchards'});
              }
            },'Yes, continue'));
            btnRow.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
              onClick:()=>overlay.remove()},'Cancel'));
            box.appendChild(btnRow);
            overlay.appendChild(box);
            overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
            document.body.appendChild(overlay);
          }
        },'Remove'));
      } else {
        row.appendChild(h('span',{style:{fontSize:'11px',color:'#ccc'}},'built-in'));
      }
      screen.appendChild(row);
    });
  }

  // ── History tab ──
  else if(STATE.tab==='history'){
    const allMovements=[...loadMovements()].reverse();
    const historyFilter=STATE.historyFilter||'all';
    const MOVE_FILTERS=[
      {key:'all',label:'All'},
      {key:'yard_yard',label:'Yard → Yard'},
      {key:'to_orchard',label:'Yard → Orchard'},
      {key:'from_orchard',label:'Orchard → Yard'},
      {key:'orchard_orchard',label:'Orchard → Orchard'},
    ];
    const filterRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'12px'}});
    MOVE_FILTERS.forEach(f=>{
      const active=historyFilter===f.key;
      filterRow.appendChild(h('button',{type:'button',style:{padding:'6px 12px',borderRadius:'20px',border:'1.5px solid '+(active?'#6a4fa8':'#ddd'),background:active?'#6a4fa818':'#fff',color:active?'#6a4fa8':'#888',fontSize:'12px',fontWeight:'700',cursor:'pointer'},
        onClick:()=>setState({historyFilter:f.key})},f.label));
    });
    screen.appendChild(filterRow);
    const movements=historyFilter==='all'?allMovements:allMovements.filter(m=>{
      const dir=m.direction||'from_orchard'; // no direction stored = orchard→yard pickup, matches card logic below
      if(historyFilter==='from_orchard') return dir!=='to_orchard'&&dir!=='yard_yard'&&dir!=='orchard_orchard';
      return dir===historyFilter;
    });
    if(!movements.length){screen.appendChild(h('div',{className:'empty-msg'},allMovements.length?'No movements match this filter':'No movements logged yet'));}
    else{
      screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},movements.length+' movement'+(movements.length===1?'':'s')+(historyFilter!=='all'?' of '+allMovements.length:'')));
      const beekeepingYearLabel=dateStr=>{
        if(!dateStr) return 'Unknown';
        const [y,mo]=dateStr.split('-').map(Number);
        const startYear=mo>=6?y:y-1;
        return startYear+'-'+(startYear+1);
      };
      let lastYearLabel=null;
      movements.forEach(m=>{
        const yl=beekeepingYearLabel(m.date);
        if(yl!==lastYearLabel){
          lastYearLabel=yl;
          screen.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#6a4fa8',margin:'14px 0 8px',paddingBottom:'4px',borderBottom:'1.5px solid #6a4fa833'}},yl));
        }
        const isOut=m.direction==='to_orchard';
        const isYY=m.direction==='yard_yard';
        const isOO=m.direction==='orchard_orchard';
        const title=isOut?(m.from_site||'?')+' → '+(m.to_orchard||'?'):isYY?(m.from_site||'?')+' → '+(m.to_site||'?'):isOO?(m.from_orchard||'?')+' → '+(m.to_orchard||'?'):(m.from_orchard||'?')+' → '+(m.to_site||'?');
        const sub=(m.pallets||0)+'p · '+(m.singles||0)+'s';
        const fromYardsStr=(m.from_yards&&m.from_yards.length)?'From: '+m.from_yards.join(', '):'';
        const meta=[m.driver,m.vehicle].filter(Boolean).join(' · ');
        const card=h('div',{style:{background:'#fff',border:`.5px solid ${isOut?'#ef9f27':isYY?'#6ab0e0':isOO?'#e0a06a':'#3d7a4f'}33`,borderLeft:`3px solid ${isOut?'#ef9f27':isYY?'#6ab0e0':isOO?'#e0a06a':'#3d7a4f'}`,borderRadius:'10px',padding:'11px 13px',marginBottom:'7px',overflow:'hidden'}});
        const mainRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
        mainRow.appendChild(h('div',{style:{flex:'1'}},
          h('div',{style:{fontWeight:'600',fontSize:'14px'}},title),
          h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},sub+(meta?' · '+meta:'')),
          fromYardsStr?h('div',{style:{fontSize:'12px',color:'#7a4fa8',marginTop:'2px'}},fromYardsStr):null,
          m.notes?h('div',{style:{fontSize:'12px',color:'#555',marginTop:'4px',background:'#f8f8f6',borderRadius:'5px',padding:'4px 8px'}},m.notes):null
        ));
        mainRow.appendChild(h('div',{style:{textAlign:'right',flexShrink:'0',marginLeft:'8px'}},
          h('div',{style:{fontSize:'12px',color:'#aaa'}},fmtDate(m.date)),
          h('div',{style:{fontSize:'11px',color:'#bbb',marginTop:'2px'}},m.logged_by||'')
        ));
        card.appendChild(mainRow);
        // Edit + Delete buttons
        const btnBar=h('div',{style:{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'8px'}});
        // Edit button
        const editBtn=h('button',{style:{padding:'4px 10px',background:'none',border:'.5px solid #bbb',borderRadius:'20px',fontSize:'11px',color:'#555',cursor:'pointer',fontWeight:'600'},
          onClick:()=>showEditMovementModal(m)
        },'Edit');
        btnBar.appendChild(editBtn);
        const delBtn=h('button',{style:{padding:'4px 10px',background:'none',border:'.5px solid #f4a0a0',borderRadius:'20px',fontSize:'11px',color:'#c0392b',cursor:'pointer',fontWeight:'600'},
          onClick:()=>{
            // Confirm
            const overlay=h('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
            const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'22px',width:'100%',maxWidth:'300px'}});
            box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px'}},'Delete movement?'));
            box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'6px'}},title));
            box.appendChild(h('div',{style:{fontSize:'12px',color:'#999',marginBottom:'18px'}},'This will also remove the auto-generated diary entry from the yard history.'));
            const btnRow2=h('div',{style:{display:'flex',gap:'10px'}});
            btnRow2.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
              onClick:async()=>{
                // Delete movement from list
                const updated=(await getMergedRemoteMovements()).map(x=>x.id===m.id?{...x,deleted:true,deletedAt:new Date().toISOString()}:x);
                saveMovements(updated);
                await pushToSupabase('hive_movements',updated);
                // Delete matching diary entries from affected yard sites
                async function removeDiaryEntry(opName, siteKey){
                  if(!opName||!siteKey) return;
                  const k=eKey(opName,siteKey,roundForDate(m.date)||'spring');
                  const existing=STATE.entries[k]||[];
                  // Match by _movement flag and movement id stored in comments
                  const filtered=existing.filter(e=>!(e._movement&&e.date===m.date&&e.comments&&(
                    e.comments.includes(m.to_orchard||'')||
                    e.comments.includes(m.from_orchard||'')||
                    e.comments.includes(m.to_site||'')||
                    e.comments.includes(m.from_site||'')
                  )));
                  if(filtered.length!==existing.length){
                    const updEntries={...STATE.entries,[k]:filtered};
                    saveLocal(updEntries);
                    await pushToSupabase(k,filtered);
                    STATE.entries=updEntries;
                  }
                }
                const isOut=m.direction==='to_orchard';
                const isYY=m.direction==='yard_yard';
                if(isOut) await removeDiaryEntry(m.from_op,m.from_site);
                else if(!isOut&&!isYY) await removeDiaryEntry(m.to_op,m.to_site);
                else if(isYY){
                  await removeDiaryEntry(m.from_op,m.from_site);
                  await removeDiaryEntry(m.to_op,m.to_site);
                }
                overlay.remove();
                showToast('Movement and diary entry deleted');
                setState({tab:'history'});
              }
            },'Yes, delete'));
            btnRow2.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
              onClick:()=>overlay.remove()
            },'Cancel'));
            box.appendChild(btnRow2);
            overlay.appendChild(box);
            overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
            document.body.appendChild(overlay);
          }
        },'Delete');
        btnBar.appendChild(delBtn);
        card.appendChild(btnBar);
        screen.appendChild(card);
      });
    }
  }

  app.appendChild(screen);
  return app;
}

function renderYardsTab(opName){
  const screen=h('div',{className:'screen'});
  const opData=OPERATIONS[opName];
  const allYards=getYards(opName);
  const custom=loadCustomYards()[opName]||{};

  screen.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'4px',marginTop:'4px'}},'Manage Yards'));
  screen.appendChild(h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'16px',lineHeight:'1.5'}},'Add new yards and batches to '+opName+'. Built-in yards cannot be removed.'));

  // ── Add new site form ──
  const addCard=h('div',{className:'form-card',style:{marginBottom:'20px'}});
  addCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#555',marginBottom:'12px'}},'+ Add new yard'));

  // Batch — existing or new
  addCard.appendChild(h('label',{className:'lbl'},'Batch'));
  const batchSel=h('select',{className:'inp',style:{marginBottom:'8px'}});
  batchSel.appendChild(h('option',{value:''},'— Select batch —'));
  Object.keys(allYards).forEach(b=>batchSel.appendChild(h('option',{value:b},b)));
  batchSel.appendChild(h('option',{value:'__new__'},'+ Create new batch'));
  addCard.appendChild(batchSel);

  const newBatchWrap=h('div',{style:{display:'none',marginBottom:'8px'}});
  newBatchWrap.appendChild(h('label',{className:'lbl'},'New batch name'));
  const newBatchInp=h('input',{type:'text',placeholder:'Batch name',className:'inp'});
  newBatchWrap.appendChild(newBatchInp);
  addCard.appendChild(newBatchWrap);
  batchSel.addEventListener('change',e=>{
    newBatchWrap.style.display=e.target.value==='__new__'?'block':'none';
  });

  addCard.appendChild(h('label',{className:'lbl',style:{marginTop:'8px',display:'block'}},'Yard name'));
  const siteInp=h('input',{type:'text',placeholder:'New yard name',className:'inp',style:{marginBottom:'12px'}});
  addCard.appendChild(siteInp);

  addCard.appendChild(h('button',{style:{width:'100%',padding:'11px',background:opData.color,color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
    onClick:()=>{
      let batchName=batchSel.value==='__new__'?newBatchInp.value.trim():batchSel.value;
      const siteName=siteInp.value.trim();
      if(!batchName){showToast('Select or enter a batch name');return;}
      if(!siteName){showToast('Enter a yard name');return;}
      // Check not duplicate
      const yards=getYards(opName);
      if(yards[batchName]?.sites.includes(siteName)){showToast('That yard already exists in this batch');return;}
      addCustomSite(opName,batchName,siteName);
      showToast(`${siteName} added to ${batchName}`);
      setState({tab:'settings'});
    }
  },'Add yard'));
  screen.appendChild(addCard);

  // ── Existing yards ──
  Object.entries(allYards).forEach(([batchName,batchData])=>{
    const isCustomBatch=!!custom[batchName];
    const section=h('div',{style:{marginBottom:'16px'}});
    section.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'#888',marginBottom:'6px',paddingLeft:'2px'}},
      batchName+(isCustomBatch?' (custom)':'')));
    batchData.sites.forEach(site=>{
      const isCustomSite=custom[batchName]?.sites?.includes(site);
      const row=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',padding:'9px 12px',marginBottom:'5px',display:'flex',justifyContent:'space-between',alignItems:'center'}});
      row.appendChild(h('span',{style:{fontSize:'14px',color:'#333'}},site+(isCustomSite?' ✎':'')));
      if(isCustomSite){
        row.appendChild(h('button',{style:{background:'none',border:'none',color:'#e24b4a',fontSize:'13px',fontWeight:'600',cursor:'pointer',padding:'0'},
          onClick:()=>confirmAction('Remove '+site+' from '+batchName+'?',()=>{
            removeCustomSite(opName,batchName,site);
            showToast(site+' removed');
            setState({tab:'settings'});
          })
        },'Remove'));
      } else {
        row.appendChild(h('span',{style:{fontSize:'11px',color:'#ccc'}},'built-in'));
      }
      section.appendChild(row);
    });
    screen.appendChild(section);
  });
  return screen;
}

function renderApp(){
  const op=STATE.op;
  if(!op) return renderOpSelector();
  if(op==='__movements__') return renderMovementsScreen();
  if(op==='__reports__') return renderReportsScreen();
  if(op==='__nucs__') return renderNucsScreen();

  const opData=OPERATIONS[op];
  document.documentElement.style.setProperty('--op-color',opData.color);
  document.documentElement.style.setProperty('--op-accent',opData.accent);
  const allSites=Object.values(getYards(op)).flatMap(y=>y.sites);
  const flaggedCount=allSites.filter(site=>{const dates=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).map(e=>e.date));const latest=dates.sort().reverse()[0];return !latest||daysBetween(latest)>21;}).length;
  const app=h('div',{className:'app'});
  const header=h('div',{className:'header'});
  const topRow=h('div',{className:'header-top'});
  topRow.appendChild(h('button',{className:'back-btn',onClick:()=>setState({op:null})},'‹ Ops'));
  topRow.appendChild(h('div',{className:'header-sub'},'Apiary Diary'));
  topRow.appendChild(h('div',{className:'sync-dot',style:{marginLeft:'auto'}}));
  header.appendChild(topRow);
  header.appendChild(h('div',{className:'header-title'},op+' — '+(STATE.userName||'')));
  const tb=h('div',{className:'tab-bar'});
  [{key:'overview',label:'Overview'+(flaggedCount>0?` ⚑${flaggedCount}`:'')},{key:'diary',label:'Diary'},{key:'export',label:'Export / Sync'},{key:'settings',label:'Yards'}].forEach(t=>{
    tb.appendChild(h('button',{className:'tab-btn'+(STATE.tab===t.key?' active':''),onClick:()=>setState({tab:t.key})},t.label));
  });
  header.appendChild(tb);
  app.appendChild(header);
  if(STATE.tab==='overview')app.appendChild(renderOverviewTab());
  else if(STATE.tab==='diary')app.appendChild(renderDiaryTab());
  else if(STATE.tab==='export')app.appendChild(renderExportTab());
  else if(STATE.tab==='settings')app.appendChild(renderYardsTab(op));
  return app;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  root.appendChild(renderApp());
  document.querySelectorAll('.sync-dot').forEach(d=>{d.className='sync-dot '+STATE.syncStatus;});

window.addEventListener('online',async()=>{
  document.getElementById('offline-bar').classList.remove('show');

// ── Service Worker (offline caching) ─────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    // Force update check every time app opens
    reg.update();
    // When a new SW is waiting, activate it immediately
    reg.addEventListener('updatefound',()=>{
      const newSW=reg.installing;
      if(!newSW) return;
      newSW.addEventListener('statechange',()=>{
        if(newSW.state==='installed'&&navigator.serviceWorker.controller){
          // New version ready — tell it to skip waiting and reload
          newSW.postMessage({type:'SKIP_WAITING'});
        }
      });
    });
  }).catch(e=>console.warn('SW registration failed:',e));
  // Reload when new SW takes control
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;window.location.reload();}
  });
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// ── PIN gate ─────────────────────────────────────────────────────────────────
const PIN_HASH_KEY='apiary_pin_hash';
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+'apiary_salt_2024'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPin(pin){
  const stored=localStorage.getItem(PIN_HASH_KEY);
  if(!stored) return false;
  const hash=await hashPin(pin);
  return hash===stored;
}
async function setPin(pin){
  const hash=await hashPin(pin);
  localStorage.setItem(PIN_HASH_KEY,hash);
}

function showPinGate(onSuccess){
  const existing=document.getElementById('pin-gate');
  if(existing) existing.remove();
  const isSetup=!localStorage.getItem(PIN_HASH_KEY);
  const overlay=document.createElement('div');
  overlay.id='pin-gate';
  overlay.style.cssText='position:fixed;inset:0;background:#1a2e1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:30px;';

  const logo=document.createElement('div');
  logo.style.cssText='font-size:40px;margin-bottom:8px;';
  logo.textContent='🐝';
  overlay.appendChild(logo);

  const title=document.createElement('div');
  title.style.cssText='font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-.02em;';
  title.textContent='Apiary Diary';
  overlay.appendChild(title);

  const sub=document.createElement('div');
  sub.style.cssText='font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:32px;';
  sub.textContent=isSetup?"Set a PIN to secure your data":"Enter PIN to continue";
  overlay.appendChild(sub);

  // PIN dots display
  const dotsRow=document.createElement('div');
  dotsRow.style.cssText='display:flex;gap:14px;margin-bottom:28px;';
  const dots=[];
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.style.cssText='width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);background:transparent;transition:background .1s;';
    dots.push(d);dotsRow.appendChild(d);
  }
  overlay.appendChild(dotsRow);

  let entered='';
  const errMsg=document.createElement('div');
  errMsg.style.cssText='font-size:13px;color:#f4a0a0;margin-bottom:16px;min-height:18px;';
  overlay.appendChild(errMsg);

  // Confirm field for setup
  let confirming=false;
  let firstPin='';

  function updateDots(){
    dots.forEach((d,i)=>{d.style.background=i<entered.length?'#7ecb8f':'transparent';});
  }

  async function handleComplete(){
    if(isSetup||confirming){
      if(isSetup&&!confirming){
        firstPin=entered;entered='';confirming=true;
        sub.textContent="Confirm your PIN";
        errMsg.textContent='';updateDots();return;
      }
      if(entered!==firstPin){
        errMsg.textContent='PINs do not match. Try again.';
        entered='';confirming=false;firstPin='';
        sub.textContent="Set a PIN to secure your data";
        updateDots();return;
      }
      await setPin(entered);
      overlay.remove();onSuccess();
    } else {
      const ok=await checkPin(entered);
      if(ok){overlay.remove();onSuccess();}
      else{errMsg.textContent='Incorrect PIN';entered='';updateDots();}
    }
  }

  // Numpad
  const pad=document.createElement('div');
  pad.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;';
  [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(n=>{
    const btn=document.createElement('button');
    btn.style.cssText='padding:18px;font-size:20px;font-weight:700;border:none;border-radius:12px;cursor:pointer;'+(n===''?'background:transparent;color:transparent;pointer-events:none;':'background:rgba(255,255,255,0.1);color:#fff;');
    btn.textContent=String(n);
    if(n!==''){
      btn.addEventListener('click',async()=>{
        if(n==='⌫'){entered=entered.slice(0,-1);}
        else if(entered.length<4){entered+=String(n);}
        updateDots();
        if(entered.length===4) setTimeout(handleComplete,120);
      });
    }
    pad.appendChild(btn);
  });
  overlay.appendChild(pad);
  document.body.appendChild(overlay);
}

async function boot(){
  // Check PIN before showing app
  const hasPinSet=!!localStorage.getItem(PIN_HASH_KEY);
  if(!hasPinSet){
    // First time — set up PIN
    showPinGate(()=>bootApp());
    return;
  }
  showPinGate(()=>bootApp());
}

async function bootApp(){
  // ── One-time migration: backfill AFB inquiry keys from existing entries ──
  if(!localStorage.getItem('apiary_migrated_afb')){
    try{
      const allE=JSON.parse(localStorage.getItem('apiary_entries')||'{}');
      Object.entries(allE).forEach(([key,entries])=>{
        // key format: op__site__round
        const parts=key.split('__');
        if(parts.length<3) return;
        const op=parts[0];
        const site=parts.slice(1,parts.length-1).join('__');
        (entries||[]).forEach(e=>{
          if((e.diseases||'').includes('AFB')&&e.date){
            const ik='apiary_afb_'+op+'__'+site;
            if(!localStorage.getItem(ik)){
              // Check not expired (within 2 years)
              const found=new Date(e.date);
              const expiry=new Date(found);expiry.setFullYear(expiry.getFullYear()+2);
              if(new Date()<expiry){
                localStorage.setItem(ik,JSON.stringify({date:e.date,site,op}));
              }
            }
          }
        });
      });
    }catch(e){console.warn('AFB migration failed:',e);}
    localStorage.setItem('apiary_migrated_afb','1');
  }

  // ── One-time migration: move Jun-Jul clover entries to winter round ──
  if(!localStorage.getItem('apiary_migrated_winter')){
    try{
      const allEntries=JSON.parse(localStorage.getItem('apiary_entries')||'{}');
      let changed=false;
      const newEntries={};
      Object.entries(allEntries).forEach(([key,entries])=>{
        // Check if this is a clover round key
        if(key.endsWith('__clover')){
          const base=key.slice(0,key.length-7); // remove '__clover'
          const winterKey=base+'__winter';
          const winterEntries=allEntries[winterKey]||[];
          // Find entries in Jun-Jul that should be winter
          const toMove=entries.filter(e=>{
            const mo=parseInt((e.date||'').split('-')[1]);
            return mo===6||mo===7;
          });
          const remaining=entries.filter(e=>{
            const mo=parseInt((e.date||'').split('-')[1]);
            return mo!==6&&mo!==7;
          });
          if(toMove.length){
            newEntries[key]=remaining;
            newEntries[winterKey]=[...winterEntries,...toMove];
            changed=true;
          } else {
            newEntries[key]=entries;
          }
        } else if(!newEntries[key]){
          newEntries[key]=entries;
        }
      });
      if(changed){
        localStorage.setItem('apiary_entries',JSON.stringify(newEntries));
        console.log('Migrated Jun-Jul clover entries to winter round');
      }
    }catch(e){console.warn('Migration failed:',e);}
    localStorage.setItem('apiary_migrated_winter','1');
  }

  // Show app immediately with local data
  render();

  // Proactively cache this page for offline use whenever we have signal
  if(navigator.onLine&&'caches' in window){
    caches.open('apiary-v7').then(cache=>{
      cache.add(window.location.href).catch(()=>{});
    }).catch(()=>{});
  }

  if(!navigator.onLine){
    updateSyncDot('offline');
    showToast('Offline — using local data. Will sync when back in range.');
    return;
  }
  // Load Supabase library first, then pull data
  updateSyncDot('syncing');
  // Add timeout so slow signal doesn't block the app
  const loadTimeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),8000));
  try{
    _sbLoaded = await Promise.race([
      loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'),
      loadTimeout
    ]);
  }catch(e){ _sbLoaded=false; }

  if(_sbLoaded){
    try{
      window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      await pullFromSupabase();
      subscribeRealtime();
      await flushPending();
      updateSyncDot('online');
    }catch(e){
      console.warn('Supabase init failed:',e);
      updateSyncDot('offline');
      showToast('Sync failed — using local data');
    }
  } else {
    updateSyncDot('offline');
    showToast('No cloud connection — using local data. Will sync when back in range.');
  }
  // Load EmailJS in background then check quarterly backup
  loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js').then(async loaded=>{
    _ejLoaded=loaded;
    if(loaded){
      try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}
      // Check if quarterly backup is due
      await maybeQuarterlyBackup();
    }
  });
}
boot();
