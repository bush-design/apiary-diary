<script>
// Lazy-load Supabase and EmailJS only when online — app works fully without them
let _sbLoaded = false, _ejLoaded = false;

function loadScript(src) {
  return new Promise((resolve) => {
    if (!navigator.onLine) { resolve(false); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

async function loadLibraries() {
  if (!navigator.onLine) return;
  if (!_sbLoaded) {
    _sbLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
    if (_sbLoaded) {
      try {
        window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        subscribeRealtime();
        await pullFromSupabase();
        await flushPending();
      } catch(e) { _sbLoaded = false; }
    }
  }
  if (!_ejLoaded) {
    _ejLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if (_ejLoaded) {
      try { emailjs.init(EMAILJS_PUBLIC); } catch(e) { _ejLoaded = false; }
    }
  }
}

// Movement storage — separate from diary entries.
//
// Deletions are soft (a {deleted:true} tombstone), not a hard removal from the array. This
// matters for merge-safety: getMergedRemoteMovements() below has to combine this device's local
// list with whatever's currently on the server, and it can't tell "a movement I haven't pushed
// yet" apart from "a movement someone else already deleted, that my stale local cache just
// hasn't caught up to removing" — both simply look like "present locally, absent from remote".
// Treating that ambiguity as "keep it" (the natural default) would silently resurrect deleted
// movements on whichever device's local cache was behind. A tombstone removes the ambiguity:
// deletion becomes a fact that gets merged and synced like any other change, instead of an
// absence that has to be inferred and can be un-inferred by accident.
//
// loadMovements() — used everywhere the app actually displays or computes from movements —
// filters tombstones out, so nothing else in the app needs to know this exists.
function loadMovements(){try{return JSON.parse(localStorage.getItem('apiary_movements')||'[]').filter(m=>!m.deleted);}catch(e){return[];}}
// loadMovementsRaw() includes tombstones — only for the sync/merge machinery below.
function loadMovementsRaw(){try{return JSON.parse(localStorage.getItem('apiary_movements')||'[]');}catch(e){return[];}}
function saveMovements(m){try{localStorage.setItem('apiary_movements',JSON.stringify(m));}catch(e){}}

// Fetches the CURRENT remote movements list (not this device's possibly-stale local cache) and
// merges it with the local list by id, tombstone-aware: if either side has a movement marked
// deleted, the merged result keeps it deleted — a deletion is never silently undone by an older
// non-deleted copy on the other side. Returns the RAW array (tombstones included); callers that
// write should save/push this directly, callers that read for display should go through
// loadMovements() instead. Movements are stored as one array under a single Supabase key, so a
// plain "read local, modify, push" cycle would otherwise silently lose anything another device
// pushed in the meantime — reading fresh from remote right before every add/edit/delete closes
// most of that race window (not a true atomic transaction, but makes concurrent edits from two
// phones at once very unlikely to lose data, versus certain before this fix).
async function getMergedRemoteMovements(){
  const local=loadMovementsRaw();
  if(!navigator.onLine||!window._sb) return local;
  try{
    const {data,error}=await window._sb.from('entries').select('data').eq('entry_key','hive_movements').maybeSingle();
    if(error||!data||!Array.isArray(data.data)) return local;
    const byId={};
    data.data.forEach(m=>{byId[m.id]=m;});
    local.forEach(m=>{
      const existing=byId[m.id];
      if(!existing) byId[m.id]=m; // local-only, not yet synced
      else if(m.deleted&&!existing.deleted) byId[m.id]={...existing,...m,deleted:true}; // local deletion wins
    });
    return Object.values(byId);
  }catch(e){
    return local; // offline or fetch failed — fall back to local cache rather than blocking
  }
}

async function addMovement(mov){
  const movements=[...(await getMergedRemoteMovements()),mov];
  saveMovements(movements);
  await pushToSupabase('hive_movements',movements);
  // Auto-log movement entries into yard site diaries
  const totalOnLoad=(parseInt(mov.alive_hives)||0)+(parseInt(mov.dead_hives)||0);
  const hiveChange = totalOnLoad>0 ? totalOnLoad : mov.hives ? parseInt(mov.hives)||0 : (parseInt(mov.pallets)||0)*4+(mov.half_pallet?2:0)+(parseInt(mov.singles)||0);

  async function logToSite(siteKey, opName, isDeduction){
    if(!siteKey||!opName) return;
    const rk = roundForDate(mov.date) || STATE.round || 'spring';
    const k = eKey(opName, siteKey, rk);
    const existing = STATE.entries[k]||[];

    // If this is a delivery (not a pickup) and it's part of a truckload with other pickups
    // already logged to this same yard, merge into that entry instead of stacking a new one —
    // several yards' worth collected on one truck run should show as a single delivery at the
    // destination. Pickups logged separately (no shared truckload, e.g. one-off movements)
    // always get their own entry, same as before.
    const mergeTarget = (!isDeduction && mov.truckload_id && existing[0]?._movement && existing[0]?.truckload_id===mov.truckload_id) ? existing[0] : null;

    // Look across ALL rounds (not just this one) for the most recent state as of the
    // movement date, so movements/entries logged in different seasonal buckets still
    // carry forward correctly instead of resetting when a movement lands in a new season.
    const allSiteEntries = Object.keys(ROUNDS).flatMap(r2=>(STATE.entries[eKey(opName,siteKey,r2)]||[]))
      .filter(e=>e.date<=mov.date)
      .sort((a,b)=>{
        const dc=(b.date||'').localeCompare(a.date||'');
        return dc!==0?dc:(b.logged_at||b.saved_at||'').localeCompare(a.logged_at||a.saved_at||'');
      });
    const lastAny = allSiteEntries[0]||null; // most recent entry of any kind (incl. movements) — hive count stacks across movements
    // Get last real entry for current doubles/singles
    const lastReal=allSiteEntries.find(e=>!e._movement)||null;
    const lastHives = parseInt(lastAny?.hives)||0;
    const newHives = isDeduction ? Math.max(0,lastHives-hiveChange) : lastHives+hiveChange;
    // Determine how many doubles/singles/light this leg is moving. Priority:
    //  1. Explicit "Boxes in this load" fields, if the person filled them in.
    //  2. The actual source yard's OWN recorded doubles/singles — a yard with 6 doubles that
    //     gets moved should transfer 6 doubles to the destination, full stop. This is the
    //     yard's real hive-structure data (single vs double brood chamber), not the truck's
    //     transport packing, which is a different thing entirely.
    //  3. Only when there's no yard to check at all (moving from an orchard, which has no
    //     doubles/singles data of its own) does this fall back to Truck Space pallets/singles
    //     as a rough best-available guess.
    let movDoubles=parseInt(mov.doubles)||0;
    let movSingles=parseInt(mov.singles_boxes)||0;
    let movLight=parseInt(mov.light)||0;
    if(!movDoubles&&!movSingles&&!movLight){
      if(isDeduction){
        // Already looking at the source yard's own most recent real entry
        movDoubles=parseInt(lastReal?.doubles)||0;
        movSingles=parseInt(lastReal?.singles)||0;
        movLight=parseInt(lastReal?.light)||0;
      } else if(mov.from_site){
        const srcOp=mov.from_op||opName;
        const tryOps=srcOp?[srcOp]:Object.keys(OPERATIONS);
        for(const tryOp of tryOps){
          const srcEntries=Object.keys(ROUNDS).flatMap(rk2=>
            (STATE.entries[eKey(tryOp,mov.from_site,rk2)]||[]).filter(e=>!e._movement)
          ).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
          if(srcEntries.length){
            movDoubles=parseInt(srcEntries[0]?.doubles)||0;
            movSingles=parseInt(srcEntries[0]?.singles)||0;
            movLight=parseInt(srcEntries[0]?.light)||0;
            break;
          }
        }
      }
      if(!movDoubles&&!movSingles&&!movLight){
        movDoubles=(parseInt(mov.pallets)||0)+(mov.half_pallet?0.5:0);
        movSingles=parseInt(mov.singles)||0;
      }
    }
    // When merging into an in-progress truckload entry, build on ITS current totals (which
    // already include earlier legs of this same delivery) rather than resetting back to the
    // original real diary entry's values — otherwise each subsequent leg would silently
    // discard the ones logged before it in the same load.
    const lastDoubles=parseInt((mergeTarget||lastReal)?.doubles)||0;
    const lastSingles=parseInt((mergeTarget||lastReal)?.singles)||0;
    const lastLight=parseInt((mergeTarget||lastReal)?.light)||0;

    let newDoubles,newSingles,newLight;
    if(isDeduction){
      // Source yard: deduct what was actually moved
      newDoubles=Math.max(0,lastDoubles-movDoubles);
      newSingles=Math.max(0,lastSingles-movSingles);
      newLight=Math.max(0,lastLight-movLight);
    } else {
      // Destination yard: add what was actually moved
      newDoubles=lastDoubles+movDoubles;
      newSingles=lastSingles+movSingles;
      newLight=lastLight+movLight;
    }
    const truckStr=(parseInt(mov.pallets)||0)+(mov.half_pallet?'½':'')+'p'+(parseInt(mov.singles)>0?' + '+mov.singles+'s':'');
    const hiveStr=(parseInt(mov.alive_hives)||0)+(parseInt(mov.dead_hives)>0?` alive, ${mov.dead_hives} dead`+' hives':' alive hives');
    const hiveDetail=parseInt(mov.alive_hives)>0?' ('+hiveStr+')':'';
    // legDesc is just this pickup's own contribution (no "MOVED IN:" prefix) — reused whether
    // it starts a new entry or gets appended onto a merged one.
    let legDesc,desc;
    if(mov.direction==='to_orchard'){ legDesc=`${truckStr}${hiveDetail} → ${mov.to_orchard}`; desc=`MOVEMENT OUT: ${legDesc}`; }
    else if(mov.direction==='from_orchard'){ legDesc=`${truckStr}${hiveDetail} ← ${mov.from_orchard}`; desc=`MOVEMENT IN: ${legDesc}`; }
    else if(isDeduction){ legDesc=`${truckStr}${hiveDetail} → ${mov.to_site}`; desc=`MOVED OUT: ${legDesc}`; }
    else { legDesc=`${truckStr}${hiveDetail} ← ${mov.from_site}`; desc=`MOVED IN: ${legDesc}`; }

    if(mergeTarget){
      const mergedEntry={
        ...mergeTarget,
        hives: String(newHives),
        hivesMoved: String((parseInt(mergeTarget.hivesMoved)||0)+hiveChange),
        doubles: newDoubles>0?String(newDoubles):'',
        singles: newSingles>0?String(newSingles):'',
        light: newLight>0?String(newLight):'',
        comments: mergeTarget.comments+', '+legDesc,
        saved_at: new Date().toISOString(),
      };
      const updated = {...STATE.entries, [k]: [mergedEntry, ...existing.slice(1)]};
      saveLocal(updated);
      await pushToSupabase(k, updated[k]);
      STATE.entries = updated;
      return;
    }
    const movEntry = {
      date: mov.date,
      hives: String(newHives),
      hivesMoved: String(hiveChange),
      doubles: newDoubles>0?String(newDoubles):'',
      singles: newSingles>0?String(newSingles):'',
      light: newLight>0?String(newLight):'',
      comments: desc,
      logged_by: mov.logged_by,
      saved_at: new Date().toISOString(),
      truckload_id: mov.truckload_id,
      _movement: true
    };
    const updated = {...STATE.entries, [k]: [movEntry, ...existing]};
    saveLocal(updated);
    await pushToSupabase(k, updated[k]);
    STATE.entries = updated;
  }

  if(mov.direction==='to_orchard'){
    await logToSite(mov.from_site, mov.from_op, true);
  } else if(mov.direction==='from_orchard'){
    await logToSite(mov.to_site, mov.to_op, false);
  } else if(mov.direction==='yard_yard'){
    await logToSite(mov.from_site, mov.from_op, true);   // deduct from source
    await logToSite(mov.to_site, mov.to_op, false);      // add to destination
  }
}

function getOrchardTotals(){
  // Returns {orchard: {pallets, singles, hives}} from all movements
  const movements=loadMovements();
  const totals={};
  getAllOrchards().forEach(o=>totals[o]={pallets:0,singles:0,hives:0});
  movements.forEach(m=>{
    const pallets=parseInt(m.pallets)||0;
    const singles=parseInt(m.singles)||0;
    const hives=pallets*4+singles;
    if(m.direction==='to_orchard'){
      const o=m.to_orchard;
      if(!totals[o])totals[o]={pallets:0,singles:0,hives:0};
      totals[o].pallets+=pallets;totals[o].singles+=singles;totals[o].hives+=hives;
    } else {
      const o=m.from_orchard;
      if(!totals[o])totals[o]={pallets:0,singles:0,hives:0};
      totals[o].pallets=Math.max(0,totals[o].pallets-pallets);
      totals[o].singles=Math.max(0,totals[o].singles-singles);
      totals[o].hives=Math.max(0,totals[o].hives-hives);
    }
  });
  return totals;
}

// Merge custom yards into OPERATIONS at runtime
function getYards(opName){
  const base=OPERATIONS[opName].yards;
  const custom=loadCustomYards()[opName]||{};
  const merged={};
  // Start with all base batches
  Object.entries(base).forEach(([batch,data])=>{
    const customSites=custom[batch]?.sites||[];
    const allSites=[...data.sites,...customSites.filter(s=>!data.sites.includes(s))];
    merged[batch]={...data,sites:allSites};
  });
  // Add any entirely new custom batches
  Object.entries(custom).forEach(([batch,data])=>{
    if(!merged[batch]) merged[batch]=data;
  });
  return merged;
}
function addCustomSite(opName,batchName,siteName){
  const cy=loadCustomYards();
  if(!cy[opName])cy[opName]={};
  // Never touch built-in sites - only manage the custom sites array
  if(!cy[opName][batchName])cy[opName][batchName]={type:'run',sites:[]};
  if(!cy[opName][batchName].sites.includes(siteName))cy[opName][batchName].sites.push(siteName);
  saveCustomYards(cy);
  pushToSupabase('custom_yards',cy);
}
function removeCustomSite(opName,batchName,siteName){
  // Safety check: never remove a built-in site
  const builtIn=OPERATIONS[opName]?.yards[batchName]?.sites||[];
  if(builtIn.includes(siteName)){console.warn('Refusing to remove built-in site:',siteName);return;}
  const cy=loadCustomYards();
  if(!cy[opName]?.[batchName]) return;
  cy[opName][batchName].sites=cy[opName][batchName].sites.filter(s=>s!==siteName);
  if(!cy[opName][batchName].sites.length) delete cy[opName][batchName];
  if(!Object.keys(cy[opName]||{}).length) delete cy[opName];
  saveCustomYards(cy);
  pushToSupabase('custom_yards',cy);
}

// ── Pallet/singles split storage ─────────────────────────────────────────────
// Tracks how many of a yard's hives currently sit on pallets vs. as loose, unpalletised
// singles — separate from the diary's "singles/doubles" brood-chamber fields, which describe
// hive box configuration, not transport packing. A yard can be mixed (e.g. mostly singles with
// a few pallets just dropped in), so this is two independent counts, not a single either/or tag.
//
// Modelled as a manually-set BASELINE (set once per yard, or updated any time it drifts from
// reality) plus the net of whatever movements have touched that yard since — the same
// baseline-plus-movements-since pattern computeCurrentHivesForSite() uses, rather than a
// running total that gets nudged on every movement. That matters: a nudge-on-every-event model
// has no way to un-nudge itself if a movement is later edited or deleted, which is exactly the
// class of bug that caused hive counts to drift earlier. Computing fresh every time means there
// is nothing to forget to reverse.
function loadPalletBaselines(){try{return JSON.parse(localStorage.getItem('apiary_pallet_baseline')||'{}');}catch(e){return{};}}
function savePalletBaselines(s){try{localStorage.setItem('apiary_pallet_baseline',JSON.stringify(s));}catch(e){}}
function palletBaselineKey(op,site){return `${op}__${site}__palletbase`;}
async function setPalletBaseline(op,site,pallets,singles){
  const s=loadPalletBaselines();
  const k=palletBaselineKey(op,site);
  const val={pallets:Math.max(0,pallets||0),singles:Math.max(0,Math.round(singles)||0),setAt:new Date().toISOString()};
  s[k]=val;
  savePalletBaselines(s);
  await pushToSupabase(k,val).catch(e=>console.warn('Pallet baseline sync failed:',e));
}
// Current split = the last manually-set baseline, adjusted by the net of any movements logged
// for this yard on or after the baseline was set. Computed fresh every call.
function getCurrentPalletSplit(op,site){
  const s=loadPalletBaselines();
  const base=s[palletBaselineKey(op,site)]||null;
  if(!base) return null; // never set for this yard — caller should prompt to set it
  const cutoff=(base.setAt||'').slice(0,10);
  let pallets=base.pallets,singles=base.singles;
  loadMovements().forEach(m=>{
    if(cutoff&&m.date<cutoff) return;
    const mPallets=(parseInt(m.pallets)||0)+(m.half_pallet?0.5:0);
    const mSingles=parseInt(m.singles)||0;
    if(m.direction==='to_orchard'&&m.from_site===site){pallets-=mPallets;singles-=mSingles;}
    else if(m.direction==='from_orchard'&&m.to_site===site){pallets+=mPallets;singles+=mSingles;}
    else if(m.direction==='yard_yard'&&m.from_site===site){pallets-=mPallets;singles-=mSingles;}
    else if(m.direction==='yard_yard'&&m.to_site===site){pallets+=mPallets;singles+=mSingles;}
  });
  return {pallets:Math.max(0,pallets),singles:Math.max(0,Math.round(singles))};
}

// ── Supabase sync ─────────────────────────────────────────────────────────────
async function pushToSupabase(key, data){
  if(!navigator.onLine||!window._sb){
    const pending=loadPending();
    if(!pending.find(p=>p.key===key)) pending.push({key,data});
    localStorage.setItem('apiary_pending',JSON.stringify(pending));
    return;
  }
  updateSyncDot('syncing');
  try{
    const {error}=await window._sb.from('entries').upsert({entry_key:key,data:data,updated_at:new Date().toISOString()},{onConflict:'entry_key'});
    if(error)throw error;
    updateSyncDot('online');
  }catch(e){
    updateSyncDot('error');
    showToast('Sync error — saved locally');
    const pending=loadPending();
    if(!pending.find(p=>p.key===key)) pending.push({key,data});
    localStorage.setItem('apiary_pending',JSON.stringify(pending));
  }
}

async function pullFromSupabase(){
  if(!navigator.onLine||!window._sb) return;
  updateSyncDot('syncing');
  try{
    const {data,error}=await window._sb.from('entries').select('entry_key,data');
    if(error)throw error;
    if(data&&data.length){
      const merged={...STATE.entries};
      const mergedFlags=loadFlags();
      data.forEach(row=>{
        if(row.entry_key==='hive_movements'){
          // Tombstone-aware merge — see getMergedRemoteMovements for why this can't just be
          // "remote wins" or "keep anything local not on remote": a local deletion not yet
          // pushed would otherwise look identical to a local addition not yet pushed.
          if(row.data&&Array.isArray(row.data)){
            const local=loadMovementsRaw();
            const byId={};
            row.data.forEach(m=>{byId[m.id]=m;});
            local.forEach(m=>{
              const existing=byId[m.id];
              if(!existing) byId[m.id]=m;
              else if(m.deleted&&!existing.deleted) byId[m.id]={...existing,...m,deleted:true};
            });
            saveMovements(Object.values(byId));
          }
          return;
        }
        if(row.entry_key==='custom_orchards'){
          // Supabase is authoritative for custom orchards too
          if(row.data&&Array.isArray(row.data)){
            saveCustomOrchards(row.data);
          }
          return;
        }
        if(row.entry_key==='custom_yards'){
          // Supabase is authoritative for custom yards — use it directly
          // This ensures deletions on one device propagate to all others
          if(row.data&&typeof row.data==='object'){
            saveCustomYards(row.data);
          } else if(row.data&&Object.keys(row.data).length===0){
            saveCustomYards({});
          }
          return;
        }
        if(row.entry_key.endsWith('__palletbase')){
          const bases=loadPalletBaselines();
          if(row.data&&!row.data.deleted){bases[row.entry_key]=row.data;}
          else{delete bases[row.entry_key];}
          savePalletBaselines(bases);return;
        }
        if(row.entry_key.endsWith('__check')&&!row.entry_key.endsWith('__flag')){
          const checks=loadChecks();
          if(row.data&&!row.data.deleted){checks[row.entry_key]=row.data;}
          else{delete checks[row.entry_key];}
          saveChecks(checks);return;
        }
        if(row.entry_key.endsWith('__flag')){
          // It's a flag — restore to local flags store
          if(row.data&&!row.data.deleted){
            mergedFlags[row.entry_key]=row.data;
          } else {
            delete mergedFlags[row.entry_key];
          }
        } else {
          merged[row.entry_key]=row.data;
        }
      });
      saveLocal(merged);
      saveFlags(mergedFlags);
      STATE.entries=merged;
    }
    updateSyncDot('online');
    render();
  }catch(e){
    updateSyncDot('error');
  }
}

async function flushPending(){
  const pending=loadPending();
  if(!pending.length) return;
  updateSyncDot('syncing');
  const failed=[];
  for(const p of pending){
    try{
      const {error}=await window._sb.from('entries').upsert({entry_key:p.key,data:p.data,updated_at:new Date().toISOString()},{onConflict:'entry_key'});
      if(error)throw error;
    }catch(e){failed.push(p);}
  }
  localStorage.setItem('apiary_pending',JSON.stringify(failed));
  if(failed.length===0){showToast('All entries synced');updateSyncDot('online');}
  else updateSyncDot('error');
}

// ── Real-time subscription ────────────────────────────────────────────────────
function subscribeRealtime(){
  window._sb.channel('entries').on('postgres_changes',{event:'*',schema:'public',table:'entries'},payload=>{
    const {entry_key,data}=payload.new||{};
    if(!entry_key) return;
    // Route each special data type to its own storage, exactly like pullFromSupabase does —
    // without this, movements/flags/checks/etc. pushed from another device were silently being
    // written into STATE.entries under the wrong key, so this device's live view never actually
    // updated for them (only a full reload, which re-runs pullFromSupabase, would pick them up).
    if(entry_key==='hive_movements'){
      if(data&&Array.isArray(data)){
        const local=loadMovementsRaw();
        const byId={};
        data.forEach(m=>{byId[m.id]=m;});
        local.forEach(m=>{
          const existing=byId[m.id];
          if(!existing) byId[m.id]=m;
          else if(m.deleted&&!existing.deleted) byId[m.id]={...existing,...m,deleted:true};
        });
        saveMovements(Object.values(byId));
        render();
      }
      return;
    }
    if(entry_key==='custom_orchards'){
      if(data&&Array.isArray(data)) saveCustomOrchards(data);
      render();
      return;
    }
    if(entry_key==='custom_yards'){
      if(data&&typeof data==='object') saveCustomYards(data);
      render();
      return;
    }
    if(entry_key.endsWith('__palletbase')){
      const bases=loadPalletBaselines();
      if(data&&!data.deleted) bases[entry_key]=data; else delete bases[entry_key];
      savePalletBaselines(bases);
      render();
      return;
    }
    if(entry_key.endsWith('__check')&&!entry_key.endsWith('__flag')){
      const checks=loadChecks();
      if(data&&!data.deleted) checks[entry_key]=data; else delete checks[entry_key];
      saveChecks(checks);
      render();
      return;
    }
    if(entry_key.endsWith('__flag')){
      const flags=loadFlags();
      if(data&&!data.deleted) flags[entry_key]=data; else delete flags[entry_key];
      saveFlags(flags);
      render();
      return;
    }
    // Regular diary entries
    if(data){
      STATE.entries[entry_key]=data;
      saveLocal(STATE.entries);
      render();
    }
  }).subscribe();
}

      Object.entries(ROUNDS).forEach(([rk,rd])=>{

            if(parts.length) batchLines.push(`    Spring scores: ${parts.join(', ')}`);
          }
          if(e.treatment) batchLines.push(`    Treatment: ${e.treatment}`);
          if(e.comments) batchLines.push(`    Notes: ${e.comments}`);
          totalHives+=parseInt(e.hives||0)||0;
          totalDead+=parseInt(e.dead||0)||0;
        });
      });
    });
    if(batchLines.length){
      lines.push(`\nBATCH: ${batchName}`);
      lines.push(...batchLines);
    }
  });

  if(!hasData) return null;

  lines.push(`\n${'─'.repeat(40)}`);
  lines.push(`TOTALS FOR TODAY`);
  lines.push(`Total hives visited: ${totalHives}`);
  lines.push(`Total dead: ${totalDead}`);
  lines.push(`\nSent automatically from Apiary Diary`);
  return lines.join('\n');
}

async function sendDailyReport(opName, showFeedback=false){
  if(!navigator.onLine){showToast('No signal — connect to send report');return;}
  const date=todayStr();
  const report=buildDailyReport(opName,date,STATE.userName);
  if(!report){if(showFeedback)showToast('No entries for today to report');return;}
  // Load EmailJS if not already loaded
  if(!window._ejLoaded){
    if(showFeedback)showToast('Loading email service…');
    _ejLoaded=await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if(_ejLoaded){try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}}
  }
  if(!window._ejLoaded||!window.emailjs){
    if(showFeedback)showToast('Email service unavailable — check connection');
    return;
  }
  try{
    if(showFeedback)showToast('Sending report…');
    await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
      to_email: REPORT_EMAIL,

    console.warn('Email send failed:',e);

  }
}

async function maybeQuarterlyBackup(){
  // Check once per day when app loads online
  const today=new Date();
  const lastKey='apiary_quarterly_sent';
  const last=localStorage.getItem(lastKey);
  if(last){
    const lastDate=new Date(last);
    const daysDiff=Math.floor((today-lastDate)/86400000);
    if(daysDiff<85) return; // not 3 months yet (~85 days)
  }
  // It's been 3 months (or never sent) — send for all operations
  if(!navigator.onLine) return;
  // Load EmailJS if needed
  if(!window._ejLoaded){
    _ejLoaded=await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if(_ejLoaded){try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}}
  }
  if(!window._ejLoaded||!window.emailjs) return;
  let sent=false;
  for(const opName of Object.keys(OPERATIONS)){
    const report=buildFullReport(opName);
    if(!report) continue;
    try{
      await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
        to_email:REPORT_EMAIL,
        date:todayStr(),
        report:report,
        operation:opName+' — QUARTERLY BACKUP',
        user:'Automatic backup'
      });
      sent=true;
    }catch(e){console.warn('Quarterly backup failed:',e);}
  }
  if(sent){
    localStorage.setItem(lastKey,today.toISOString());
    showToast('Quarterly backup sent to '+REPORT_EMAIL,4000);
  }
}

// ── Summary calc ──────────────────────────────────────────────────────────────
function calcSummary(opName){
  const sites=allSitesFor(opName);
  // include custom yards
  let hives=0,dead=0,alive=0,deadHives=0,singles=0,doubles=0,light=0,weak=0,lidsFloors=0,formicTotal=0,pol=0,part=0,carrot=0;
  const breederSites=[],finisherSites=[];
  let fdOn=0,on34=0,hcFdOn=0,hcHdOn=0;
  let st=0,sc=0,logged=0,flagged=0;
  sites.forEach(site=>{
    // Find the single most recent entry across ALL rounds for this site
    let best=null, bestRk=null;
    Object.keys(ROUNDS).forEach(rk=>{
      const list=STATE.entries[eKey(opName,site,rk)]||[];
      list.forEach(e=>{if(!best||e.date>best.date){best=e;bestRk=rk;}});
    });
    // Also find most recent date for overdue check
    const allDates=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[]).map(e=>e.date));
    const latestDate=allDates.sort().reverse()[0];
    if(!latestDate||daysBetween(latestDate)>21)flagged++;
    if(!best)return;
    logged++;
    // For each field, use the most recent entry that actually has a value for it
    // This prevents empty fields in a new entry zeroing out previous counts
    const allSiteEntries=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[])).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const HIVE_FIELDS_LV=['hives','dead','singles','doubles','light','weak','alive_hives','dead_hives'];
    // Only lids_floors wants "most recent non-zero" (a maintenance item genuinely may not have
    // been checked this visit). singles/doubles/light/weak respect an explicit 0 — a hive count
    // that correctly records no doubles left shouldn't be skipped for an older stale number.
    const NON_ZERO_FIELDS=['lids_floors'];
    const lastVal=k=>{
      for(const e of allSiteEntries){
        const raw=e[k];
        if(raw===undefined||raw===null||raw==='') continue;
        const v=parseInt(raw);
        if(!isNaN(v)){
          if(NON_ZERO_FIELDS.includes(k)){if(v>0) return v;}
          else if(HIVE_FIELDS_LV.includes(k)) return v;
          else if(v>0) return v;
        }
      }
      return 0;
    };
    hives+=lastVal('hives');dead+=lastVal('dead');singles+=lastVal('singles');doubles+=lastVal('doubles');weak+=lastVal('weak');lidsFloors+=lastVal('lids_floors');
    // Count formic pro hives from treatment string
    const txStr=lastVal('treatment')||''; // won't work for string — use allSiteEntries directly
    const formicEntry=allSiteEntries.find(e=>(e.treatment||'').includes('Formic Pro'));
    if(formicEntry){
      const fm=formicEntry.treatment.match(/Formic Pro\s*·\s*(\d+)/);
      if(fm) formicTotal+=parseInt(fm[1])||0;
      else if(formicEntry._formic_count) formicTotal+=parseInt(formicEntry._formic_count)||0;
    }
    alive+=lastVal('alive_hives');deadHives+=lastVal('dead_hives');
    light+=lastVal('light');pol+=lastVal('pol_pallet');part+=lastVal('part_pallet');carrot+=lastVal('carrot');
    fdOn+=lastVal('fd_on');
    on34+=lastVal('on_34');
    hcFdOn+=lastVal('honeycomb_fd');
    hcHdOn+=lastVal('honeycomb_hd');
    // Breeders — most recent entry in ANY round, not just Spring, so a breeder logged in
    // Summer (or any other season) still counts toward the fleet total.
    const breederCount=getSiteBreederCount(opName,site);
    if(breederCount>0) breederSites.push({site,count:breederCount});
    const springForQ=latestEntry(opName,site,'spring');
    if(parseInt(springForQ?.finishers)>0) finisherSites.push({site,count:parseInt(springForQ.finishers)});
    // Spring score from most recent spring entry
    const springE=latestEntry(opName,site,'spring');
    const bd=springE?.score_breakdown||{};
    [0,1,2,3,4,5,6].forEach(s=>{const v=parseInt(bd[s]);if(!isNaN(v)&&v>0){st+=s*v;sc+=v;}});
  });
  const avgScore=sc>0?(st/sc).toFixed(1):null;
  const barCounts=[0,1,2,3,4,5,6].map(s=>{let c=0;sites.forEach(site=>{const v=parseInt(latestEntry(opName,site,'spring')?.score_breakdown?.[s]);if(!isNaN(v))c+=v;});return c;});
  return{hives,dead,alive,deadHives,singles,doubles,light,weak,lidsFloors,formicTotal,pol,part,carrot,fdOn,on34,hcFdOn,hcHdOn,avgScore,barCounts,scoreHives:sc,logged,total:sites.length,flagged,breederSites,finisherSites};
}

// ── Shared: current breeder count for a site — most recent entry (any round) that actually
// has a 'breeders' value logged, even if that value is explicitly 0 (a real "no breeders left
// now" reading should stick, not be skipped in favor of an older non-zero count).
function getSiteBreederCount(op, site){
  const allEntries=Object.keys(ROUNDS)
    .flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).filter(e=>!e._movement))
    .sort((a,b)=>{
      const dc=(b.date||'').localeCompare(a.date||'');
      return dc!==0?dc:(b.logged_at||b.saved_at||'').localeCompare(a.logged_at||a.saved_at||'');
    });
  for(const e of allEntries){
    const raw=e.breeders;
    if(raw===undefined||raw===null||raw==='') continue;
    const v=parseInt(raw);
    if(!isNaN(v)) return v;
  }
  return 0;
}

// ── Shared: exact current-hive-count calculation, factored out of the yard detail page so
// every screen that needs "how many hives are at this site right now" uses this literal same
// code path — no separate reimplementation that could quietly drift out of sync.
function computeCurrentHivesForSite(op, site){
  const allSiteEntries=Object.keys(ROUNDS).flatMap(rk=>
    (STATE.entries[eKey(op,site,rk)]||[]).filter(e=>!e._movement).map((e,i)=>({...e,_arrIdx:i}))
  ).sort((a,b)=>{
    const dc=(b.date||'').localeCompare(a.date||'');
    if(dc!==0) return dc;
    const sc=(b.saved_at||'').localeCompare(a.saved_at||'');
    if(sc!==0) return sc;
    return a._arrIdx-b._arrIdx;
  });
  const mostRecentWithHives=allSiteEntries.find(e=>
    e.hives!==undefined&&e.hives!==null&&e.hives!==''
  )||null;
  const latestReal=allSiteEntries[0]||null;
  const allMovements=loadMovements();
  const latestDiaryDate2=allSiteEntries[0]?.date||'';
  let movementNet=0;
  allMovements.forEach(m=>{
    if(latestDiaryDate2&&m.date<latestDiaryDate2) return;
    const hives=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
    if(m.direction==='to_orchard'&&m.from_site===site) movementNet-=hives;
    else if(m.direction==='from_orchard'&&m.to_site===site) movementNet+=hives;
    else if(m.direction==='yard_yard'&&m.from_site===site) movementNet-=hives;
    else if(m.direction==='yard_yard'&&m.to_site===site) movementNet+=hives;
  });
  const baseHives=mostRecentWithHives?(parseInt(mostRecentWithHives.hives)||0):0;
  const movementEntries=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).filter(e=>e._movement)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const latestMovementHives=parseInt(movementEntries[0]?.hives)||0;
  let currentHives=0;
  if(latestReal) currentHives=Math.max(0,baseHives+movementNet);
  else if(latestMovementHives>0) currentHives=latestMovementHives;
  else if(movementNet>0) currentHives=movementNet;
  return currentHives;
}

// ── Shared: carry-forward hive-state fields for a single site, as of an optional cutoff date ──
// Mirrors calcSummary's per-field "last known value" logic so reports and the dashboard agree.
const HIVE_STATE_FIELDS=['hives','dead','singles','doubles','light','weak','alive_hives','dead_hives'];
const HIVE_STATE_NONZERO_FIELDS=['lids_floors'];
function getSiteHiveState(opName,site,cutoffDate){
  // Include movement entries here (unlike some other helpers) — calcSummary (the dashboard's
  // source of truth) does the same, since a movement can be the most recent thing that changed
  // a site's hive count. Excluding movements caused snapshot/report totals to run stale-high.
  const allSiteEntries=Object.keys(ROUNDS)
    .flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[]))
    .filter(e=>!cutoffDate||e.date<=cutoffDate)
    .sort((a,b)=>{
      const dc=(b.date||'').localeCompare(a.date||'');
      return dc!==0?dc:(b.logged_at||b.saved_at||'').localeCompare(a.logged_at||a.saved_at||'');
    });
  const lastVal=k=>{
    for(const e of allSiteEntries){
      const raw=e[k];
      if(raw===undefined||raw===null||raw==='') continue;
      const v=parseInt(raw);
      if(!isNaN(v)){
        if(HIVE_STATE_NONZERO_FIELDS.includes(k)){if(v>0) return v;}
        else if(HIVE_STATE_FIELDS.includes(k)) return v;
        else if(v>0) return v;
      }
    }
    return 0;
  };
  const out={lids_floors:lastVal('lids_floors')};
  HIVE_STATE_FIELDS.forEach(k=>{out[k]=lastVal(k);});

  // 'hives' uses the exact same calculation as the site's own detail page (not a
  // reimplementation) — when there's no cutoff date, call it directly so there is only one
  // real implementation of "current hive count" anywhere in the app.
  if(!cutoffDate){
    out.hives=computeCurrentHivesForSite(opName,site);
  } else {
    const realEntries=allSiteEntries.filter(e=>!e._movement);
    const lastRealHives=(()=>{
      for(const e of realEntries){
        const raw=e.hives;
        if(raw===undefined||raw===null||raw==='') continue;
        const v=parseInt(raw);
        if(!isNaN(v)) return v;
      }
      return null;
    })();
    const latestRealDate=realEntries[0]?.date||'';
    const movementsSince=loadMovements().filter(m=>m.date<=cutoffDate&&(!latestRealDate||m.date>=latestRealDate));
    let hivesNet=0;
    movementsSince.forEach(m=>{
      const amt=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
      if(m.direction==='to_orchard'&&m.from_site===site) hivesNet-=amt;
      else if(m.direction==='from_orchard'&&m.to_site===site) hivesNet+=amt;
      else if(m.direction==='yard_yard'&&m.from_site===site) hivesNet-=amt;
      else if(m.direction==='yard_yard'&&m.to_site===site) hivesNet+=amt;
    });
    if(lastRealHives!==null){
      out.hives=Math.max(0,lastRealHives+hivesNet);
    } else {
      const movementEntryHives=parseInt(allSiteEntries.find(e=>e._movement)?.hives)||0;
      out.hives=movementEntryHives>0?movementEntryHives:Math.max(0,hivesNet);
    }
  }
  return out;
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return el;
}

        h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,0.4)',marginTop:'2px'}},
          `${Object.keys(getYards(name)).length} batches · ${Object.values(getYards(name)).flatMap(y=>y.sites).length} sites`,
          s.flagged>0?h('span',{style:{color:'#f4a0a0',marginLeft:'8px'}},`⚑ ${s.flagged} overdue`):null
        )
      ),
      h('div',{style:{fontSize:'22px',color:op.accent,opacity:'0.7'}},'›')
    );
    card.appendChild(titleRow);
    if(s.logged>0){
      const statsDiv=h('div',{style:{borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:'10px'}});
      const grid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',marginBottom:s.avgScore?'8px':'0'}});
      // Calculate op-specific hives in pollination
      const opSitesCard=Object.values(op.yards).flatMap(y=>y.sites);
      let opPolHives=0;
      loadMovements().forEach(m=>{
        const mh=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
        if(m.direction==='to_orchard'&&opSitesCard.includes(m.from_site)) opPolHives+=mh;
        else if(m.direction==='from_orchard'&&opSitesCard.includes(m.to_site)) opPolHives-=mh;
      });
      opPolHives=Math.max(0,opPolHives);
      [{label:'Hives',value:s.hives},{label:'Dead',value:s.dead,red:s.dead>0},{label:'Sites',value:`${s.logged}/${s.total}`}].forEach(st=>{
        grid.appendChild(h('div',{style:{background:'rgba(255,255,255,0.09)',borderRadius:'7px',padding:'7px 6px',textAlign:'center'}},
          h('div',{style:{fontSize:'17px',fontWeight:'700',color:st.red?'#f4a0a0':'#fff',lineHeight:'1.1'}},st.value),
          h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'.05em',marginTop:'2px'}},st.label)
        ));
      });
      statsDiv.appendChild(grid);
      if(s.avgScore)statsDiv.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'4px'}},h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'.05em'}},'Spring avg'),scoreCircle(Math.round(parseFloat(s.avgScore)),26,13)));
      // Pollination summary
      if(opPolHives>0){
        const polRow=h('div',{style:{marginTop:'8px',borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:'8px',display:'flex',justifyContent:'space-between',alignItems:'center'}});
        polRow.appendChild(h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.05em'}},'In pollination'));
        polRow.appendChild(h('div',{style:{fontSize:'17px',fontWeight:'700',color:'#c39bd3'}},opPolHives+' hives'));
        statsDiv.appendChild(polRow);
      }
      card.appendChild(statsDiv);
    }
    // ── Flagged sites on op card ──
    const opSites=Object.values(op.yards).flatMap(y=>y.sites);
    const flaggedSites=opSites.filter(site=>getFlag(name,site));
    if(flaggedSites.length>0){
      const flagDiv=h('div',{style:{borderTop:'1px solid rgba(255,255,255,0.12)',paddingTop:'10px',marginTop: s.logged>0?'0':'0'}});
      flagDiv.appendChild(h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'6px'}},'Flagged sites'));
      flaggedSites.forEach(site=>{
        const flag=getFlag(name,site);
        const row=h('div',{style:{display:'flex',gap:'6px',alignItems:'flex-start',marginBottom:'5px',cursor:'pointer'},
          onClick:(e)=>{e.stopPropagation();showFlagModal(name,site);}});
        row.appendChild(h('span',{style:{color:'#ef9f27',fontWeight:'700',flexShrink:'0',fontSize:'13px'}},'!'));
        row.appendChild(h('div',null,
          h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,0.85)',fontWeight:'600'}},site),
          h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.45)'}},flag.comment)
        ));
        flagDiv.appendChild(row);
      });
      card.appendChild(flagDiv);
    }
    wrap.appendChild(card);
  });
  // ── Hive Movements card ──
  const movCard=h('button',{style:{width:'100%',maxWidth:'360px',marginBottom:'14px',padding:'16px 18px 14px',borderRadius:'14px',cursor:'pointer',textAlign:'left',border:'none',background:'#2a1f3d',borderTop:'3px solid #9b59b6'},
    onClick:()=>setState({op:'__movements__',tab:'movements'})});
  const movTotals=getOrchardTotals();
  const totalInOrchards=Object.values(movTotals).reduce((a,o)=>a+o.hives,0);
  // "Movements" resets each beekeeping year (Jun 1) — matches how every other stat in the app
  // scopes to the current season. "In orchards" stays as a live current-state count, not scoped.
  const _now=new Date();
  const _seasonStartYear=(_now.getMonth()+1)>=6?_now.getFullYear():_now.getFullYear()-1;
  const _seasonStart=_seasonStartYear+'-06-01';
  const totalMovements=loadMovements().filter(m=>(m.date||'')>=_seasonStart).length;
  movCard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:(totalMovements>0||totalInOrchards>0)?'12px':'0'}},
    h('div',null,
      h('div',{style:{fontSize:'19px',fontWeight:'700',color:'#fff',letterSpacing:'-.01em'}},'Hive Movements'),
      h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,0.4)',marginTop:'2px'}},'Pollination in/out tracking')
    ),
    h('div',{style:{fontSize:'22px',color:'#c39bd3',opacity:'0.8'}},'›')
  ));
  if(totalMovements>0||totalInOrchards>0){
    movCard.appendChild(h('div',{style:{borderTop:'1px solid rgba(255,255,255,0.1)',paddingTop:'10px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}},
      h('div',{style:{background:'rgba(255,255,255,0.09)',borderRadius:'7px',padding:'7px 6px',textAlign:'center'}},
        h('div',{style:{fontSize:'17px',fontWeight:'700',color:'#fff',lineHeight:'1.1'}},totalInOrchards),
        h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'.05em',marginTop:'2px'}},'In orchards')
      ),
      h('div',{style:{background:'rgba(255,255,255,0.09)',borderRadius:'7px',padding:'7px 6px',textAlign:'center'}},
        h('div',{style:{fontSize:'17px',fontWeight:'700',color:'#fff',lineHeight:'1.1'}},totalMovements),
        h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.4)',textTransform:'uppercase',letterSpacing:'.05em',marginTop:'2px'}},'This season')
      )
    ));
  }
  wrap.appendChild(movCard);

  // Reports card
  const repCard=h('button',{className:'op-card',style:{background:'#1a3a2a',border:'1.5px solid #2d6a4433',marginTop:'10px'},onClick:()=>setState({op:'__reports__'})});
  repCard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
    h('div',null,
      h('div',{style:{fontSize:'19px',fontWeight:'700',color:'#fff',letterSpacing:'-.01em'}},'Reports'),
      h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,0.4)',marginTop:'2px'}},'Spring scores · Yield · Pollination · Seasons')
    ),
    h('div',{style:{fontSize:'22px',color:'#7ecb8f',opacity:'0.8'}},'›')
  ));
  wrap.appendChild(repCard);

  // Nucs card
  const allNucData=loadNucYards();
  const totalNucs=Object.values(allNucData).reduce((a,ny)=>a+ny.batches.reduce((b,bt)=>b+(bt.nucs||[]).length,0),0);
  const totalMated=Object.values(allNucData).reduce((a,ny)=>a+ny.batches.reduce((b,bt)=>b+(bt.nucs||[]).filter(n=>n.status==='mated'||n.transferredTo).length,0),0);
  const nucCard=h('button',{className:'op-card',style:{background:'#1f2e1a',border:'1.5px solid #3d7a4f33',marginTop:'10px'},onClick:()=>setState({op:'__nucs__'})});
  nucCard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
    h('div',null,
      h('div',{style:{fontSize:'19px',fontWeight:'700',color:'#fff',letterSpacing:'-.01em'}},'Nucs'),
      h('div',{style:{fontSize:'12px',color:'rgba(255,255,255,0.4)',marginTop:'2px'}},totalNucs>0?totalNucs+' nucs · '+totalMated+' mated':'No nucs yet')
    ),
    h('div',{style:{fontSize:'22px',color:'#7ecb8f',opacity:'0.8'}},'›')
  ));
  wrap.appendChild(nucCard);

  wrap.appendChild(h('button',{style:{marginTop:'16px',padding:'10px 20px',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'20px',color:'#fff',fontSize:'13px',fontWeight:'600',cursor:'pointer'},onClick:()=>{Object.keys(OPERATIONS).forEach(op=>exportCSV(op));}},'Export all data (CSV)'));
  return wrap;
}

function getAFBInquiry(op, site){
  const key='apiary_afb_'+op+'__'+site;
  try{
    const d=JSON.parse(localStorage.getItem(key)||'null');
    if(!d) return null;
    // Check if within 2 years
    const found=new Date(d.date);
    const expiry=new Date(found);
    expiry.setFullYear(expiry.getFullYear()+2);
    if(new Date()>expiry){localStorage.removeItem(key);return null;}
    return d;
  }catch(e){return null;}
}

    const chg=h('button',{style:{background:'none',border:'none',color:'#3d7a4f',fontSize:'12px',cursor:'pointer'},onClick:()=>{destDisplay.style.display='none';destSearch.style.display='block';destSite='';}});

  box.appendChild(h('label',{style:{fontSize:'11px',color:'#aaa',display:'block',marginTop:'10px',marginBottom:'4px',textTransform:'uppercase'}},'Date'));

  // Which nucs to send
  box.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',marginTop:'12px',marginBottom:'6px'}},'Select nucs to send'));
  const nucChecks=[];
  matedNucs.forEach(nuc=>{
    const row=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}});
    const cb=h('input',{type:'checkbox',checked:true,style:{width:'16px',height:'16px',cursor:'pointer'}});
    row.appendChild(cb);
    row.appendChild(h('span',{style:{fontSize:'13px',color:'#333'}},batch.sourceYard+' '+((batch.nucs||[]).indexOf(nuc)+1)));
    box.appendChild(row);
    nucChecks.push({nuc,cb});
  });

  if(!matedNucs.length){
    box.appendChild(h('div',{style:{color:'#bbb',fontSize:'13px',padding:'10px 0'}},'No mated nucs available — update nuc status to Mated first'));
  }

  const btnRow=h('div',{style:{display:'flex',gap:'10px',marginTop:'14px'}});

      const selected=nucChecks.filter(({cb})=>cb.checked).map(({nuc})=>nuc);
      if(!selected.length){showToast('Select at least one nuc');return;}
      selected.forEach(nuc=>{

  btnRow.appendChild(h('button',{style:{flex:'1',padding:'12px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',cursor:'pointer'},onClick:()=>overlay.remove()},'Cancel'));

  overlay.appendChild(box);overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

function renderNucsScreen(){
  const wrap=h('div',{className:'app'});

  // Header
  const header=h('div',{className:'header'});
  const topRow=h('div',{className:'header-top'});
  topRow.appendChild(h('button',{className:'back-btn',onClick:()=>setState({op:null})},'‹ Ops'));
  topRow.appendChild(h('div',{className:'header-sub'},'Apiary Diary'));
  topRow.appendChild(h('div',{className:'sync-dot '+(navigator.onLine?'online':'error')}));
  header.appendChild(topRow);
  header.appendChild(h('div',{className:'header-title'},'Nucs'));
  wrap.appendChild(header);

  const screen=h('div',{className:'screen'});

  // Operation toggle
  const ops=Object.keys(OPERATIONS);
  let selectedOp=STATE._nucOp||ops[0];
  const opToggle=h('div',{style:{display:'flex',gap:'6px',marginBottom:'14px',flexWrap:'wrap'}});
  ops.forEach(op=>{
    const btn=h('button',{type:'button',style:{padding:'6px 14px',borderRadius:'20px',border:'1.5px solid '+(selectedOp===op?OPERATIONS[op].color:'#ddd'),background:selectedOp===op?OPERATIONS[op].color+'18':'#fff',color:selectedOp===op?OPERATIONS[op].color:'#888',fontSize:'13px',fontWeight:'700',cursor:'pointer'}},op);
    btn.addEventListener('click',()=>{
      STATE._nucOp=op;
      selectedOp=op;
      renderBatches();
      // Update toggle buttons
      opToggle.querySelectorAll('button').forEach((b,i)=>{
        const o=ops[i];
        b.style.border='1.5px solid '+(selectedOp===o?OPERATIONS[o].color:'#ddd');
        b.style.background=selectedOp===o?OPERATIONS[o].color+'18':'#fff';
        b.style.color=selectedOp===o?OPERATIONS[o].color:'#888';
      });
    });
    opToggle.appendChild(btn);
  });
  screen.appendChild(opToggle);

  // Batches area
  const batchArea=h('div',null);
  screen.appendChild(batchArea);

  function renderBatches(){
    batchArea.innerHTML='';
    const all=loadNucYards();
    // Find all batches for this op
    const opBatches=[];
    Object.entries(all).forEach(([key,yard])=>{
      if(yard.op===selectedOp){
        (yard.batches||[]).forEach((batch,bi)=>opBatches.push({key,yard,batch,bi}));
      }
    });

    // Summary stats
    const allNucs=opBatches.flatMap(({batch})=>batch.nucs||[]);
    if(allNucs.length){
      const stats={recheck:0,cell:0,virgin:0,dl:0,mated:0,failed:0,transferred:0};
      allNucs.forEach(n=>{
        if(n.transferredTo) stats.transferred++;
        else if(n.status==='failed') stats.failed++;
        else if(n.status==='mated') stats.mated++;
        else if(n.status==='dl') stats.dl++;
        else if(n.status==='virgin') stats.virgin++;
        else if(n.status==='cell') stats.cell++;
        else stats.recheck++;
      });
      const statGrid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px',marginBottom:'14px'}});
      [{l:'Total',v:allNucs.length,col:'#555'},{l:'Mated',v:stats.mated+stats.transferred,col:'#3d7a4f'},{l:'Recheck',v:stats.recheck+stats.cell+stats.virgin+stats.dl,col:'#ef9f27'},{l:'Failed',v:stats.failed,col:'#e24b4a'}].forEach(({l,v,col})=>{
        const tile=h('div',{style:{background:'#fff',borderRadius:'8px',padding:'8px',textAlign:'center',border:'.5px solid #eee'}});
        tile.appendChild(h('div',{style:{fontSize:'20px',fontWeight:'800',color:v>0&&l!=='Total'?col:'#1a1a1a',lineHeight:'1'}},String(v)));
        tile.appendChild(h('div',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',marginTop:'2px'}},l));
        statGrid.appendChild(tile);
      });
      batchArea.appendChild(statGrid);
    }

    if(!opBatches.length){
      batchArea.appendChild(h('div',{style:{textAlign:'center',padding:'30px 0',color:'#bbb',fontSize:'14px'}},'No nuc batches yet for '+selectedOp));
    } else {
      opBatches.forEach(({key,yard,batch,bi})=>{
        const nucs=batch.nucs||[];
        const today=new Date();

        // 2-week check reminder
        const checkNucs=nucs.filter(n=>n.cellDate&&!n.matedDate&&!n.transferredTo&&n.status!=='failed');
        let showCheck=false;
        if(checkNucs.length){
          const cellDate=new Date(checkNucs[0].cellDate);
          const days=Math.floor((today-cellDate)/(1000*60*60*24));
          if(days>=14) showCheck=days;
        }

        if(showCheck){
          batchArea.appendChild(h('div',{style:{background:'#fff8e6',border:'1px solid #ef9f27',borderRadius:'8px',padding:'8px 12px',marginBottom:'8px',fontSize:'13px',color:'#b07800',fontWeight:'600'}},
            '⏰ '+batch.sourceYard+' — check nucs (cells in '+showCheck+'d ago)'
          ));
        }

        const card=h('div',{style:{background:'#fff',borderRadius:'12px',marginBottom:'10px',overflow:'hidden',border:'.5px solid #ddd'}});

        // Batch header — tappable to expand
        const bHdr=h('div',{style:{padding:'11px 14px',background:'#f8f8f6',borderBottom:'.5px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}});
        const mated=nucs.filter(n=>n.status==='mated'||n.transferredTo).length;
        const failed=nucs.filter(n=>n.status==='failed').length;
        const bLeft=h('div',null);
        bLeft.appendChild(h('div',{style:{fontWeight:'700',fontSize:'15px'}},batch.sourceYard));
        bLeft.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',marginTop:'2px'}},
          nucs.length+' nucs · Added '+fmtDate(batch.dateAdded)+(mated?' · '+mated+' mated':'')+(failed?' · '+failed+' failed':'')
        ));
        bHdr.appendChild(bLeft);
        const bChev=h('span',{style:{color:'#aaa',fontSize:'16px'}},'▼');
        bHdr.appendChild(bChev);
        card.appendChild(bHdr);

        const bBody=h('div',{style:{display:'none'}});

        // Individual nucs
        nucs.forEach((nuc,ni)=>{
          const isTransferred=!!nuc.transferredTo;
          const statusColor=isTransferred?'#3d7a4f':nuc.status==='failed'?'#e24b4a':nuc.status==='mated'?'#3d7a4f':nuc.status==='dl'?'#1a6fb0':nuc.status==='virgin'?'#9b59b6':nuc.status==='cell'?'#ef9f27':'#aaa';
          const statusLabel=isTransferred?'Transferred':nuc.status==='failed'?'Failed':nuc.status==='mated'?'Mated ✓':nuc.status==='dl'?'DL':nuc.status==='virgin'?'Virgin':nuc.status==='cell'?'Cell in':'Recheck';
          const nRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',borderBottom:'.5px solid #f5f5f3',cursor:'pointer'},
            onClick:()=>showNucModal(selectedOp,key,bi,ni,()=>{STATE._nucOp=selectedOp;setState({op:'__nucs__'});})});
          const nLeft=h('div',null);

          onClick:()=>showSendNucsModal(selectedOp,key,bi,()=>{STATE._nucOp=selectedOp;setState({op:'__nucs__'});})},'Send to yard'));
        actRow.appendChild(h('button',{style:{padding:'8px',background:'#55555511',border:'1px solid #999',borderRadius:'7px',fontSize:'12px',fontWeight:'700',color:'#666',cursor:'pointer'},
          onClick:()=>showChangeSourceModal(selectedOp,key,bi,()=>{STATE._nucOp=selectedOp;setState({op:'__nucs__'});})},'Change source'));
        actRow.appendChild(h('button',{style:{padding:'8px',background:'#e24b4a11',border:'1px solid #e24b4a',borderRadius:'7px',fontSize:'12px',fontWeight:'700',color:'#e24b4a',cursor:'pointer'},
          onClick:()=>{
            const msg=batch._fromDiary?'Delete this nuc batch? This was created from a diary entry — deleting here will NOT remove the nuc splits from that entry.':'Delete this nuc batch?';
            confirmAction(msg,()=>{
              const all2=loadNucYards();
              all2[key].batches.splice(bi,1);
              saveNucYards(all2);
              STATE._nucOp=selectedOp;
              setState({op:'__nucs__'});

          }},'Delete batch'));
        bBody.appendChild(actRow);

        bHdr.addEventListener('click',()=>{
          const open=bBody.style.display!=='none';
          bBody.style.display=open?'none':'block';
          bChev.textContent=open?'▼':'▲';
        });
        card.appendChild(bBody);

      });
    }
