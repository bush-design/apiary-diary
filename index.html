            row.appendChild(h('span',{style:{fontSize:'14px',fontWeight:'600',color:'#333',flexShrink:'0'}},site));
            // Right: batch · op in muted text
            row.appendChild(h('span',{style:{fontSize:'11px',color:'#aaa',textAlign:'right',lineHeight:'1.4'}},batchName+' · '+opName));
            row.addEventListener('mousedown',e=>{e.preventDefault();onSelect(site,opName);searchInp.value='';results.style.display='none';});
            results.appendChild(row);
          });
        }
        results.style.display='block';
      });
      searchInp.addEventListener('blur',()=>setTimeout(()=>{results.style.display='none';},150));

      wrap.appendChild(searchInp);
      wrap.appendChild(results);
      container.appendChild(wrap);
      setTimeout(()=>searchInp.focus(),50);
    }

    function makeSiteNavigator(container, onSelect, excludeSite){
      const nav={op:null,batch:null};
      function renderNav(){
        container.innerHTML='';
        if(!nav.op){
          // Op list
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Operation'));
          Object.entries(OPERATIONS).forEach(([opName,op])=>{
            const btn=h('button',{style:{display:'block',width:'100%',padding:'10px 12px',marginBottom:'6px',background:'#fff',border:`.5px solid ${op.accent}44`,borderLeft:`3px solid ${op.accent}`,borderRadius:'8px',cursor:'pointer',textAlign:'left',fontSize:'14px',fontWeight:'600',color:'#333'},
              onClick:()=>{nav.op=opName;nav.batch=null;renderNav();}},opName);
            container.appendChild(btn);
          });
        } else if(!nav.batch){
          // Batch list with back
          const bc=h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'8px',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:()=>{nav.op=null;renderNav();}},
            h('span',{style:{color:movColor}},'‹'),h('span',null,' '+nav.op));
          container.appendChild(bc);
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Batch'));
          Object.entries(OPERATIONS[nav.op].yards).forEach(([batchName,batchData])=>{
            const btn=h('button',{style:{display:'block',width:'100%',padding:'9px 12px',marginBottom:'5px',background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',cursor:'pointer',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center'},
              onClick:()=>{nav.batch=batchName;renderNav();}},
              h('span',{style:{fontSize:'14px',fontWeight:'500',color:'#333'}},batchName),
              h('span',{style:{fontSize:'12px',color:'#bbb'}},batchData.sites.length+' sites ›')
            );
            container.appendChild(btn);
          });
        } else {
          // Site list with back
          const bc=h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'8px',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:()=>{nav.batch=null;renderNav();}},
            h('span',{style:{color:movColor}},'‹'),h('span',null,' '+nav.op+' / '+nav.batch));
          container.appendChild(bc);
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Site'));
          OPERATIONS[nav.op].yards[nav.batch].sites.forEach(site=>{
            if(site===excludeSite) return;
            const btn=h('button',{style:{display:'block',width:'100%',padding:'9px 12px',marginBottom:'5px',background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',cursor:'pointer',textAlign:'left',fontSize:'14px',color:'#333'},
              onClick:()=>onSelect(site,nav.op)},site);
            container.appendChild(btn);
          });
        }
      }
      renderNav();
    }

    function renderAddPickupForm(){
      addPickupArea.innerHTML='';
      // Pre-fill if editing an existing pickup
      const pre=editingPickup||{};
      editingPickup=null;
      const pickupData={site:pre.site||'',op:pre.op||'',pallets:pre.pallets||'',singles:pre.singles||'',
        half_pallet:pre.half_pallet||false,alive_hives:pre.alive_hives||'',dead_hives:pre.dead_hives||''};
      const isYY=loadDirection.val==='yard_yard';
      const isOut=loadDirection.val==='to_orchard';
      const isEditing=!!(pre.site);
      const card=h('div',{className:'form-card',style:{marginBottom:'12px',border:isEditing?'1.5px solid #9b59b6':''}});
      card.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'600',color:isEditing?'#9b59b6':'#666',marginBottom:'10px'}},
        isEditing?`Editing: ${pre.site}`:(isOut?'+ Pick up from yard':isYY?'+ Pick up from yard':'+ Pick up from orchard')));

      if(isOut||isYY){
        // Yard search for all yard selections
        const searchArea=h('div',{style:{marginBottom:'10px'}});
        const selectedDisplay=h('div',{style:{display:'none',marginBottom:'10px'}});
        card.appendChild(searchArea);
        card.appendChild(selectedDisplay);
        function showSelected(site, opName){
          searchArea.style.display='none';
          selectedDisplay.style.display='block';
          selectedDisplay.innerHTML='';
          selectedDisplay.appendChild(h('div',{style:{background:'#f3e8ff',border:'1.5px solid '+movColor,borderRadius:'8px',padding:'9px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('div',null,
              h('div',{style:{fontWeight:'600',fontSize:'14px',color:'#333'}},site),
              h('div',{style:{fontSize:'12px',color:'#888'}},opName)
            ),
            h('button',{style:{background:'none',border:'none',color:movColor,fontSize:'12px',fontWeight:'600',cursor:'pointer'},
              onClick:()=>{pickupData.site='';pickupData.op='';searchArea.style.display='block';selectedDisplay.style.display='none';}
            },'Change')
          ));
        }
        makeYardSearch(searchArea,(site,opName)=>{
          pickupData.site=site;pickupData.op=opName;
          showSelected(site,opName);
        }, null);
        // Pre-fill if editing
        if(pickupData.site) showSelected(pickupData.site,pickupData.op);
      } else {
        // Orchard dropdown for Orchard→Yard and Orchard→Orchard pickup source
        const sw=h('div',{style:{marginBottom:'10px'}});
        sw.appendChild(h('label',{className:'lbl'},'From orchard'));
        const sel=h('select',{style:{display:'block',width:'100%',padding:'9px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box'}});
        sel.appendChild(h('option',{value:''},'— Select orchard —'));
        getAllOrchards().forEach(s=>sel.appendChild(h('option',{value:s},s)));
        if(pickupData.site) sel.value=pickupData.site;

        // For Orchard→Yard: show yard breakdown when orchard selected
        const yardBreakdownArea=h('div',null);
        function renderYardBreakdown(orchardName){
          yardBreakdownArea.innerHTML='';
          if(!orchardName||loadDirection.val!=='from_orchard') return;
          // Build per-yard net hives in this orchard from movements
          const movements=loadMovements();
          const yardTotals={};  // {site: {pallets, singles, hives, op}}
          movements.forEach(m=>{
            if(m.direction==='to_orchard'&&m.to_orchard===orchardName){
              const k=m.from_site;if(!k)return;
              if(!yardTotals[k])yardTotals[k]={pallets:0,singles:0,half:0,hives:0,op:m.from_op};
              yardTotals[k].pallets+=parseInt(m.pallets)||0;
              yardTotals[k].singles+=parseInt(m.singles)||0;
              yardTotals[k].half+=(m.half_pallet?1:0);
              yardTotals[k].hives+=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
            }
            if(m.direction==='from_orchard'&&m.from_orchard===orchardName){
              const k=m.to_site;if(!k)return;
              if(!yardTotals[k])yardTotals[k]={pallets:0,singles:0,half:0,hives:0,op:m.to_op};
              yardTotals[k].pallets-=parseInt(m.pallets)||0;
              yardTotals[k].singles-=parseInt(m.singles)||0;
              yardTotals[k].hives-=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
            }
          });
          const activeYards=Object.entries(yardTotals).filter(([,v])=>v.pallets>0||v.singles>0||v.hives>0);
          if(!activeYards.length) return;

          yardBreakdownArea.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginTop:'10px',marginBottom:'6px'}},'Hives currently from:'));
          activeYards.forEach(([site,data])=>{
            const inOrchard=data.pallets>0||data.singles>0;
            const row=h('div',{style:{background:'#f8f8f6',borderRadius:'8px',padding:'9px 12px',marginBottom:'6px'}});
            const topR=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}});
            const lft=h('div',null);
            lft.appendChild(h('div',{style:{fontWeight:'600',fontSize:'14px',color:'#333'}},site));
            const palStr=data.pallets+(data.half>0?'½':'')+'p'+(data.singles>0?' · '+data.singles+'s':'');
            lft.appendChild(h('div',{style:{fontSize:'12px',color:'#888',marginTop:'2px'}},palStr+' in orchard'));
            topR.appendChild(lft);
            topR.appendChild(h('span',{style:{fontSize:'11px',color:'#7a4fa8',fontWeight:'600',background:'#f3e8ff',borderRadius:'10px',padding:'2px 7px'}},data.op||''));
            row.appendChild(topR);

            // Input: how many pallets/singles taking back now
            const takeGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'6px',alignItems:'end',marginBottom:'4px'}});
            const pw=h('div',null);
            pw.appendChild(h('label',{style:{fontSize:'10px',color:'#9b59b6',textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},'Pallets back'));
            const palInp2=h('input',{type:'number',inputmode:'numeric',min:'0',max:String(data.pallets),placeholder:'0',style:{width:'100%',padding:'6px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'14px',fontWeight:'700',background:'#fff',boxSizing:'border-box'}});
            pw.appendChild(palInp2);takeGrid.appendChild(pw);
            // half toggle
            const hw2=h('div',{style:{textAlign:'center',paddingBottom:'2px'}});
            hw2.appendChild(h('div',{style:{fontSize:'10px',color:'#aaa',marginBottom:'3px'}}),'½');
            let halfBack=false;
            const halfBtn2=h('button',{type:'button',style:{width:'30px',height:'30px',borderRadius:'50%',border:'1.5px solid #ddd',background:'#fff',fontSize:'11px',cursor:'pointer',color:'#aaa',fontWeight:'700'}},'+½');
            halfBtn2.addEventListener('click',()=>{halfBack=!halfBack;halfBtn2.style.background=halfBack?'#9b59b6':'#fff';halfBtn2.style.color=halfBack?'#fff':'#aaa';halfBtn2.style.border=halfBack?'1.5px solid #9b59b6':'1.5px solid #ddd';});
            hw2.appendChild(halfBtn2);takeGrid.appendChild(hw2);
            const sw2=h('div',null);
            sw2.appendChild(h('label',{style:{fontSize:'10px',color:'#9b59b6',textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},'Singles back'));
            const singInp2=h('input',{type:'number',inputmode:'numeric',min:'0',max:String(data.singles),placeholder:'0',style:{width:'100%',padding:'6px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'14px',fontWeight:'700',background:'#fff',boxSizing:'border-box'}});
            sw2.appendChild(singInp2);takeGrid.appendChild(sw2);
            row.appendChild(takeGrid);

            // Remaining indicator — updates live
            const remainDiv=h('div',{style:{fontSize:'12px',color:'#aaa',marginTop:'2px'}});
            function updateRemain(){
              const takePal=(parseInt(palInp2.value)||0)+(halfBack?0.5:0);
              const takeSing=parseInt(singInp2.value)||0;
              const remPal=Math.max(0,data.pallets+(data.half*0.5)-takePal);
              const remSing=Math.max(0,data.singles-takeSing);
              remainDiv.textContent=remPal>0||remSing>0?`${remPal}p${remSing?' · '+remSing+'s':''} still in orchard`:'All returning';
              remainDiv.style.color=remPal===0&&remSing===0?'#3d7a4f':'#ef9f27';
            }
            palInp2.addEventListener('input',updateRemain);
            singInp2.addEventListener('input',updateRemain);
            halfBtn2.addEventListener('click',updateRemain);
            row.appendChild(remainDiv);

            // "+ Add to truck" for this yard
            row.appendChild(h('button',{style:{marginTop:'8px',width:'100%',padding:'7px',background:'rgba(155,89,182,0.1)',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:'#9b59b6',cursor:'pointer'},
              onClick:()=>{
                const tp=parseInt(palInp2.value)||0;
                const ts=parseInt(singInp2.value)||0;
                if(!tp&&!ts&&!halfBack){showToast('Enter pallets or singles to take back');return;}
                pickups.push({
                  site,op:data.op||'',
                  pallets:String(tp),singles:String(ts),half_pallet:halfBack,
                  alive_hives:'',dead_hives:'',
                  id:nextId++,splits:[]
                });
                // Reset inputs
                palInp2.value='';singInp2.value='';halfBack=false;
                halfBtn2.style.background='#fff';halfBtn2.style.color='#aaa';halfBtn2.style.border='1.5px solid #ddd';
                updateRemain();
                renderPickups();
              }
            },'+ Add to truck'));
            yardBreakdownArea.appendChild(row);
          });
        }

        sel.addEventListener('change',e=>{
          pickupData.site=e.target.value;
          renderYardBreakdown(e.target.value);
        });
        if(pickupData.site) renderYardBreakdown(pickupData.site);
        sw.appendChild(sel);
        sw.appendChild(yardBreakdownArea);
        card.appendChild(sw);


        // Orchard→Orchard only: optional "from yards" dropdown multi-select
        if(loadDirection.val==='orchard_orchard'){
          const ywrap=h('div',{style:{marginTop:'8px'}});
          ywrap.appendChild(h('label',{className:'lbl'},'From yards (optional)'));
          const selectedYards=new Set(pickupData.from_yards||[]);
          // Build full site list
          const allS=[];
          Object.entries(OPERATIONS).forEach(([opName,op])=>{
            Object.entries(getYards(opName)).forEach(([batchName,batch])=>{
              batch.sites.forEach(site=>allS.push({site,batchName,opName}));
            });
          });
          allS.sort((a,b)=>a.site.localeCompare(b.site));
          // Tags showing selected yards
          const tagsRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'6px'}});
          function refreshTags(){
            tagsRow.innerHTML='';
            [...selectedYards].forEach(site=>{
              const tag=h('span',{style:{fontSize:'12px',fontWeight:'600',color:'#7a4fa8',background:'#f3e8ff',borderRadius:'10px',padding:'3px 8px',cursor:'pointer'}},site+' ×');
              tag.addEventListener('click',()=>{selectedYards.delete(site);pickupData.from_yards=[...selectedYards];refreshTags();yardSel.value='';});
              tagsRow.appendChild(tag);
            });
          }
          ywrap.appendChild(tagsRow);
          // Dropdown — pick one at a time
          const yardSel=h('select',{style:{display:'block',width:'100%',padding:'9px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'14px',background:'#fafafa',boxSizing:'border-box'}});
          yardSel.appendChild(h('option',{value:''},'— Add a yard —'));
          allS.forEach(({site,batchName})=>yardSel.appendChild(h('option',{value:site},site+' · '+batchName)));
          yardSel.addEventListener('change',e=>{
            const v=e.target.value;if(!v)return;
            selectedYards.add(v);pickupData.from_yards=[...selectedYards];
            refreshTags();yardSel.value='';
          });
          ywrap.appendChild(yardSel);
          card.appendChild(ywrap);
        }
      }

      // Truck space row — pallets + half pallet toggle + singles
      const truckRow=h('div',{style:{marginBottom:'10px'}});
      truckRow.appendChild(h('label',{className:'lbl'},'Truck space'));
      const truckGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'6px',alignItems:'end'}});
      // Pallets
      const palWrap=h('div',null);
      palWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'3px'}},'Full pallets'));
      const palInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'8px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
      if(pickupData.pallets) palInp.value=pickupData.pallets;
      palInp.addEventListener('input',e=>pickupData.pallets=e.target.value);
      palWrap.appendChild(palInp);
      truckGrid.appendChild(palWrap);
      // Half pallet toggle
      const halfWrap=h('div',{style:{textAlign:'center',paddingBottom:'2px'}});
      halfWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'3px'}}),'½');
      const halfBtn=h('button',{type:'button',style:{width:'36px',height:'36px',borderRadius:'50%',border:'1.5px solid #ddd',background:'#fff',fontSize:'14px',cursor:'pointer',fontWeight:'700',color:'#aaa',transition:'all .15s'}},'+½');
      if(pickupData.half_pallet){
        halfBtn.style.background='#9b59b6';halfBtn.style.color='#fff';halfBtn.style.border='1.5px solid #9b59b6';
      }
      halfBtn.addEventListener('click',()=>{
        pickupData.half_pallet=!pickupData.half_pallet;
        halfBtn.style.background=pickupData.half_pallet?'#9b59b6':'#fff';
        halfBtn.style.color=pickupData.half_pallet?'#fff':'#aaa';
        halfBtn.style.border=pickupData.half_pallet?'1.5px solid #9b59b6':'1.5px solid #ddd';
      });
      halfWrap.appendChild(halfBtn);
      truckGrid.appendChild(halfWrap);
      // Singles
      const sinWrap=h('div',null);
      sinWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'3px'}},'Singles'));
      const sinInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'8px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
      if(pickupData.singles) sinInp.value=pickupData.singles;
      sinInp.addEventListener('input',e=>pickupData.singles=e.target.value);
      sinWrap.appendChild(sinInp);
      truckGrid.appendChild(sinWrap);
      truckRow.appendChild(truckGrid);
      card.appendChild(truckRow);

      // Hive count row — alive + dead
      const hiveRow=h('div',{style:{marginBottom:'10px'}});
      hiveRow.appendChild(h('label',{className:'lbl'},'Hives on this pickup'));

      [{label:'Alive',key:'alive_hives',color:'#3d7a4f'},{label:'Dead',key:'dead_hives',color:'#e24b4a'}].forEach(({label,key,color})=>{
        const nw=h('div',null);
        nw.appendChild(h('label',{style:{fontSize:'10px',color:color,textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},label));
        const ni=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'8px 10px',border:`.5px solid ${color}55`,borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
        if(pickupData[key]) ni.value=pickupData[key];
        ni.addEventListener('input',e=>pickupData[key]=e.target.value);
        nw.appendChild(ni);hiveGrid.appendChild(nw);
      });
      hiveRow.appendChild(hiveGrid);
      card.appendChild(hiveRow);

      card.appendChild(h('button',{style:{width:'100%',padding:'10px',background:'rgba(155,89,182,0.1)',border:'1.5px solid '+movColor,borderRadius:'8px',fontSize:'13px',fontWeight:'700',color:movColor,cursor:'pointer'},
        onClick:()=>{
          if(!pickupData.site){showToast(isOut?'Select a yard site':isYY?'Select a yard site':'Select an orchard');return;}
          if(!pickupData.pallets&&!pickupData.singles&&!pickupData.half_pallet){showToast('Enter truck space (pallets or singles)');return;}
          pickups.push({...pickupData,id:nextId++,splits:[]});
          renderPickups();
          renderAddPickupForm();
        }
      },'+ Add to truck'));
      addPickupArea.appendChild(card);
    }

    function rebuildAll(){renderPickups();renderAddPickupForm();}
    rebuildAll();
    screen.appendChild(wrap);
  }

      // ── Orchards tab ──

      ));
      // Build breakdown: group active movements into orchard by source site

        if(m.direction==='to_orchard'&&m.to_orchard===o){
          const site=m.from_site;
          if(!siteBreakdown[site])siteBreakdown[site]={pallets:0,singles:0,moves:[]};
          siteBreakdown[site].pallets+=parseInt(m.pallets)||0;
          siteBreakdown[site].singles+=parseInt(m.singles)||0;
          siteBreakdown[site].moves.push(m);
        }
        if(m.direction==='from_orchard'&&m.from_orchard===o){
          const site=m.to_site;
          if(!siteBreakdown[site])siteBreakdown[site]={pallets:0,singles:0,moves:[]};
          siteBreakdown[site].pallets-=parseInt(m.pallets)||0;
          siteBreakdown[site].singles-=parseInt(m.singles)||0;
        }
      });
      const activeSites=Object.entries(siteBreakdown).filter(([,v])=>(v.pallets+v.singles)>0);
      if(!activeSites.length){
        screen.appendChild(h('div',{style:{textAlign:'center',padding:'20px 0',color:'#ccc',fontSize:'14px'}},'All hives have returned from this orchard'));
      } else {
        screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},'Hives currently from:'));
        activeSites.sort((a,b)=>b[1].pallets-a[1].pallets).forEach(([site,data])=>{
          const hives=(data.pallets*4)+data.singles;
          const card=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'10px',padding:'12px 13px',marginBottom:'7px'}});
          const topRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
          topRow.appendChild(h('div',null,
            h('div',{style:{fontWeight:'600',fontSize:'15px'}},site),
            h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},`${data.pallets} pallet${data.pallets!==1?'s':''} · ${data.singles} single${data.singles!==1?'s':''}`)
          ));
          topRow.appendChild(h('div',{style:{textAlign:'center',flexShrink:'0',marginLeft:'10px'}},
            h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#2a1f3d'}},hives),
            h('div',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase'}},'hives')
          ));
          card.appendChild(topRow);
          // Show individual movements for this site
          const siteMoves=data.moves.sort((a,b)=>b.date.localeCompare(a.date));
          if(siteMoves.length){
            const movList=h('div',{style:{marginTop:'8px',borderTop:'.5px solid #f0f0f0',paddingTop:'8px'}});
            siteMoves.forEach(m=>{
              movList.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#777',marginBottom:'3px'}},
                h('span',null,`${m.pallets||0}p + ${m.singles||0}s moved in`+(m.notes?' — '+m.notes:'')),
                h('span',{style:{color:'#aaa',flexShrink:'0',marginLeft:'8px'}},fmtDate(m.date))
              ));
            });
            card.appendChild(movList);
          }
          screen.appendChild(card);
        });
      }

    // List view — all orchards
    } else {
      if(!active.length){
        screen.appendChild(h('div',{className:'empty-msg'},'No hives currently in orchards'));
      } else {
        screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},`${active.length} orchards with hives`));
        const totalHives=active.reduce((a,o)=>a+totals[o].hives,0);
        screen.appendChild(h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'12px 14px',marginBottom:'14px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
          h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'22px',fontWeight:'700',color:'#fff'}},totalHives),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.05em'}},'Total hives in orchards')),
          h('div',{style:{textAlign:'center'}},h('div',{style:{fontSize:'22px',fontWeight:'700',color:'#fff'}},active.length),h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.05em'}},'Active orchards'))
        ));
        active.forEach(o=>{
          const t=totals[o];
          const card=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'10px',padding:'11px 13px',marginBottom:'7px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'},
            onClick:()=>setState({selectedOrchard:o})});
          card.appendChild(h('div',null,
            h('div',{style:{fontWeight:'600',fontSize:'15px'}},o),
            h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},`${t.pallets} pallet${t.pallets!==1?'s':''} · ${t.singles} single${t.singles!==1?'s':''}`)
          ));
          const right=h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
          right.appendChild(h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:'20px',fontWeight:'700',color:'#2a1f3d'}},t.hives),
            h('div',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase'}},'hives')
          ));
          right.appendChild(h('span',{style:{color:'#ccc',fontSize:'18px'}},'›'));
          card.appendChild(right);
          screen.appendChild(card);
        });
      }
    }
  }

  // ── Manage Orchards tab ──
  else if(STATE.tab==='manage_orchards'){
    const custom=loadCustomOrchards();
    screen.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'4px',marginTop:'4px'}},'Manage Orchards'));
    screen.appendChild(h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'16px',lineHeight:'1.5'}},'Add new orchards or remove custom ones. Built-in orchards cannot be deleted.'));

    // Add new orchard
    const addCard=h('div',{className:'form-card',style:{marginBottom:'20px'}});
    addCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#555',marginBottom:'10px'}},'+ Add new orchard'));

    addCard.appendChild(inp);
    addCard.appendChild(h('button',{style:{width:'100%',padding:'11px',background:'#2a1f3d',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},

        const name=inp.value.trim();
        if(!name){showToast('Enter an orchard name');return;}
        if(getAllOrchards().includes(name)){showToast('Already exists');return;}
        const updated=[...loadCustomOrchards(),name];
        saveCustomOrchards(updated);
        pushToSupabase('custom_orchards',updated);
        showToast(name+' added');
        setState({tab:'manage_orchards'});
      }
    },'Add orchard'));

    screen.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.07em',color:'#888',marginBottom:'8px'}},'All orchards'));

      row.appendChild(h('span',{style:{fontSize:'14px',color:'#333'}},orchard+(isCustom?' ✎':'')));
      if(isCustom){
        row.appendChild(h('button',{style:{background:'none',border:'.5px solid #f4a0a0',borderRadius:'6px',padding:'4px 10px',fontSize:'12px',color:'#c0392b',cursor:'pointer',fontWeight:'600'},
          onClick:()=>{
            const overlay=h('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
            const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'22px',width:'100%',maxWidth:'300px'}});
            box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px'}},'Remove orchard?'));
            box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'18px'}},orchard));
            const btnRow=h('div',{style:{display:'flex',gap:'10px'}});
            btnRow.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
              onClick:()=>{
                const updated=loadCustomOrchards().filter(o=>o!==orchard);
                saveCustomOrchards(updated);
                pushToSupabase('custom_orchards',updated);
                overlay.remove();
                showToast(orchard+' removed');
                setState({tab:'manage_orchards'});

      }

  // ── History tab ──
  else if(STATE.tab==='history'){

    if(!movements.length){screen.appendChild(h('div',{className:'empty-msg'},'No movements logged yet'));}
    else{
      screen.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'8px'}},`${movements.length} movements`));
      movements.forEach(m=>{
        const isOut=m.direction==='to_orchard';
        const isYY=m.direction==='yard_yard';
        const isOO=m.direction==='orchard_orchard';
        const title=isOut?`${m.from_site} → ${m.to_orchard}`:isYY?`${m.from_site} → ${m.to_site}`:isOO?`${m.from_orchard} → ${m.to_orchard}`:`${m.from_orchard} → ${m.to_site}`;
        const sub=`${m.pallets||0}p · ${m.singles||0}s`;
        const fromYardsStr=(m.from_yards&&m.from_yards.length)?'From: '+m.from_yards.join(', '):'';
        const meta=[m.driver,m.vehicle].filter(Boolean).join(' · ');
        const card=h('div',{style:{background:'#fff',border:`.5px solid ${isOut?'#ef9f27':isYY?'#6ab0e0':isOO?'#e0a06a':'#3d7a4f'}33`,borderLeft:`3px solid ${isOut?'#ef9f27':isYY?'#6ab0e0':isOO?'#e0a06a':'#3d7a4f'}`,borderRadius:'10px',padding:'11px 13px',marginBottom:'7px',overflow:'hidden'}});
        const mainRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
        mainRow.appendChild(h('div',{style:{flex:'1'}},
          h('div',{style:{fontWeight:'600',fontSize:'14px'}},title),
          h('div',{style:{fontSize:'12px',color:'#999',marginTop:'2px'}},sub+(meta?' · '+meta:'')),
          fromYardsStr?h('div',{style:{fontSize:'12px',color:'#7a4fa8',marginTop:'2px'}},fromYardsStr):null,
          m.notes?h('div',{style:{fontSize:'12px',color:'#555',marginTop:'4px',background:'#f8f8f6',borderRadius:'5px',padding:'4px 8px'}},m.notes):null
        ));
        mainRow.appendChild(h('div',{style:{textAlign:'right',flexShrink:'0',marginLeft:'8px'}},
          h('div',{style:{fontSize:'12px',color:'#aaa'}},fmtDate(m.date)),
          h('div',{style:{fontSize:'11px',color:'#bbb',marginTop:'2px'}},m.logged_by||'')
        ));
        card.appendChild(mainRow);
        // Edit + Delete buttons
        const btnBar=h('div',{style:{display:'flex',justifyContent:'flex-end',gap:'8px',marginTop:'8px'}});
        // Edit button
        const editBtn=h('button',{style:{padding:'4px 10px',background:'none',border:'.5px solid #bbb',borderRadius:'20px',fontSize:'11px',color:'#555',cursor:'pointer',fontWeight:'600'},
          onClick:()=>showEditMovementModal(m)
        },'Edit');
        btnBar.appendChild(editBtn);
        const delBtn=h('button',{style:{padding:'4px 10px',background:'none',border:'.5px solid #f4a0a0',borderRadius:'20px',fontSize:'11px',color:'#c0392b',cursor:'pointer',fontWeight:'600'},
          onClick:()=>{
            // Confirm
            const overlay=h('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
            const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'22px',width:'100%',maxWidth:'300px'}});
            box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px'}},'Delete movement?'));
            box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'6px'}},title));
            box.appendChild(h('div',{style:{fontSize:'12px',color:'#999',marginBottom:'18px'}},'This will also remove the auto-generated diary entry from the yard history.'));
            const btnRow2=h('div',{style:{display:'flex',gap:'10px'}});
            btnRow2.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
              onClick:async()=>{
                // Delete movement from list
                const updated=loadMovements().filter(x=>x.id!==m.id);
                saveMovements(updated);
                await pushToSupabase('hive_movements',updated);
                // Delete matching diary entries from affected yard sites
                async function removeDiaryEntry(opName, siteKey){
                  if(!opName||!siteKey) return;
                  const k=eKey(opName,siteKey,'spring');
                  const existing=STATE.entries[k]||[];
                  // Match by _movement flag and movement id stored in comments
                  const filtered=existing.filter(e=>!(e._movement&&e.date===m.date&&e.comments&&(
                    e.comments.includes(m.to_orchard||'')||
                    e.comments.includes(m.from_orchard||'')||
                    e.comments.includes(m.to_site||'')||
                    e.comments.includes(m.from_site||'')
                  )));
                  if(filtered.length!==existing.length){
                    const updEntries={...STATE.entries,[k]:filtered};
                    saveLocal(updEntries);
                    await pushToSupabase(k,filtered);
                    STATE.entries=updEntries;
                  }
                }
                const isOut=m.direction==='to_orchard';
                const isYY=m.direction==='yard_yard';
                if(isOut) await removeDiaryEntry(m.from_op,m.from_site);
                else if(!isOut&&!isYY) await removeDiaryEntry(m.to_op,m.to_site);
                else if(isYY){
                  await removeDiaryEntry(m.from_op,m.from_site);
                  await removeDiaryEntry(m.to_op,m.to_site);
                }
                overlay.remove();
                showToast('Movement and diary entry deleted');
                setState({tab:'history'});
              }
            },'Yes, delete'));
            btnRow2.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
              onClick:()=>overlay.remove()
            },'Cancel'));
            box.appendChild(btnRow2);
            overlay.appendChild(box);
            overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
            document.body.appendChild(overlay);
          }
        },'Delete');
        btnBar.appendChild(delBtn);
        card.appendChild(btnBar);
        screen.appendChild(card);
      });
    }
  }

  app.appendChild(screen);
  return app;
}

function renderYardsTab(opName){
  const screen=h('div',{className:'screen'});
  const opData=OPERATIONS[opName];
  const allYards=getYards(opName);
  const custom=loadCustomYards()[opName]||{};

  screen.appendChild(h('div',{style:{fontSize:'15px',fontWeight:'700',marginBottom:'4px',marginTop:'4px'}},'Manage Yards'));
  screen.appendChild(h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'16px',lineHeight:'1.5'}},'Add new yards and batches to '+opName+'. Built-in yards cannot be removed.'));

  // ── Add new site form ──
  const addCard=h('div',{className:'form-card',style:{marginBottom:'20px'}});
  addCard.appendChild(h('div',{style:{fontSize:'13px',fontWeight:'700',color:'#555',marginBottom:'12px'}},'+ Add new yard'));

  // Batch — existing or new
  addCard.appendChild(h('label',{className:'lbl'},'Batch'));
  const batchSel=h('select',{className:'inp',style:{marginBottom:'8px'}});
  batchSel.appendChild(h('option',{value:''},'— Select batch —'));
  Object.keys(allYards).forEach(b=>batchSel.appendChild(h('option',{value:b},b)));
  batchSel.appendChild(h('option',{value:'__new__'},'+ Create new batch'));
  addCard.appendChild(batchSel);

  const newBatchWrap=h('div',{style:{display:'none',marginBottom:'8px'}});
  newBatchWrap.appendChild(h('label',{className:'lbl'},'New batch name'));
  const newBatchInp=h('input',{type:'text',placeholder:'Batch name',className:'inp'});
  newBatchWrap.appendChild(newBatchInp);
  addCard.appendChild(newBatchWrap);
  batchSel.addEventListener('change',e=>{
    newBatchWrap.style.display=e.target.value==='__new__'?'block':'none';
  });

  addCard.appendChild(h('label',{className:'lbl',style:{marginTop:'8px',display:'block'}},'Yard name'));
  const siteInp=h('input',{type:'text',placeholder:'New yard name',className:'inp',style:{marginBottom:'12px'}});
  addCard.appendChild(siteInp);

  addCard.appendChild(h('button',{style:{width:'100%',padding:'11px',background:opData.color,color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
    onClick:()=>{
      let batchName=batchSel.value==='__new__'?newBatchInp.value.trim():batchSel.value;
      const siteName=siteInp.value.trim();
      if(!batchName){showToast('Select or enter a batch name');return;}
      if(!siteName){showToast('Enter a yard name');return;}
      // Check not duplicate
      const yards=getYards(opName);
      if(yards[batchName]?.sites.includes(siteName)){showToast('That yard already exists in this batch');return;}
      addCustomSite(opName,batchName,siteName);
      showToast(`${siteName} added to ${batchName}`);
      setState({tab:'settings'});
    }
  },'Add yard'));
  screen.appendChild(addCard);

  // ── Existing yards ──
  Object.entries(allYards).forEach(([batchName,batchData])=>{
    const isCustomBatch=!!custom[batchName];
    const section=h('div',{style:{marginBottom:'16px'}});
    section.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'#888',marginBottom:'6px',paddingLeft:'2px'}},
      batchName+(isCustomBatch?' (custom)':'')));
    batchData.sites.forEach(site=>{
      const isCustomSite=custom[batchName]?.sites?.includes(site);
      const row=h('div',{style:{background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',padding:'9px 12px',marginBottom:'5px',display:'flex',justifyContent:'space-between',alignItems:'center'}});
      row.appendChild(h('span',{style:{fontSize:'14px',color:'#333'}},site+(isCustomSite?' ✎':'')));
      if(isCustomSite){
        row.appendChild(h('button',{style:{background:'none',border:'none',color:'#e24b4a',fontSize:'13px',fontWeight:'600',cursor:'pointer',padding:'0'},
          onClick:()=>confirmAction('Remove '+site+' from '+batchName+'?',()=>{
            removeCustomSite(opName,batchName,site);
            showToast(site+' removed');
            setState({tab:'settings'});
          })
        },'Remove'));
      } else {
        row.appendChild(h('span',{style:{fontSize:'11px',color:'#ccc'}},'built-in'));
      }
      section.appendChild(row);
    });
    screen.appendChild(section);
  });
  return screen;
}

function renderApp(){
  const op=STATE.op;
  if(!op) return renderOpSelector();
  if(op==='__movements__') return renderMovementsScreen();
  const opData=OPERATIONS[op];
  document.documentElement.style.setProperty('--op-color',opData.color);
  document.documentElement.style.setProperty('--op-accent',opData.accent);
  const allSites=Object.values(getYards(op)).flatMap(y=>y.sites);
  const flaggedCount=allSites.filter(site=>{const dates=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).map(e=>e.date));const latest=dates.sort().reverse()[0];return !latest||daysBetween(latest)>21;}).length;
  const app=h('div',{className:'app'});
  const header=h('div',{className:'header'});
  const topRow=h('div',{className:'header-top'});
  topRow.appendChild(h('button',{className:'back-btn',onClick:()=>setState({op:null})},'‹ Ops'));
  topRow.appendChild(h('div',{className:'header-sub'},'Apiary Diary'));
  topRow.appendChild(h('div',{className:'sync-dot',style:{marginLeft:'auto'}}));
  header.appendChild(topRow);
  header.appendChild(h('div',{className:'header-title'},op+' — '+(STATE.userName||'')));
  const tb=h('div',{className:'tab-bar'});
  [{key:'overview',label:'Overview'+(flaggedCount>0?` ⚑${flaggedCount}`:'')},{key:'diary',label:'Diary'},{key:'export',label:'Export / Sync'},{key:'settings',label:'Yards'}].forEach(t=>{
    tb.appendChild(h('button',{className:'tab-btn'+(STATE.tab===t.key?' active':''),onClick:()=>setState({tab:t.key})},t.label));
  });
  header.appendChild(tb);
  app.appendChild(header);
  if(STATE.tab==='overview')app.appendChild(renderOverviewTab());
  else if(STATE.tab==='diary')app.appendChild(renderDiaryTab());
  else if(STATE.tab==='export')app.appendChild(renderExportTab());
  else if(STATE.tab==='settings')app.appendChild(renderYardsTab(op));
  return app;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  root.appendChild(renderApp());
  document.querySelectorAll('.sync-dot').forEach(d=>{d.className='sync-dot '+STATE.syncStatus;});
  // Always re-show name prompt if not set
  if(!STATE.userName){
    root.appendChild(renderNamePrompt());
  }
}

// ── Service Worker (offline caching) ─────────────────────────────────────────
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='apiary-v3';
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./']).catch(()=>{}))));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('supabase.co')||e.request.url.includes('emailjs')||e.request.url.includes('jsdelivr'))return;
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;}).catch(()=>caches.match('./'))));
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot(){
  // Show app immediately with local data
  render();
  if(!navigator.onLine){
    document.getElementById('offline-bar').classList.add('show');
    updateSyncDot('error');
    return;
  }
  // Load Supabase library first, then pull data
  updateSyncDot('syncing');
  _sbLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
  if(_sbLoaded){
    try{
      window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      await pullFromSupabase(); // pulls all data and re-renders
      subscribeRealtime();
      await flushPending();
      updateSyncDot('online');
    }catch(e){
      console.warn('Supabase init failed:',e);
      updateSyncDot('error');
    }
  } else {
    updateSyncDot('error');
    showToast('Could not connect to cloud — using local data');
  }
  // Load EmailJS in background then check quarterly backup
  loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js').then(async loaded=>{
    _ejLoaded=loaded;
    if(loaded){
      try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}
      // Check if quarterly backup is due
      await maybeQuarterlyBackup();
    }
  });
}
boot();
</script>
