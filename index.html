                h('button',{style:{background:'none',border:'none',color:'#aaa',fontSize:'12px',cursor:'pointer'},
                  onClick:()=>{destSel._selectedSite='';destSearchArea.style.display='block';destSelectedDisplay.style.display='none';}
                },'Change')
              ));
            }, p.site);
          } else if(loadDirection.val==='from_orchard'){
            // Yard search for return destination
            destSel.style.display='none';
            const retSearchArea=h('div',{style:{marginBottom:'6px'}});
            const retSelDisplay=h('div',{style:{display:'none',marginBottom:'6px'}});
            splitForm.appendChild(retSearchArea);
            splitForm.appendChild(retSelDisplay);
            makeYardSearch(retSearchArea,(site,opName)=>{
              destSel._selectedSite=site;destSel._selectedOp=opName;
              retSearchArea.style.display='none';
              retSelDisplay.style.display='block';
              retSelDisplay.innerHTML='';
              retSelDisplay.appendChild(h('div',{style:{background:'#f0faf3',border:'1px solid #3d7a4f',borderRadius:'6px',padding:'7px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
                h('span',{style:{fontSize:'13px',fontWeight:'600',color:'#333'}},site+' ('+opName+')'),
                h('button',{style:{background:'none',border:'none',color:'#aaa',fontSize:'12px',cursor:'pointer'},
                  onClick:()=>{destSel._selectedSite='';retSearchArea.style.display='block';retSelDisplay.style.display='none';}
                },'Change')
              ));
            }, null);
          } else {
            // Orchard dropdown for to_orchard and orchard_orchard destination
            const destLabel=loadDirection.val==='orchard_orchard'?'— Assign destination orchard —':'— Assign orchard —';
            destSel.appendChild(h('option',{value:''},destLabel));
            getAllOrchards().forEach(o=>{if(o!==p.site)destSel.appendChild(h('option',{value:o},o));});
            splitForm.appendChild(destSel);
          }

          // Assignment input — pallets default, toggle to hive count
          const rem2=remaining(p);
          let useHives=false;
          const splitInputArea=h('div',{style:{marginBottom:'6px'}});

          // Pallets input (DEFAULT)
          const psWrap=h('div',null);
          const psGrid=h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}});
          const splitPalInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{flex:'1',padding:'7px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'18px',fontWeight:'800',background:'#fafafa',boxSizing:'border-box',textAlign:'center'}});
          psGrid.appendChild(splitPalInp);
          psGrid.appendChild(h('span',{style:{fontSize:'13px',color:'#888',flexShrink:'0'}},'pallets'));
          let spHalf=false;
          const spHalfBtn=h('button',{type:'button',style:{padding:'6px 10px',borderRadius:'20px',border:'1.5px solid #ddd',background:'#fff',fontSize:'12px',cursor:'pointer',color:'#aaa',fontWeight:'700',flexShrink:'0',whiteSpace:'nowrap'}},'+½');
          spHalfBtn.addEventListener('click',()=>{spHalf=!spHalf;spHalfBtn.style.background=spHalf?movColor:'#fff';spHalfBtn.style.color=spHalf?'#fff':'#aaa';spHalfBtn.style.border=spHalf?`1.5px solid ${movColor}`:'1.5px solid #ddd';});
          psGrid.appendChild(spHalfBtn);
          psWrap.appendChild(psGrid);
          splitInputArea.appendChild(psWrap);

          // Hive count input (hidden by default)
          const hiveWrap=h('div',{style:{display:'none'}});
          const splitHiveInp=h('input',{type:'number',inputmode:'numeric',min:'1',max:String(rem2),placeholder:String(rem2),style:{width:'100%',padding:'7px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
          splitHiveInp.value=rem2;
          hiveWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#9b59b6',textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},`Hives (${rem2} remaining)`));
          hiveWrap.appendChild(splitHiveInp);
          splitInputArea.appendChild(hiveWrap);

          // Toggle
          const toggleBtn=h('button',{type:'button',style:{fontSize:'10px',color:movColor,background:'none',border:'none',cursor:'pointer',fontWeight:'600',padding:'0',marginTop:'4px',display:'block'}},'Switch to hive count');
          toggleBtn.addEventListener('click',()=>{
            useHives=!useHives;
            psWrap.style.display=useHives?'none':'block';
            hiveWrap.style.display=useHives?'block':'none';
            toggleBtn.textContent=useHives?'Switch to pallets':'Switch to hive count';
          });
          splitInputArea.appendChild(toggleBtn);
          splitForm.appendChild(splitInputArea);

          function getSplitHives(){
            if(useHives) return parseInt(splitHiveInp.value)||0;
            return(parseInt(splitPalInp.value)||0)*4+(spHalf?2:0);
          }
          function getSplitDesc(){
            if(useHives) return getSplitHives()+' hives';
            return (parseInt(splitPalInp.value)||0)+(spHalf?'½':'')+'p';
          }

          const assignBtnRow=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}});
          // + Assign (split this pickup)
          assignBtnRow.appendChild(h('button',{style:{padding:'7px',background:'rgba(155,89,182,0.1)',border:'1px solid '+movColor,borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:movColor,cursor:'pointer'},
            onClick:()=>{
              const dest=(loadDirection.val==='yard_yard'||loadDirection.val==='from_orchard')?(destSel._selectedSite||''):destSel.value;
              if(!dest){showToast(loadDirection.val==='to_orchard'?'Select an orchard':'Select a yard site');return;}
              const sh=getSplitHives();
              if(!sh){showToast('Enter hives, pallets or singles for this split');return;}
              if(sh>remaining(p)){showToast(`Only ${remaining(p)} hives remaining to assign`);return;}
              // Find which op the destination yard belongs to
              let destOp='';
              if(loadDirection.val==='yard_yard'||loadDirection.val==='from_orchard'){
                destOp=destSel._selectedOp||'';
                if(!destOp){
                  Object.entries(OPERATIONS).forEach(([opN])=>{
                    Object.values(getYards(opN)).forEach(batch=>{
                      if(batch.sites.includes(dest)) destOp=opN;
                    });
                  });
                }
              }
              if(!p.splits)p.splits=[];
              p.splits.push({dest,dest_op:destOp,hives:sh,desc:getSplitDesc()});
              renderPickups();
            }
          },'+ Assign'));
          // Assign ALL remaining pickups to same destination
          assignBtnRow.appendChild(h('button',{style:{padding:'7px',background:'rgba(155,89,182,0.05)',border:'1px dashed '+movColor,borderRadius:'6px',fontSize:'11px',fontWeight:'700',color:movColor,cursor:'pointer'},
            onClick:()=>{
              const dest=(loadDirection.val==='yard_yard'||loadDirection.val==='from_orchard')?(destSel._selectedSite||''):destSel.value;
              if(!dest){showToast(loadDirection.val==='to_orchard'?'Select an orchard':'Select a yard site');return;}
              // Find which op the destination yard belongs to
              let destOp='';
              if(loadDirection.val==='yard_yard'||loadDirection.val==='from_orchard'){
                destOp=destSel._selectedOp||'';
                if(!destOp){
                  Object.entries(OPERATIONS).forEach(([opN])=>{
                    Object.values(getYards(opN)).forEach(batch=>{
                      if(batch.sites.includes(dest)) destOp=opN;
                    });
                  });
                }
              }
              // Assign ALL pickups with remaining hives to this destination
              pickups.forEach(pk=>{
                const r=remaining(pk);
                if(r<=0) return;
                if(!pk.splits)pk.splits=[];
                pk.splits.push({dest,dest_op:destOp,hives:r});
              });
              renderPickups();
            }
          },'Assign all → here'));
          splitForm.appendChild(assignBtnRow);
          card.appendChild(splitForm);
        }
        pickupContainer.appendChild(card);
      });

      // ── Truck total tile — sits above pickup cards ──
      truckTotalArea.innerHTML='';
      if(pickups.length>0){
        const totalPallets=pickups.reduce((a,p)=>a+(parseInt(p.pallets)||0),0);
        const totalHalfPallets=pickups.filter(p=>p.half_pallet).length;
        const totalSingles=pickups.reduce((a,p)=>a+(parseInt(p.singles)||0),0);
        const totalAlive=pickups.reduce((a,p)=>a+(parseInt(p.alive_hives)||0),0);
        const totalDead=pickups.reduce((a,p)=>a+(parseInt(p.dead_hives)||0),0);
        const totalHives=pickups.reduce((a,p)=>a+totalHivesForPickup(p),0);
        const assignedHives=pickups.reduce((a,p)=>a+(totalHivesForPickup(p)-remaining(p)),0);
        const unassignedHives=totalHives-assignedHives;
        const pct=totalHives>0?Math.round((assignedHives/totalHives)*100):0;

        const truckBar=h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'10px 14px',marginBottom:'10px'}});
        truckBar.appendChild(h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'6px'}},'On truck · '+pickups.length+' pickup'+(pickups.length!==1?'s':'')));
        const spaceRow=h('div',{style:{display:'flex',gap:'8px',alignItems:'baseline',flexWrap:'wrap',marginBottom:(totalAlive>0||totalDead>0)?'6px':'4px'}});
        spaceRow.appendChild(h('span',{style:{fontSize:'22px',fontWeight:'800',color:'#fff',lineHeight:'1'}},totalPallets+(totalHalfPallets?'½':'')+'p'));
        if(totalSingles>0) spaceRow.appendChild(h('span',{style:{fontSize:'20px',fontWeight:'700',color:'rgba(255,255,255,0.7)',lineHeight:'1'}},totalSingles+'s'));
        spaceRow.appendChild(h('span',{style:{fontSize:'13px',color:'rgba(255,255,255,0.4)'}},'= '+totalHives+' hive'+(totalHives!==1?'s':'')));
        truckBar.appendChild(spaceRow);
        if(totalAlive>0||totalDead>0){
          const adRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'6px'}});
          if(totalAlive>0) adRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'700',color:'#7ecb8f',background:'rgba(255,255,255,0.08)',borderRadius:'6px',padding:'2px 8px'}},totalAlive+' alive'));
          if(totalDead>0) adRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'700',color:'#f4a0a0',background:'rgba(255,255,255,0.08)',borderRadius:'6px',padding:'2px 8px'}},totalDead+' dead'));
          truckBar.appendChild(adRow);
        }
        if(totalHives>0){
          const progBar=h('div',{style:{width:'100%',height:'5px',background:'rgba(255,255,255,0.15)',borderRadius:'3px',overflow:'hidden',marginBottom:'4px'}});
          progBar.appendChild(h('div',{style:{width:pct+'%',height:'100%',background:allDone?'#7ecb8f':'#ef9f27',borderRadius:'3px'}}));
          truckBar.appendChild(progBar);
          truckBar.appendChild(h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.45)'}},
            allDone?'All assigned ✓':`${assignedHives}/${totalHives} assigned · ${unassignedHives} remaining`));
        }
        truckTotalArea.appendChild(truckBar);
      }

      // Save button — shown once all pickups have all hives assigned
      if(pickups.length>0){
        const allDone2=pickups.every(p=>remaining(p)===0&&(p.splits||[]).length>0);
        const anyAssigned=pickups.some(p=>(p.splits||[]).length>0);
        if(anyAssigned){
          const label=allDone2?`Save load (${totalSplits} movement${totalSplits!==1?'s':''})`:`${pickups.filter(p=>remaining(p)>0).length} pickup${pickups.filter(p=>remaining(p)>0).length!==1?'s':''} still unassigned`;
          let isSubmittingMovement=false; // guards against a double-tap firing this save twice
          const saveLoadBtn=h('button',{
            style:{width:'100%',padding:'13px',background:allDone2?movColor:'#aaa',color:'#fff',border:'none',borderRadius:'8px',fontSize:'15px',fontWeight:'700',cursor:'pointer',marginTop:'8px'},
            onClick:async()=>{
              if(isSubmittingMovement) return;
              isSubmittingMovement=true;
              saveLoadBtn.disabled=true;
              saveLoadBtn.style.opacity='0.6';
              try{
              if(!allDone2){
                // Build a clear warning showing exactly which pickups have unassigned hives
                const probs=pickups.filter(p=>remaining(p)>0);
                const existing=document.getElementById('unassigned-warning');
                if(existing) existing.remove();
                const warn=h('div',{id:'unassigned-warning',style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
                const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'20px',width:'100%',maxWidth:'340px'}});
                box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px',color:'#c0392b'}},'Unassigned hives'));
                box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'12px'}},'The following pickups have hives not yet assigned to a destination:'));
                probs.forEach(p=>{
                  const rem2=remaining(p);
                  box.appendChild(h('div',{style:{background:'#fff8e6',border:'1px solid #ef9f27',borderRadius:'8px',padding:'8px 12px',marginBottom:'6px'}},
                    h('div',{style:{fontWeight:'700',fontSize:'14px'}},p.site),
                    h('div',{style:{fontSize:'13px',color:'#ef9f27',fontWeight:'600'}},`${rem2} hive${rem2!==1?'s':''} (${Math.floor(rem2/4)}p ${rem2%4}s) unassigned`)
                  ));
                });
                box.appendChild(h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'14px'}},'Go back and assign them, or save anyway if the count was a mistake.'));
                const btnRow3=h('div',{style:{display:'flex',gap:'8px'}});
                let savingAnyway=false;
                btnRow3.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
                  onClick:()=>warn.remove()},'Fix it'));
                const saveAnywayBtn=h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:'700',cursor:'pointer'},
                  onClick:async()=>{
                    if(savingAnyway) return;
                    savingAnyway=true;
                    saveAnywayBtn.disabled=true;
                    saveAnywayBtn.style.opacity='0.6';
                    warn.remove();/* fall through to save */
                    const ts2=Date.now();let j=0;
                    for(const p of pickups){for(const s of (p.splits||[])){
                      const isOutMov2=loadDirection.val==='to_orchard';const isYYMov2=loadDirection.val==='yard_yard';
                      await addMovement({direction:loadDirection.val,date:loadDate.val,notes:loadNotes.val,driver:loadDriver.val,vehicle:loadVehicle.val,from_site:(isOutMov2||isYYMov2)?p.site:'',from_op:(isOutMov2||isYYMov2)?p.op:'',to_orchard:isOutMov2?s.dest:'',from_orchard:(!isOutMov2&&!isYYMov2)?p.site:'',to_site:(!isOutMov2)?s.dest:'',to_op:(!isOutMov2)?s.dest_op:'',pallets:s.pallets,singles:s.singles,logged_by:STATE.userName||'Unknown',id:ts2+(j++),truckload_id:ts2});
                    }}
                    showToast(`${totalSplits} movements saved`);setState({tab:'orchards'});
                  }},'Save anyway');
                btnRow3.appendChild(saveAnywayBtn);
                box.appendChild(btnRow3);
                warn.appendChild(box);
                warn.addEventListener('click',e=>{if(e.target===warn)warn.remove();});
                document.body.appendChild(warn);
                return;
              }
              const ts=Date.now();
              let i=0;
              for(const p of pickups){
                for(const s of (p.splits||[])){
                  const isOut=loadDirection.val==='to_orchard';
                  const isOutMov=loadDirection.val==='to_orchard';
                  const isYYMov=loadDirection.val==='yard_yard';
                  const isOOMov=loadDirection.val==='orchard_orchard';
                  const mov={
                    direction:loadDirection.val,
                    date:loadDate.val,
                    notes:loadNotes.val,
                    driver:loadDriver.val,
                    vehicle:loadVehicle.val,
                    from_site:(isOutMov||isYYMov)?p.site:'',
                    from_op:(isOutMov||isYYMov)?p.op:'',
                    to_orchard:(isOutMov||isOOMov)?s.dest:'',
                    from_orchard:(!isOutMov&&!isYYMov)?p.site:'',
                    from_yards:isOOMov?(p.from_yards||[]):[],
                    to_site:(!isOutMov&&!isOOMov)?s.dest:'',
                    to_op:(!isOutMov&&!isOOMov)?s.dest_op:'',
                    pallets:p.pallets,
                    singles:p.singles,
                    half_pallet:p.half_pallet||false,
                    doubles:p.doubles||'',
                    singles_boxes:p.singles_boxes||'',
                    light:p.light||'',
                    alive_hives:p.alive_hives||'',
                    dead_hives:p.dead_hives||'',
                    hives:s.hives,
                    logged_by:STATE.userName||'Unknown',
                    id:ts+(i++),
                    truckload_id:ts
                  };
                  await addMovement(mov);
                }
              }
              showToast(`${totalSplits} movement${totalSplits!==1?'s':''} saved`);
              setState({tab:'orchards'});
              } finally {
                isSubmittingMovement=false;
                saveLoadBtn.disabled=false;
                saveLoadBtn.style.opacity='';
              }
            }
          },label);
          pickupContainer.appendChild(saveLoadBtn);
        }
      }
    }

    // Builds an op→batch→site navigator, calls onSelect(site, opName) when done
    function makeYardSearch(container, onSelect, excludeSite){
      // Build flat list of all sites with batch AND op name
      const allSites=[];
      Object.entries(OPERATIONS).forEach(([opName,op])=>{
        Object.entries(getYards(opName)).forEach(([batchName,batch])=>{
          batch.sites.forEach(site=>{
            if(site!==excludeSite) allSites.push({site,batchName,opName});
          });
        });
      });
      allSites.sort((a,b)=>a.site.localeCompare(b.site));

      const wrap=h('div',{style:{marginBottom:'10px'}});
      const searchInp=h('input',{type:'text',placeholder:'Search yards…',style:{display:'block',width:'100%',padding:'9px 10px',border:'1.5px solid '+movColor,borderRadius:'7px',fontSize:'15px',background:'#fff',boxSizing:'border-box',marginBottom:'6px'}});
      const results=h('div',{style:{maxHeight:'220px',overflowY:'auto',borderRadius:'7px',border:'.5px solid #ddd',background:'#fff',display:'none'}});

      searchInp.addEventListener('input',()=>{
        const q=searchInp.value.trim().toLowerCase();
        results.innerHTML='';
        if(!q){results.style.display='none';return;}
        const matches=allSites.filter(x=>
          x.site.toLowerCase().includes(q)||
          x.batchName.toLowerCase().includes(q)||
          x.opName.toLowerCase().includes(q)
        );
        if(!matches.length){
          results.appendChild(h('div',{style:{padding:'10px',color:'#aaa',fontSize:'13px'}},'No yards found'));
        } else {
          matches.forEach(({site,batchName,opName})=>{
            const row=h('div',{style:{padding:'9px 12px',cursor:'pointer',borderBottom:'.5px solid #f0f0ee',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px'}});
            // Left: site name
            row.appendChild(h('span',{style:{fontSize:'14px',fontWeight:'600',color:'#333',flexShrink:'0'}},site));
            // Right: batch · op in muted text
            row.appendChild(h('span',{style:{fontSize:'11px',color:'#aaa',textAlign:'right',lineHeight:'1.4'}},batchName+' · '+opName));
            row.addEventListener('mousedown',e=>{e.preventDefault();onSelect(site,opName);searchInp.value='';results.style.display='none';});
            results.appendChild(row);
          });
        }
        results.style.display='block';
      });
      searchInp.addEventListener('blur',()=>setTimeout(()=>{results.style.display='none';},150));

      wrap.appendChild(searchInp);
      wrap.appendChild(results);
      container.appendChild(wrap);
      setTimeout(()=>searchInp.focus(),50);
    }

    function makeSiteNavigator(container, onSelect, excludeSite){
      const nav={op:null,batch:null};
      function renderNav(){
        container.innerHTML='';
        if(!nav.op){
          // Op list
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Operation'));
          Object.entries(OPERATIONS).forEach(([opName,op])=>{
            const btn=h('button',{style:{display:'block',width:'100%',padding:'10px 12px',marginBottom:'6px',background:'#fff',border:`.5px solid ${op.accent}44`,borderLeft:`3px solid ${op.accent}`,borderRadius:'8px',cursor:'pointer',textAlign:'left',fontSize:'14px',fontWeight:'600',color:'#333'},
              onClick:()=>{nav.op=opName;nav.batch=null;renderNav();}},opName);
            container.appendChild(btn);
          });
        } else if(!nav.batch){
          // Batch list with back
          const bc=h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'8px',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:()=>{nav.op=null;renderNav();}},
            h('span',{style:{color:movColor}},'‹'),h('span',null,' '+nav.op));
          container.appendChild(bc);
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Batch'));
          Object.entries(OPERATIONS[nav.op].yards).forEach(([batchName,batchData])=>{
            const btn=h('button',{style:{display:'block',width:'100%',padding:'9px 12px',marginBottom:'5px',background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',cursor:'pointer',textAlign:'left',display:'flex',justifyContent:'space-between',alignItems:'center'},
              onClick:()=>{nav.batch=batchName;renderNav();}},
              h('span',{style:{fontSize:'14px',fontWeight:'500',color:'#333'}},batchName),
              h('span',{style:{fontSize:'12px',color:'#bbb'}},batchData.sites.length+' sites ›')
            );
            container.appendChild(btn);
          });
        } else {
          // Site list with back
          const bc=h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'8px',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'},onClick:()=>{nav.batch=null;renderNav();}},
            h('span',{style:{color:movColor}},'‹'),h('span',null,' '+nav.op+' / '+nav.batch));
          container.appendChild(bc);
          container.appendChild(h('div',{className:'lbl',style:{marginBottom:'6px'}},'Site'));
          OPERATIONS[nav.op].yards[nav.batch].sites.forEach(site=>{
            if(site===excludeSite) return;
            const btn=h('button',{style:{display:'block',width:'100%',padding:'9px 12px',marginBottom:'5px',background:'#fff',border:'.5px solid #ddd',borderRadius:'8px',cursor:'pointer',textAlign:'left',fontSize:'14px',color:'#333'},
              onClick:()=>onSelect(site,nav.op)},site);
            container.appendChild(btn);
          });
        }
      }
      renderNav();
    }

    function renderAddPickupForm(){
      addPickupArea.innerHTML='';
      // Pre-fill if editing an existing pickup
      const pre=editingPickup||{};
      editingPickup=null;
      const pickupData={site:pre.site||'',op:pre.op||'',pallets:pre.pallets||'',singles:pre.singles||'',
        half_pallet:pre.half_pallet||false,alive_hives:pre.alive_hives||'',dead_hives:pre.dead_hives||'',
        doubles:pre.doubles||'',singles_boxes:pre.singles_boxes||'',light:pre.light||''};
      const isYY=loadDirection.val==='yard_yard';
      const isOut=loadDirection.val==='to_orchard';
      const isEditing=!!(pre.site);
      const card=h('div',{className:'form-card',style:{marginBottom:'12px',border:isEditing?'1.5px solid #9b59b6':''}});
      // Collapsible header — collapsed by default when there are already pickups
      const addTitle=isEditing?`Editing: ${pre.site}`:(isOut?'+ Pick up from yard':isYY?'+ Pick up from yard':'+ Pick up from orchard');
      const isCollapsed=pickups.length>0&&!isEditing;
      const addHeaderRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:isCollapsed?'0':'10px'}});
      addHeaderRow.appendChild(h('span',{style:{fontSize:'13px',fontWeight:'700',color:isEditing?'#9b59b6':movColor}},addTitle));
      const addChev=h('span',{style:{fontSize:'14px',color:movColor}},isCollapsed?'▼':'▲');
      addHeaderRow.appendChild(addChev);
      card.appendChild(addHeaderRow);
      const addBody=h('div',{style:{display:isCollapsed?'none':'block',marginTop:'10px'}});
      addHeaderRow.addEventListener('click',()=>{
        const open=addBody.style.display!=='none';
        addBody.style.display=open?'none':'block';
        addChev.textContent=open?'▼':'▲';
        addHeaderRow.style.marginBottom=open?'0':'10px';
      });

      if(isOut||isYY){
        // Yard search for all yard selections
        const searchArea=h('div',{style:{marginBottom:'10px'}});
        const selectedDisplay=h('div',{style:{display:'none',marginBottom:'10px'}});
        addBody.appendChild(searchArea);
        addBody.appendChild(selectedDisplay);
        function showSelected(site, opName){
          searchArea.style.display='none';
          selectedDisplay.style.display='block';
          selectedDisplay.innerHTML='';
          selectedDisplay.appendChild(h('div',{style:{background:'#f3e8ff',border:'1.5px solid '+movColor,borderRadius:'8px',padding:'9px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('div',null,
              h('div',{style:{fontWeight:'600',fontSize:'14px',color:'#333'}},site),
              h('div',{style:{fontSize:'12px',color:'#888'}},opName)
            ),
            h('button',{style:{background:'none',border:'none',color:movColor,fontSize:'12px',fontWeight:'600',cursor:'pointer'},
              onClick:()=>{pickupData.site='';pickupData.op='';searchArea.style.display='block';selectedDisplay.style.display='none';refreshTruckSpaceHints();}
            },'Change')
          ));
        }
        makeYardSearch(searchArea,(site,opName)=>{
          pickupData.site=site;pickupData.op=opName;
          showSelected(site,opName);
          refreshTruckSpaceHints();
        }, null);
        // Pre-fill if editing
        if(pickupData.site) showSelected(pickupData.site,pickupData.op);
      } else {
        // Orchard dropdown for Orchard→Yard and Orchard→Orchard pickup source
        const sw=h('div',{style:{marginBottom:'10px'}});
        sw.appendChild(h('label',{className:'lbl'},'From orchard'));
        const sel=h('select',{style:{display:'block',width:'100%',padding:'9px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box'}});
        sel.appendChild(h('option',{value:''},'— Select orchard —'));
        getAllOrchards().forEach(s=>sel.appendChild(h('option',{value:s},s)));
        if(pickupData.site) sel.value=pickupData.site;

        // For Orchard→Yard: show yard breakdown when orchard selected
        const yardBreakdownArea=h('div',null);
        function renderYardBreakdown(orchardName){
          yardBreakdownArea.innerHTML='';
          if(!orchardName||loadDirection.val!=='from_orchard') return;
          // Build per-yard net hives in this orchard from movements
          const movements=loadMovements();
          const yardTotals={};  // {site: {pallets, singles, hives, op}}
          movements.forEach(m=>{
            if(m.direction==='to_orchard'&&m.to_orchard===orchardName){
              const k=m.from_site;if(!k)return;
              if(!yardTotals[k])yardTotals[k]={pallets:0,singles:0,half:0,hives:0,op:m.from_op};
              yardTotals[k].pallets+=parseInt(m.pallets)||0;
              yardTotals[k].singles+=parseInt(m.singles)||0;
              yardTotals[k].half+=(m.half_pallet?1:0);
              yardTotals[k].hives+=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
            }
            if(m.direction==='from_orchard'&&m.from_orchard===orchardName){
              const k=m.to_site;if(!k)return;
              if(!yardTotals[k])yardTotals[k]={pallets:0,singles:0,half:0,hives:0,op:m.to_op};
              yardTotals[k].pallets-=parseInt(m.pallets)||0;
              yardTotals[k].singles-=parseInt(m.singles)||0;
              yardTotals[k].hives-=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
            }
          });
          const activeYards=Object.entries(yardTotals).filter(([,v])=>v.pallets>0||v.singles>0||v.hives>0);
          if(!activeYards.length) return;

          yardBreakdownArea.appendChild(h('div',{style:{fontSize:'11px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.06em',marginTop:'10px',marginBottom:'6px'}},'Hives currently from:'));
          activeYards.forEach(([site,data])=>{
            const inOrchard=data.pallets>0||data.singles>0;
            const row=h('div',{style:{background:'#f8f8f6',borderRadius:'8px',padding:'9px 12px',marginBottom:'6px'}});
            const topR=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}});
            const lft=h('div',null);
            lft.appendChild(h('div',{style:{fontWeight:'600',fontSize:'14px',color:'#333'}},site));
            const palStr=data.pallets+(data.half>0?'½':'')+'p'+(data.singles>0?' · '+data.singles+'s':'');
            lft.appendChild(h('div',{style:{fontSize:'12px',color:'#888',marginTop:'2px'}},palStr+' in orchard'));
            topR.appendChild(lft);
            topR.appendChild(h('span',{style:{fontSize:'11px',color:'#7a4fa8',fontWeight:'600',background:'#f3e8ff',borderRadius:'10px',padding:'2px 7px'}},data.op||''));
            row.appendChild(topR);

            // Input: how many pallets/singles taking back now
            const takeGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'6px',alignItems:'end',marginBottom:'4px'}});
            const pw=h('div',null);
            pw.appendChild(h('label',{style:{fontSize:'10px',color:'#9b59b6',textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},'Pallets back'));
            const palInp2=h('input',{type:'number',inputmode:'numeric',min:'0',max:String(data.pallets),placeholder:'0',style:{width:'100%',padding:'6px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'14px',fontWeight:'700',background:'#fff',boxSizing:'border-box'}});
            pw.appendChild(palInp2);takeGrid.appendChild(pw);
            // half toggle
            const hw2=h('div',{style:{textAlign:'center',paddingBottom:'2px'}});
            hw2.appendChild(h('div',{style:{fontSize:'10px',color:'#aaa',marginBottom:'3px'}}),'½');
            let halfBack=false;
            const halfBtn2=h('button',{type:'button',style:{width:'30px',height:'30px',borderRadius:'50%',border:'1.5px solid #ddd',background:'#fff',fontSize:'11px',cursor:'pointer',color:'#aaa',fontWeight:'700'}},'+½');
            halfBtn2.addEventListener('click',()=>{halfBack=!halfBack;halfBtn2.style.background=halfBack?'#9b59b6':'#fff';halfBtn2.style.color=halfBack?'#fff':'#aaa';halfBtn2.style.border=halfBack?'1.5px solid #9b59b6':'1.5px solid #ddd';});
            hw2.appendChild(halfBtn2);takeGrid.appendChild(hw2);
            const sw2=h('div',null);
            sw2.appendChild(h('label',{style:{fontSize:'10px',color:'#9b59b6',textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},'Singles back'));
            const singInp2=h('input',{type:'number',inputmode:'numeric',min:'0',max:String(data.singles),placeholder:'0',style:{width:'100%',padding:'6px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'14px',fontWeight:'700',background:'#fff',boxSizing:'border-box'}});
            sw2.appendChild(singInp2);takeGrid.appendChild(sw2);
            row.appendChild(takeGrid);

            // Remaining indicator — updates live
            const remainDiv=h('div',{style:{fontSize:'12px',color:'#aaa',marginTop:'2px'}});
            function updateRemain(){
              const takePal=(parseInt(palInp2.value)||0)+(halfBack?0.5:0);
              const takeSing=parseInt(singInp2.value)||0;
              const remPal=Math.max(0,data.pallets+(data.half*0.5)-takePal);
              const remSing=Math.max(0,data.singles-takeSing);
              remainDiv.textContent=remPal>0||remSing>0?`${remPal}p${remSing?' · '+remSing+'s':''} still in orchard`:'All returning';
              remainDiv.style.color=remPal===0&&remSing===0?'#3d7a4f':'#ef9f27';
            }
            palInp2.addEventListener('input',updateRemain);
            singInp2.addEventListener('input',updateRemain);
            halfBtn2.addEventListener('click',updateRemain);
            row.appendChild(remainDiv);

            // "+ Add to truck" for this yard
            row.appendChild(h('button',{style:{marginTop:'8px',width:'100%',padding:'7px',background:'rgba(155,89,182,0.1)',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:'#9b59b6',cursor:'pointer'},
              onClick:()=>{
                const tp=parseInt(palInp2.value)||0;
                const ts=parseInt(singInp2.value)||0;
                if(!tp&&!ts&&!halfBack){showToast('Enter pallets or singles to take back');return;}
                pickups.push({
                  site,op:data.op||'',
                  pallets:String(tp),singles:String(ts),half_pallet:halfBack,
                  alive_hives:'',dead_hives:'',
                  id:nextId++,splits:[]
                });
                // Reset inputs
                palInp2.value='';singInp2.value='';halfBack=false;
                halfBtn2.style.background='#fff';halfBtn2.style.color='#aaa';halfBtn2.style.border='1.5px solid #ddd';
                updateRemain();
                renderPickups();
              }
            },'+ Add to truck'));
            yardBreakdownArea.appendChild(row);
          });
        }

        sel.addEventListener('change',e=>{
          pickupData.site=e.target.value;
          renderYardBreakdown(e.target.value);
        });
        if(pickupData.site) renderYardBreakdown(pickupData.site);
        sw.appendChild(sel);
        sw.appendChild(yardBreakdownArea);
        addBody.appendChild(sw);


        // Orchard→Orchard only: optional "from yards" dropdown multi-select
        if(loadDirection.val==='orchard_orchard'){
          const ywrap=h('div',{style:{marginTop:'8px'}});
          ywrap.appendChild(h('label',{className:'lbl'},'From yards (optional)'));
          const selectedYards=new Set(pickupData.from_yards||[]);
          // Build full site list
          const allS=[];
          Object.entries(OPERATIONS).forEach(([opName,op])=>{
            Object.entries(getYards(opName)).forEach(([batchName,batch])=>{
              batch.sites.forEach(site=>allS.push({site,batchName,opName}));
            });
          });
          allS.sort((a,b)=>a.site.localeCompare(b.site));
          // Tags showing selected yards
          const tagsRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'6px'}});
          function refreshTags(){
            tagsRow.innerHTML='';
            [...selectedYards].forEach(site=>{
              const tag=h('span',{style:{fontSize:'12px',fontWeight:'600',color:'#7a4fa8',background:'#f3e8ff',borderRadius:'10px',padding:'3px 8px',cursor:'pointer'}},site+' ×');
              tag.addEventListener('click',()=>{selectedYards.delete(site);pickupData.from_yards=[...selectedYards];refreshTags();yardSel.value='';});
              tagsRow.appendChild(tag);
            });
          }
          ywrap.appendChild(tagsRow);
          // Dropdown — pick one at a time
          const yardSel=h('select',{style:{display:'block',width:'100%',padding:'9px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'14px',background:'#fafafa',boxSizing:'border-box'}});
          yardSel.appendChild(h('option',{value:''},'— Add a yard —'));
          allS.forEach(({site,batchName})=>yardSel.appendChild(h('option',{value:site},site+' · '+batchName)));
          yardSel.addEventListener('change',e=>{
            const v=e.target.value;if(!v)return;
            selectedYards.add(v);pickupData.from_yards=[...selectedYards];
            refreshTags();yardSel.value='';
          });
          ywrap.appendChild(yardSel);
          addBody.appendChild(ywrap);
        }
      }

      // Truck space — pallets (large), ½ pill, singles, live hive total
      const truckRow=h('div',{style:{marginBottom:'10px'}});
      truckRow.appendChild(h('label',{className:'lbl'},'Truck space'));

      // Faded hints from the source yard's actual pallet/singles split (transport packing,
      // not brood-chamber box count) — purely a placeholder, never overwrites what's typed.
      const hintWarning=h('div',{style:{fontSize:'11px',color:'#ef9f27',marginBottom:'6px',display:'none'}},
        '⚠ Pallet/singles split not set for this yard yet — set it on the yard summary tile for a hint here.');
      truckRow.appendChild(hintWarning);

      // Pallets — big prominent input
      const palRow=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}});
      const palInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{flex:'1',padding:'10px 12px',border:'1.5px solid '+movColor,borderRadius:'8px',fontSize:'22px',fontWeight:'800',background:'#fff',boxSizing:'border-box',color:'#1a1a1a',textAlign:'center'}});
      if(pickupData.pallets) palInp.value=pickupData.pallets;
      palInp.addEventListener('input',e=>{pickupData.pallets=e.target.value;updateHiveTotal();});
      palRow.appendChild(palInp);
      palRow.appendChild(h('span',{style:{fontSize:'14px',color:'#888',flexShrink:'0'}},'pallets'));
      // ½ toggle pill
      const halfBtn=h('button',{type:'button',style:{padding:'8px 10px',borderRadius:'20px',border:pickupData.half_pallet?'1.5px solid '+movColor:'1.5px solid #ddd',background:pickupData.half_pallet?movColor:'#fff',color:pickupData.half_pallet?'#fff':'#aaa',fontSize:'12px',fontWeight:'700',cursor:'pointer',flexShrink:'0',transition:'all .15s',whiteSpace:'nowrap'}},'+½');
      halfBtn.addEventListener('click',()=>{
        pickupData.half_pallet=!pickupData.half_pallet;
        halfBtn.style.border=pickupData.half_pallet?'1.5px solid '+movColor:'1.5px solid #ddd';
        halfBtn.style.background=pickupData.half_pallet?movColor:'#fff';
        halfBtn.style.color=pickupData.half_pallet?'#fff':'#aaa';
        updateHiveTotal();
      });
      palRow.appendChild(halfBtn);
      truckRow.appendChild(palRow);

      // Singles — smaller secondary input
      const singRow=h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px'}});
      const sinInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{flex:'1',padding:'8px 12px',border:'.5px solid #ccc',borderRadius:'8px',fontSize:'16px',fontWeight:'700',background:'#fafafa',boxSizing:'border-box',color:'#555',textAlign:'center'}});
      if(pickupData.singles) sinInp.value=pickupData.singles;
      sinInp.addEventListener('input',e=>{pickupData.singles=e.target.value;updateHiveTotal();});
      singRow.appendChild(sinInp);
      singRow.appendChild(h('span',{style:{fontSize:'14px',color:'#888',flexShrink:'0'}},'singles'));
      truckRow.appendChild(singRow);

      // Re-reads the source yard's pallet/singles split and updates the placeholders live —
      // called on initial build AND every time the pickup yard selection changes, since picking
      // a yard from search only updates a small local display, not this whole section.
      function refreshTruckSpaceHints(){
        if(pickupData.site&&pickupData.op){
          const split=getCurrentPalletSplit(pickupData.op,pickupData.site);
          if(split){
            palInp.placeholder=String(split.pallets);
            sinInp.placeholder=String(split.singles);
            hintWarning.style.display='none';
          } else {
            palInp.placeholder='0';
            sinInp.placeholder='0';
            hintWarning.style.display='block';
          }
        } else {
          palInp.placeholder='0';
          sinInp.placeholder='0';
          hintWarning.style.display='none';
        }
      }
      refreshTruckSpaceHints();

      // Live hive total
      const hiveTotal=h('div',{style:{textAlign:'center',fontSize:'12px',color:movColor,fontWeight:'600',marginBottom:'4px'}});
      function updateHiveTotal(){
        const p=(parseInt(palInp.value)||0)*4+(pickupData.half_pallet?2:0)+(parseInt(sinInp.value)||0);
        hiveTotal.textContent=p>0?'= '+p+' hive'+(p!==1?'s':''):'';
      }
      updateHiveTotal();
      truckRow.appendChild(hiveTotal);
      addBody.appendChild(truckRow);

      // Doubles and singles boxes in this load
      const boxRow=h('div',{style:{marginBottom:'8px'}});
      boxRow.appendChild(h('label',{className:'lbl',style:{display:'block',marginBottom:'4px'}},'Boxes in this load'));
      const boxGrid2=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'}});
      [{label:'Doubles',key:'doubles'},{label:'Singles (box)',key:'singles_boxes'},{label:'Light',key:'light'}].forEach(({label,key})=>{
        const wrap2=h('div',null);
        wrap2.appendChild(h('label',{style:{fontSize:'10px',color:'#aaa',textTransform:'uppercase',letterSpacing:'.04em',display:'block',marginBottom:'3px'}},label));
        const bi=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'7px 8px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',fontWeight:'700',background:'#fafafa',boxSizing:'border-box'}});
        bi.value=pickupData[key]||'';
        bi.addEventListener('input',e=>pickupData[key]=e.target.value);
        wrap2.appendChild(bi);boxGrid2.appendChild(wrap2);
      });
      boxRow.appendChild(boxGrid2);
      addBody.appendChild(boxRow);

      // Hive count row — alive + dead
      const hiveRow=h('div',{style:{marginBottom:'10px'}});
      hiveRow.appendChild(h('label',{className:'lbl'},'Hives on this pickup'));
      const hiveGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}});
      [{label:'Alive',key:'alive_hives',color:'#3d7a4f'},{label:'Dead',key:'dead_hives',color:'#e24b4a'}].forEach(({label,key,color})=>{
        const nw=h('div',null);
        nw.appendChild(h('label',{style:{fontSize:'10px',color:color,textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},label));
        const ni=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'8px 10px',border:`.5px solid ${color}55`,borderRadius:'7px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
        if(pickupData[key]) ni.value=pickupData[key];
        ni.addEventListener('input',e=>pickupData[key]=e.target.value);
        nw.appendChild(ni);hiveGrid.appendChild(nw);
      });
      hiveRow.appendChild(hiveGrid);
      addBody.appendChild(hiveRow);

      addBody.appendChild(h('button',{style:{width:'100%',padding:'10px',background:'rgba(155,89,182,0.1)',border:'1.5px solid '+movColor,borderRadius:'8px',fontSize:'13px',fontWeight:'700',color:movColor,cursor:'pointer'},
        onClick:()=>{
          if(!pickupData.site){showToast(isOut?'Select a yard site':isYY?'Select a yard site':'Select an orchard');return;}
          if(!pickupData.pallets&&!pickupData.singles&&!pickupData.half_pallet){showToast('Enter truck space (pallets or singles)');return;}
          pickups.push({...pickupData,id:nextId++,splits:[]});
          renderPickups();
          renderAddPickupForm();
        }
      },'+ Add to truck'));
      card.appendChild(addBody);
      addPickupArea.appendChild(card);
    }

    function rebuildAll(){renderPickups();renderAddPickupForm();}

    // ── Return trip mode: pre-populate from plan ──
    if(STATE._returnMode&&STATE._returnPlan&&STATE._returnPlan.length){
      loadDirection.val='from_orchard';
      updateDirBtns();
      // Group plan by orchard (source) — each orchard becomes a pickup
      const byOrchard={};
      STATE._returnPlan.forEach(p=>{
        if(!byOrchard[p.orchard])byOrchard[p.orchard]={orchard:p.orchard,pallets:0,singles:0,destinations:[],half_pallet:false,alive_hives:'',dead_hives:''};
        byOrchard[p.orchard].pallets+=parseInt(p.pallets)||0;
        byOrchard[p.orchard].singles+=parseInt(p.singles)||0;
        byOrchard[p.orchard].destinations.push(p); // for auto-split
      });
      Object.values(byOrchard).forEach(item=>{
        const pick={site:item.orchard,op:'',pallets:String(item.pallets),singles:String(item.singles),half_pallet:false,alive_hives:'',dead_hives:'',id:nextId++,splits:[]};
        // Auto-assign splits back to source yards
        item.destinations.forEach(dest=>{
          const h=(parseInt(dest.pallets)||0)*4+(parseInt(dest.singles)||0);
          if(h>0) pick.splits.push({dest:dest.site,dest_op:dest.op,hives:h,desc:(parseInt(dest.pallets)||0)+'p'+(parseInt(dest.singles)>0?' · '+dest.singles+'s':'')});
        });
        pickups.push(pick);
      });
      delete STATE._returnMode;
      delete STATE._returnPlan;
      showToast('Return trip loaded — review and save');
    }

    rebuildAll();
    screen.appendChild(wrap);
  }

      // ── Orchards tab ──
  else if(STATE.tab==='orchards'){
    const totals=getOrchardTotals();
    const active=getAllOrchards().filter(o=>totals[o]&&totals[o].hives>0);
    const movements=loadMovements();

    // Detail view for a single orchard
    if(STATE.selectedOrchard){
      const o=STATE.selectedOrchard;
      const t=totals[o]||{hives:0,pallets:0,singles:0};

      // Breadcrumb
      const bc=h('div',{className:'breadcrumb'});
      bc.appendChild(h('span',{style:{cursor:'pointer',color:'#9b59b6'},onClick:()=>setState({selectedOrchard:null})},'Orchards'));
      bc.appendChild(document.createTextNode(' / '));
      bc.appendChild(h('span',{style:{color:'#333',fontWeight:'600'}},o));
      screen.appendChild(bc);

      // Build per-site net breakdown
      const siteBreakdown={};
      movements.forEach(m=>{
        if(m.direction==='to_orchard'&&m.to_orchard===o){
          const site=m.from_site;if(!site)return;
          if(!siteBreakdown[site])siteBreakdown[site]={sent:0,returned:0,sentSingles:0,retSingles:0,moves:[]};
          siteBreakdown[site].sent+=parseInt(m.pallets)||0;
          siteBreakdown[site].sentSingles+=parseInt(m.singles)||0;
          siteBreakdown[site].moves.push({...m,type:'in'});
        }
        if(m.direction==='from_orchard'&&m.from_orchard===o){
          const site=m.to_site;if(!site)return;
          if(!siteBreakdown[site])siteBreakdown[site]={sent:0,returned:0,sentSingles:0,retSingles:0,moves:[]};
          siteBreakdown[site].returned+=parseInt(m.pallets)||0;
          siteBreakdown[site].retSingles+=parseInt(m.singles)||0;
          siteBreakdown[site].moves.push({...m,type:'out'});
        }
      });

      const activeSites=Object.entries(siteBreakdown).filter(([,v])=>(v.sent-v.returned)>0||(v.sentSingles-v.retSingles)>0);
      const totalNetPal=activeSites.reduce((a,[,v])=>a+(v.sent-v.returned),0);
      const totalNetSing=activeSites.reduce((a,[,v])=>a+(v.sentSingles-v.retSingles),0);
      const totalNetHives=totalNetPal*4+totalNetSing;

      // Summary bar
      screen.appendChild(h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'14px',marginBottom:'14px'}},
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom: activeSites.some(([,v])=>v.returned>0)?'10px':'0'}},
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:'22px',fontWeight:'800',color:'#fff',lineHeight:'1'}},totalNetHives),
            h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:'.04em',marginTop:'3px'}},'Hives in orchard')
          ),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:'22px',fontWeight:'800',color:'#fff',lineHeight:'1'}},totalNetPal),
            h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:'.04em',marginTop:'3px'}},'Pallets')
          ),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:'22px',fontWeight:'800',color:'#fff',lineHeight:'1'}},totalNetSing),
            h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:'.04em',marginTop:'3px'}},'Singles')
          )
        )
      ));

      if(!activeSites.length){
        screen.appendChild(h('div',{style:{textAlign:'center',padding:'30px 0',color:'#ccc',fontSize:'14px'}},'All hives have returned from this orchard'));
      } else {
        screen.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',color:'#888',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'10px'}},activeSites.length+' yard'+(activeSites.length!==1?'s':'')+' currently here'));
        activeSites.sort((a,b)=>(b[1].sent-b[1].returned)-(a[1].sent-a[1].returned)).forEach(([site,data])=>{
          const netPal=data.sent-data.returned;
          const netSing=data.sentSingles-data.retSingles;
          const netHives=netPal*4+netSing;
          const hasReturns=data.returned>0||data.retSingles>0;

          const card=h('div',{style:{background:'#fff',border:'.5px solid #e0e0de',borderRadius:'12px',marginBottom:'10px',overflow:'hidden'}});

          const hdr=h('div',{style:{padding:'12px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'.5px solid #f0f0ee'}});
