<script>
// Lazy-load Supabase and EmailJS only when online — app works fully without them
let _sbLoaded = false, _ejLoaded = false;

function loadScript(src) {
  return new Promise((resolve) => {
    if (!navigator.onLine) { resolve(false); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
}

async function loadLibraries() {
  if (!navigator.onLine) return;
  if (!_sbLoaded) {
    _sbLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2');
    if (_sbLoaded) {
      try {
        window._sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        subscribeRealtime();
        await pullFromSupabase();
        await flushPending();
      } catch(e) { _sbLoaded = false; }
    }
  }
  if (!_ejLoaded) {
    _ejLoaded = await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if (_ejLoaded) {
      try { emailjs.init(EMAILJS_PUBLIC); } catch(e) { _ejLoaded = false; }
    }
  }
}

async function addMovement(mov){
  const movements=[...loadMovements(),mov];
  saveMovements(movements);
  await pushToSupabase('hive_movements',movements);
  // Auto-log movement entries into yard site diaries
  const totalOnLoad=(parseInt(mov.alive_hives)||0)+(parseInt(mov.dead_hives)||0);
  const hiveChange = totalOnLoad>0 ? totalOnLoad : mov.hives ? parseInt(mov.hives)||0 : (parseInt(mov.pallets)||0)*4+(mov.half_pallet?2:0)+(parseInt(mov.singles)||0);

  async function logToSite(siteKey, opName, isDeduction){
    if(!siteKey||!opName) return;
    const k = eKey(opName, siteKey, 'spring');
    const existing = STATE.entries[k]||[];
    const lastHives = parseInt(existing[0]?.hives)||0;
    const newHives = isDeduction ? Math.max(0,lastHives-hiveChange) : lastHives+hiveChange;
    let desc;
    const truckStr=(parseInt(mov.pallets)||0)+(mov.half_pallet?'½':'')+'p'+(parseInt(mov.singles)>0?' + '+mov.singles+'s':'');
  const hiveStr=(parseInt(mov.alive_hives)||0)+(parseInt(mov.dead_hives)>0?` alive, ${mov.dead_hives} dead`+' hives':' alive hives');
  const hiveDetail=parseInt(mov.alive_hives)>0?' ('+hiveStr+')':'';
  if(mov.direction==='to_orchard') desc=`MOVEMENT OUT: ${truckStr}${hiveDetail} → ${mov.to_orchard}`;
    else if(mov.direction==='from_orchard') desc=`MOVEMENT IN: ${truckStr}${hiveDetail} ← ${mov.from_orchard}`;
    else if(isDeduction) desc=`MOVED OUT: ${truckStr}${hiveDetail} → ${mov.to_site}`;
    else desc=`MOVED IN: ${truckStr}${hiveDetail} ← ${mov.from_site}`;
    const movEntry = {
      date: mov.date,
      hives: String(newHives),
      comments: desc,
      logged_by: mov.logged_by,
      saved_at: new Date().toISOString(),
      _movement: true
    };
    const updated = {...STATE.entries, [k]: [movEntry, ...existing]};
    saveLocal(updated);
    await pushToSupabase(k, updated[k]);
    STATE.entries = updated;
  }

  if(mov.direction==='to_orchard'){
    await logToSite(mov.from_site, mov.from_op, true);
  } else if(mov.direction==='from_orchard'){
    await logToSite(mov.to_site, mov.to_op, false);
  } else if(mov.direction==='yard_yard'){
    await logToSite(mov.from_site, mov.from_op, true);   // deduct from source
    await logToSite(mov.to_site, mov.to_op, false);      // add to destination
  }
}

function getOrchardTotals(){
  // Returns {orchard: {pallets, singles, hives}} from all movements
  const movements=loadMovements();
  const totals={};
  getAllOrchards().forEach(o=>totals[o]={pallets:0,singles:0,hives:0});
  movements.forEach(m=>{
    const pallets=parseInt(m.pallets)||0;
    const singles=parseInt(m.singles)||0;
    const hives=pallets*4+singles;
    if(m.direction==='to_orchard'){
      const o=m.to_orchard;
      if(!totals[o])totals[o]={pallets:0,singles:0,hives:0};
      totals[o].pallets+=pallets;totals[o].singles+=singles;totals[o].hives+=hives;
    } else {
      const o=m.from_orchard;
      if(!totals[o])totals[o]={pallets:0,singles:0,hives:0};
      totals[o].pallets=Math.max(0,totals[o].pallets-pallets);
      totals[o].singles=Math.max(0,totals[o].singles-singles);
      totals[o].hives=Math.max(0,totals[o].hives-hives);
    }
  });
  return totals;
}

};

// Merge custom yards into OPERATIONS at runtime
function getYards(opName){
  const base=OPERATIONS[opName].yards;
  const custom=loadCustomYards()[opName]||{};
  const merged={};
  // Start with all base batches
  Object.entries(base).forEach(([batch,data])=>{
    const customSites=custom[batch]?.sites||[];
    const allSites=[...data.sites,...customSites.filter(s=>!data.sites.includes(s))];
    merged[batch]={...data,sites:allSites};
  });
  // Add any entirely new custom batches
  Object.entries(custom).forEach(([batch,data])=>{
    if(!merged[batch]) merged[batch]=data;
  });
  return merged;
}
function addCustomSite(opName,batchName,siteName){
  const cy=loadCustomYards();
  if(!cy[opName])cy[opName]={};
  // Never touch built-in sites - only manage the custom sites array
  if(!cy[opName][batchName])cy[opName][batchName]={type:'run',sites:[]};
  if(!cy[opName][batchName].sites.includes(siteName))cy[opName][batchName].sites.push(siteName);
  saveCustomYards(cy);
  pushToSupabase('custom_yards',cy);
}
function removeCustomSite(opName,batchName,siteName){
  // Safety check: never remove a built-in site
  const builtIn=OPERATIONS[opName]?.yards[batchName]?.sites||[];
  if(builtIn.includes(siteName)){console.warn('Refusing to remove built-in site:',siteName);return;}
  const cy=loadCustomYards();
  if(!cy[opName]?.[batchName]) return;
  cy[opName][batchName].sites=cy[opName][batchName].sites.filter(s=>s!==siteName);
  if(!cy[opName][batchName].sites.length) delete cy[opName][batchName];
  if(!Object.keys(cy[opName]||{}).length) delete cy[opName];
  saveCustomYards(cy);
  pushToSupabase('custom_yards',cy);
}

  else{delete f[k];saveChecks(f);await pushToSupabase(k,{deleted:true});}
}

// ── Supabase sync ─────────────────────────────────────────────────────────────
async function pushToSupabase(key, data){
  if(!navigator.onLine||!window._sb){
    const pending=JSON.parse(localStorage.getItem('apiary_pending')||'[]');
    if(!pending.find(p=>p.key===key)) pending.push({key,data});
    localStorage.setItem('apiary_pending',JSON.stringify(pending));
    return;
  }
  updateSyncDot('syncing');
  try{
    const {error}=await window._sb.from('entries').upsert({entry_key:key,data:data,updated_at:new Date().toISOString()},{onConflict:'entry_key'});
    if(error)throw error;
    updateSyncDot('online');
  }catch(e){
    updateSyncDot('error');
    showToast('Sync error — saved locally');
    const pending=JSON.parse(localStorage.getItem('apiary_pending')||'[]');
    if(!pending.find(p=>p.key===key)) pending.push({key,data});
    localStorage.setItem('apiary_pending',JSON.stringify(pending));
  }
}

async function pullFromSupabase(){
  if(!navigator.onLine||!window._sb) return;
  updateSyncDot('syncing');
  try{
    const {data,error}=await window._sb.from('entries').select('entry_key,data');
    if(error)throw error;
    if(data&&data.length){
      const merged={...STATE.entries};
      const mergedFlags=loadFlags();
      data.forEach(row=>{
        if(row.entry_key==='hive_movements'){
          // Merge: keep local movements not in Supabase (in case of offline additions)
          if(row.data&&Array.isArray(row.data)){
            const local=loadMovements();
            const remoteIds=new Set(row.data.map(m=>m.id));
            const localOnly=local.filter(m=>!remoteIds.has(m.id));
            saveMovements([...row.data,...localOnly]);
          }
          return;
        }
        if(row.entry_key==='custom_orchards'){
          if(row.data&&Array.isArray(row.data)){
            const local=loadCustomOrchards();
            const merged=[...new Set([...row.data,...local])];
            saveCustomOrchards(merged);
          }
          return;
        }
        if(row.entry_key==='custom_yards'){
          // Merge: combine remote and local custom yards, local takes priority
          if(row.data&&typeof row.data==='object'){
            const local=loadCustomYards();
            const merged={};
            // Start with remote
            Object.entries(row.data).forEach(([op,batches])=>{
              merged[op]={};
              Object.entries(batches).forEach(([batch,data])=>{merged[op][batch]=data;});
            });
            // Layer local on top (adds any locally-added sites not yet in Supabase)
            Object.entries(local).forEach(([op,batches])=>{
              if(!merged[op])merged[op]={};
              Object.entries(batches).forEach(([batch,data])=>{
                if(!merged[op][batch]){merged[op][batch]=data;}
                else{
                  // Merge sites arrays
                  const combined=[...new Set([...merged[op][batch].sites,...data.sites])];
                  merged[op][batch]={...merged[op][batch],sites:combined};
                }
              });
            });
            saveCustomYards(merged);
          }
          return;
        }
        if(row.entry_key.endsWith('__check')&&!row.entry_key.endsWith('__flag')){
          const checks=loadChecks();
          if(row.data&&!row.data.deleted){checks[row.entry_key]=row.data;}
          else{delete checks[row.entry_key];}
          saveChecks(checks);return;
        }
        if(row.entry_key.endsWith('__flag')){
          // It's a flag — restore to local flags store
          if(row.data&&!row.data.deleted){
            mergedFlags[row.entry_key]=row.data;
          } else {
            delete mergedFlags[row.entry_key];
          }
        } else {
          merged[row.entry_key]=row.data;
        }
      });
      saveLocal(merged);
      saveFlags(mergedFlags);
      STATE.entries=merged;
    }
    updateSyncDot('online');
    render();
  }catch(e){
    updateSyncDot('error');
  }
}

async function flushPending(){
  const pending=JSON.parse(localStorage.getItem('apiary_pending')||'[]');
  if(!pending.length) return;
  updateSyncDot('syncing');
  const failed=[];
  for(const p of pending){
    try{
      const {error}=await window._sb.from('entries').upsert({entry_key:p.key,data:p.data,updated_at:new Date().toISOString()},{onConflict:'entry_key'});
      if(error)throw error;
    }catch(e){failed.push(p);}
  }
  localStorage.setItem('apiary_pending',JSON.stringify(failed));
  if(failed.length===0){showToast('All entries synced');updateSyncDot('online');}
  else updateSyncDot('error');
}

// ── Real-time subscription ────────────────────────────────────────────────────
function subscribeRealtime(){
  window._sb.channel('entries').on('postgres_changes',{event:'*',schema:'public',table:'entries'},payload=>{
    const {entry_key,data}=payload.new||{};
    if(entry_key&&data){
      STATE.entries[entry_key]=data;
      saveLocal(STATE.entries);
      render();
    }
  }).subscribe();
}

// ── Email report ──────────────────────────────────────────────────────────────
function buildDailyReport(opName, date, userName){
  const yards=OPERATIONS[opName].yards;
  const allSites=Object.values(yards).flatMap(y=>y.sites);
  let lines=[];
  lines.push(`APIARY DIARY — DAILY REPORT`);
  lines.push(`Operation: ${opName}`);
  lines.push(`Date: ${date}`);
  lines.push(`Logged by: ${userName||'Unknown'}`);
  lines.push(`${'─'.repeat(40)}`);

  let totalHives=0,totalDead=0,hasData=false;

  Object.entries(yards).forEach(([batchName,batchData])=>{
    const batchLines=[];
    batchData.sites.forEach(site=>{
      Object.entries(ROUNDS).forEach(([rk,rd])=>{
        const list=STATE.entries[eKey(opName,site,rk)]||[];
        const todayEntries=list.filter(e=>e.date===date);
        if(!todayEntries.length) return;
        hasData=true;
        todayEntries.forEach(e=>{
          batchLines.push(`\n  ${site} — ${rd.label}`);
          const fields=['hives','singles','doubles','light','dead','check','pol_pallet','part_pallet','pol_singles','qr','virgin','cell_needed','tops','splits','carrot','fd_harv','harv_34','on_34','fd_on'];
          fields.forEach(k=>{if(e[k]!==undefined&&e[k]!==''){batchLines.push(`    ${k.replace(/_/g,' ')}: ${e[k]}`)}});
          if(e.score_breakdown){
            const bd=e.score_breakdown;
            const parts=[0,1,2,3,4,5,6].filter(n=>bd[n]&&bd[n]!=='').map(n=>`${n}:${bd[n]}`);
            if(parts.length) batchLines.push(`    Spring scores: ${parts.join(', ')}`);
          }
          if(e.treatment) batchLines.push(`    Treatment: ${e.treatment}`);
          if(e.comments) batchLines.push(`    Notes: ${e.comments}`);
          totalHives+=parseInt(e.hives||0)||0;
          totalDead+=parseInt(e.dead||0)||0;
        });
      });
    });
    if(batchLines.length){
      lines.push(`\nBATCH: ${batchName}`);
      lines.push(...batchLines);
    }
  });

  if(!hasData) return null;

  lines.push(`\n${'─'.repeat(40)}`);
  lines.push(`TOTALS FOR TODAY`);
  lines.push(`Total hives visited: ${totalHives}`);
  lines.push(`Total dead: ${totalDead}`);
  lines.push(`\nSent automatically from Apiary Diary`);
  return lines.join('\n');
}

async function sendDailyReport(opName, showFeedback=false){
  if(!navigator.onLine){showToast('No signal — connect to send report');return;}
  const date=todayStr();

  // Load EmailJS if not already loaded
  if(!window._ejLoaded){
    if(showFeedback)showToast('Loading email service…');
    _ejLoaded=await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');

  }
  if(!window._ejLoaded||!window.emailjs){
    if(showFeedback)showToast('Email service unavailable — check connection');
    return;

  }

async function maybeQuarterlyBackup(){
  // Check once per day when app loads online
  const today=new Date();
  const lastKey='apiary_quarterly_sent';
  const last=localStorage.getItem(lastKey);
  if(last){
    const lastDate=new Date(last);
    const daysDiff=Math.floor((today-lastDate)/86400000);
    if(daysDiff<85) return; // not 3 months yet (~85 days)
  }
  // It's been 3 months (or never sent) — send for all operations
  if(!navigator.onLine) return;
  // Load EmailJS if needed
  if(!window._ejLoaded){
    _ejLoaded=await loadScript('https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js');
    if(_ejLoaded){try{emailjs.init(EMAILJS_PUBLIC);}catch(e){_ejLoaded=false;}}

  let sent=false;
  for(const opName of Object.keys(OPERATIONS)){
    const report=buildFullReport(opName);
    if(!report) continue;
    try{
      await emailjs.send(EMAILJS_SERVICE,EMAILJS_TEMPLATE,{
        to_email:REPORT_EMAIL,
        date:todayStr(),

        operation:opName+' — QUARTERLY BACKUP',
        user:'Automatic backup'
      });
      sent=true;
    }catch(e){console.warn('Quarterly backup failed:',e);}
  }
  if(sent){
    localStorage.setItem(lastKey,today.toISOString());
    showToast('Quarterly backup sent to '+REPORT_EMAIL,4000);
  }
}

// ── Summary calc ──────────────────────────────────────────────────────────────
function calcSummary(opName){
  const sites=allSitesFor(opName);
  // include custom yards
  let hives=0,dead=0,alive=0,deadHives=0,singles=0,doubles=0,light=0,pol=0,part=0,carrot=0;
  const breederSites=[],finisherSites=[];
  let fdOn=0,on34=0,hcFdOn=0,hcHdOn=0;
  let st=0,sc=0,logged=0,flagged=0;
  sites.forEach(site=>{
    // Find the single most recent entry across ALL rounds for this site
    let best=null, bestRk=null;
    Object.keys(ROUNDS).forEach(rk=>{
      const list=STATE.entries[eKey(opName,site,rk)]||[];
      list.forEach(e=>{if(!best||e.date>best.date){best=e;bestRk=rk;}});
    });
    // Also find most recent date for overdue check
    const allDates=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[]).map(e=>e.date));
    const latestDate=allDates.sort().reverse()[0];
    if(!latestDate||daysBetween(latestDate)>21)flagged++;
    if(!best)return;
    logged++;
    // For each field, use the most recent entry that actually has a value for it
    // This prevents empty fields in a new entry zeroing out previous counts
    const allSiteEntries=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[])).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const HIVE_FIELDS_LV=['hives','dead','singles','doubles','light','alive_hives','dead_hives'];
    const lastVal=k=>{
      for(const e of allSiteEntries){
        const raw=e[k];
        if(raw===undefined||raw===null||raw==='') continue;
        const v=parseInt(raw);
        if(!isNaN(v)){
          if(HIVE_FIELDS_LV.includes(k)) return v;
          if(v>0) return v;
        }
      }
      return 0;
    };
    hives+=lastVal('hives');dead+=lastVal('dead');singles+=lastVal('singles');doubles+=lastVal('doubles');
    alive+=lastVal('alive_hives');deadHives+=lastVal('dead_hives');
    light+=lastVal('light');pol+=lastVal('pol_pallet');part+=lastVal('part_pallet');carrot+=lastVal('carrot');
    fdOn+=lastVal('fd_on');
    on34+=lastVal('on_34');
    hcFdOn+=lastVal('honeycomb_fd');
    hcHdOn+=lastVal('honeycomb_hd');
    // Breeders/finishers from most recent real spring entry
    const springForQ=STATE.entries[eKey(opName,site,'spring')]?.find(e=>!e._movement);
    if(parseInt(springForQ?.breeders)>0) breederSites.push({site,count:parseInt(springForQ.breeders)});
    if(parseInt(springForQ?.finishers)>0) finisherSites.push({site,count:parseInt(springForQ.finishers)});
    // Spring score from most recent spring entry
    const springE=STATE.entries[eKey(opName,site,'spring')]?.[0];
    const bd=springE?.score_breakdown||{};
    [0,1,2,3,4,5,6].forEach(s=>{const v=parseInt(bd[s]);if(!isNaN(v)&&v>0){st+=s*v;sc+=v;}});
  });
  const avgScore=sc>0?(st/sc).toFixed(1):null;
  const barCounts=[0,1,2,3,4,5,6].map(s=>{let c=0;sites.forEach(site=>{const v=parseInt(STATE.entries[eKey(opName,site,'spring')]?.[0]?.score_breakdown?.[s]);if(!isNaN(v))c+=v;});return c;});
  return{hives,dead,alive,deadHives,singles,doubles,light,pol,part,carrot,fdOn,on34,hcFdOn,hcHdOn,avgScore,barCounts,scoreHives:sc,logged,total:sites.length,flagged,breederSites,finisherSites};
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false)return;
    el.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c);
  });
  return el;
}

function showDeadHivesModal(opName){
  const sites=Object.values(getYards(opName)).flatMap(y=>y.sites);
  const deadSites=[];
  sites.forEach(site=>{
    const allE=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(opName,site,rk)]||[]).filter(e=>!e._movement)).sort((a,b)=>{
      const dc=(b.date||'').localeCompare(a.date||'');
      return dc!==0?dc:(b.saved_at||'').localeCompare(a.saved_at||'');
    });
    const latest=allE[0];
    if(!latest) return;
    const dead=parseInt(latest.dead_hives)||parseInt(latest.dead)||0;
    if(dead>0) deadSites.push({site,dead,date:latest.date,round:latest._rk||''});
  });
  deadSites.sort((a,b)=>b.dead-a.dead);

  const overlay=h('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
  const box=h('div',{style:{background:'#fff',borderRadius:'16px',padding:'20px',width:'100%',maxWidth:'360px',maxHeight:'80vh',display:'flex',flexDirection:'column'}});
  box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'17px',marginBottom:'4px'}},'Dead hives — '+opName));
  box.appendChild(h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'14px'}},deadSites.length+' site'+(deadSites.length!==1?'s':'')+' with dead hives'));

  const list=h('div',{style:{overflowY:'auto',flex:'1'}});
  if(!deadSites.length){
    list.appendChild(h('div',{style:{textAlign:'center',padding:'20px 0',color:'#bbb',fontSize:'14px'}},'No dead hives recorded'));
  } else {
    deadSites.forEach(({site,dead,date})=>{
      const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',borderBottom:'.5px solid #f0f0ee',cursor:'pointer'},
        onClick:()=>{overlay.remove();setState({op:opName,tab:'diary',site,diaryView:'entries'});
          // Find batch for this site
          Object.entries(getYards(opName)).forEach(([batch,data])=>{
            if(data.sites.includes(site)) setState({op:opName,tab:'diary',run:batch,site,diaryView:'entries'});
          });
        }});
      const left=h('div',null);
      left.appendChild(h('div',{style:{fontWeight:'600',fontSize:'15px',color:'#333'}},site));
      left.appendChild(h('div',{style:{fontSize:'12px',color:'#aaa',marginTop:'2px'}},fmtDate(date)));
      const right=h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}});
      right.appendChild(h('div',{style:{fontSize:'22px',fontWeight:'800',color:'#c0392b',lineHeight:'1'}},dead));
      right.appendChild(h('div',{style:{fontSize:'11px',color:'#c0392b',textTransform:'uppercase'}},'dead'));
      right.appendChild(h('span',{style:{color:'#ddd',fontSize:'16px'}},'›'));
      row.appendChild(left);row.appendChild(right);
      list.appendChild(row);
    });
  }
  box.appendChild(list);
  box.appendChild(h('button',{style:{marginTop:'14px',width:'100%',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
    onClick:()=>overlay.remove()},'Close'));
  overlay.appendChild(box);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

function renderSummaryPanel(opName){

  panel.appendChild(g3);

  // Boxes on hives

    const boxGrid=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'6px'}});
    [{l:'FD on',v:s.fdOn},{l:'3/4 on',v:s.on34},{l:'HC FD',v:s.hcFdOn},{l:'HC 1/2',v:s.hcHdOn}].forEach(st=>{

    panel.appendChild(qyDiv);

    sr.appendChild(bars);sw.appendChild(sr);panel.appendChild(sw);
  }
  return panel;
}

function renderOverviewTab(){
  const op=STATE.op,yards=getYards(op);
  const screen=h('div',{className:'screen'});
  screen.appendChild(renderSummaryPanel(op));

  // ── Search bar ──
  const searchWrap=h('div',{style:{position:'relative',marginBottom:'14px'}});
  const searchInp=h('input',{type:'text',placeholder:'Search yards…',style:{display:'block',width:'100%',padding:'9px 10px 9px 34px',border:'.5px solid #ddd',borderRadius:'20px',fontSize:'14px',background:'#fff',boxSizing:'border-box'}});
  searchWrap.appendChild(h('div',{style:{position:'absolute',left:'11px',top:'50%',transform:'translateY(-50%)',fontSize:'14px',color:'#bbb',pointerEvents:'none'}},'⌕'));
  searchWrap.appendChild(searchInp);
  const clearBtn=h('button',{style:{position:'absolute',right:'10px',top:'50%',transform:'translateY(-50%)',background:'none',border:'none',fontSize:'18px',color:'#bbb',cursor:'pointer',display:'none',padding:'0',lineHeight:'1'}},'×');
  searchWrap.appendChild(clearBtn);
  screen.appendChild(searchWrap);

  const resultsContainer=h('div',null);
  screen.appendChild(resultsContainer);

  function renderYards(query){
    resultsContainer.innerHTML='';
    const q=(query||'').toLowerCase().trim();
    let anyResults=false;
    Object.entries(yards).forEach(([batchName,batchData])=>{
      const matchingSites=batchData.sites.filter(site=>!q||site.toLowerCase().includes(q)||batchName.toLowerCase().includes(q));
      if(!matchingSites.length) return;
      anyResults=true;
      const section=h('div',{style:{marginBottom:'18px'}});
      section.appendChild(h('div',{style:{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'#888',marginBottom:'7px',paddingLeft:'2px'}},batchName,batchData.type==='standalone'?h('span',{style:{color:'#bbb',fontWeight:'400'}},' · single site'):null));
      matchingSites.forEach(site=>{
        const allE=Object.entries(ROUNDS).map(([rk,r])=>{const list=STATE.entries[eKey(op,site,rk)]||[];return list.length?{roundDef:r,entry:list[0]}:null;}).filter(Boolean);
        const latest=allE.sort((a,b)=>b.entry.date.localeCompare(a.entry.date))[0]||null;
        const days=latest?daysBetween(latest.entry.date):null;
        const overdue=!latest||days>21;
        const bd=STATE.entries[eKey(op,site,'spring')]?.[0]?.score_breakdown||{};
        let at=0,ac=0;[0,1,2,3,4,5,6].forEach(n=>{const v=parseInt(bd[n]);if(!isNaN(v)&&v>0){at+=n*v;ac+=v;}});
        const avg=ac>0?Math.round(at/ac):null;
        // Skip movement-only entries for overview
        const allEFiltered=allE.filter(x=>!x.entry._movement);
        const latestReal=allEFiltered.sort((a,b)=>b.entry.date.localeCompare(a.entry.date))[0]||null;
        const card=h('div',{className:'card'+(overdue?' overdue':''),style:{position:'relative',overflow:'hidden',flexDirection:'column',alignItems:'stretch'},onClick:()=>setState({tab:'diary',run:batchName,site,diaryView:'entries',round:STATE.round})});
        if(overdue)card.appendChild(h('div',{className:'flag-tag'},!latestReal?'NOT VISITED':`${days}d AGO`));
        const row=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
        const left=h('div',{style:{flex:'1',paddingRight:'8px'}});
        // Bigger site name
        left.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'3px',color:'#1a1a1a'}},site));
        if(latestReal){
          left.appendChild(h('div',{style:{fontSize:'12px',color:'#777',marginBottom:'4px'}},latestReal.roundDef.short+' · '+fmtDate(latestReal.entry.date)+(!overdue&&days!==null?' · '+days+'d ago':'')));
          // Show all filled fields from last entry
          const e=latestReal.entry;

        const flag=getFlag(op,site);

function calcBatchSummary(op, batch, sites){
  let hives=0,dead=0,alive=0,singles=0,doubles=0,light=0;
  let fdOn=0,on34=0,hcFdOn=0,hcHdOn=0;
  let fdHarv=0,harv34=0;
  let breeders=0,finishers=0;
  let flagCount=0,checkCount=0;
  const lv=(site,k)=>{
    const allE=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).filter(e=>!e._movement)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    for(const e of allE){const v=parseInt(e[k]);if(!isNaN(v)&&v>0)return v;}return 0;
  };
  sites.forEach(site=>{
    hives+=lv(site,'hives');dead+=lv(site,'dead');alive+=lv(site,'alive_hives');
    singles+=lv(site,'singles');doubles+=lv(site,'doubles');light+=lv(site,'light');
    fdOn+=lv(site,'fd_on');on34+=lv(site,'on_34');
    hcFdOn+=lv(site,'honeycomb_fd');hcHdOn+=lv(site,'honeycomb_hd');
    fdHarv+=lv(site,'fd_harv');harv34+=lv(site,'harv_34');
    const sp=STATE.entries[eKey(op,site,'spring')]?.find(e=>!e._movement);
    breeders+=parseInt(sp?.breeders)||0;
    finishers+=parseInt(sp?.finishers)||0;
    if(getFlag(op,site)) flagCount++;
    if(getCheck(op,site)) checkCount++;
  });
  return{hives,dead,alive,singles,doubles,light,fdOn,on34,hcFdOn,hcHdOn,fdHarv,harv34,breeders,finishers,flagCount,checkCount};
}

  data.sites.forEach(site=>{
    // Gather all real entries across rounds, newest first
    const allReal=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).filter(e=>!e._movement).map(e=>({...e,_rk:rk}))).sort((a,b)=>{const dc=(b.date||'').localeCompare(a.date||'');return dc!==0?dc:(b.saved_at||'').localeCompare(a.saved_at||'');});
    const latest=allReal[0]||null;
    const days=latest?daysBetween(latest.date):null;
    const overdue=!latest||days>21;

    // Field lookup — most recent non-zero value across all entries
    const HIVE_FIELDS2=['hives','dead','singles','doubles','light','alive_hives','dead_hives'];
    const lv=k=>{
      for(const e of allReal){
        const raw=e[k];
        if(raw===undefined||raw===null||raw==='') continue;
        const v=parseInt(raw);
        if(!isNaN(v)){
          if(HIVE_FIELDS2.includes(k)) return v;
          if(v>0) return v;
        }
      }
      return 0;
    };

    // Spring score
    const springEntries=STATE.entries[eKey(op,site,'spring')]?.filter(e=>!e._movement)||[];
    const bd=springEntries[0]?.score_breakdown||{};
    let at=0,ac=0;[0,1,2,3,4,5,6].forEach(n=>{const v=parseInt(bd[n]);if(!isNaN(v)&&v>0){at+=n*v;ac+=v;}});
    const avg=ac>0?Math.round(at/ac):null;

    // Movement-adjusted hive count
    // Only count movements AFTER the most recent diary entry date
    const allMovs=loadMovements();
    const latestDiaryDate=allReal[0]?.date||'';
    let movNet=0;
    allMovs.forEach(m=>{
      // Skip movements on or before the latest diary entry — already baked into that count
      if(latestDiaryDate&&m.date<latestDiaryDate) return; // movements on same date as diary still count
      const mh=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
      if(m.direction==='to_orchard'&&m.from_site===site) movNet-=mh;
      else if(m.direction==='from_orchard'&&m.to_site===site) movNet+=mh;
      else if(m.direction==='yard_yard'&&m.from_site===site) movNet-=mh;
      else if(m.direction==='yard_yard'&&m.to_site===site) movNet+=mh;
    });
    const baseH=lv('hives');
    const movEntryH=parseInt(Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).filter(e=>e._movement))[0]?.hives)||0;
    const currentHives=allReal.length>0?Math.max(0,baseH+movNet):movNet>0?movNet:movEntryH>0?movEntryH:0;

    const flag=getFlag(op,site);
    const chk=getCheck(op,site);

    // Card
    const card=h('div',{style:{background:'#fff',border:`1.5px solid ${overdue?'#f4a0a0':flag?'#ef9f27':chk?'#6ab0e0':'#e0e0de'}`,borderRadius:'12px',marginBottom:'8px',overflow:'hidden'}});

    // Header row — always visible, tap to navigate
    const header=h('div',{style:{padding:'11px 13px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'},
      onClick:()=>setState({site,diaryView:'entries'})});
    const hLeft=h('div',{style:{flex:'1'}});
    hLeft.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',color:'#1a1a1a',marginBottom:'2px'}},site));
    if(latest){
      hLeft.appendChild(h('div',{style:{fontSize:'12px',color:'#888'}},ROUNDS[latest._rk].short+' · '+fmtDate(latest.date)));
    } else {
      hLeft.appendChild(h('div',{style:{fontSize:'12px',color:'#bbb'}},'Not visited'));
    }
    // Days badge goes under site name, not in right column
    if(overdue&&!latest){
      hLeft.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#e24b4a',background:'#fde8e8',borderRadius:'10px',padding:'2px 7px',display:'inline-block',marginTop:'2px'}},'NOT VISITED'));
    } else if(overdue){
      hLeft.appendChild(h('span',{style:{fontSize:'10px',fontWeight:'700',color:'#e24b4a',background:'#fde8e8',borderRadius:'10px',padding:'2px 7px',display:'inline-block',marginTop:'2px'}},days+'d ago'));
    }
    const hRight=h('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexShrink:'0',marginLeft:'8px'}});
    if(avg!==null) hRight.appendChild(scoreCircle(avg,24,11));
    header.appendChild(hLeft);header.appendChild(hRight);
    card.appendChild(header);

    // Detail body — always visible
    const body=h('div',{style:{padding:'0 13px 12px',borderTop:'.5px solid #f0f0ee'}});

    if(latest||currentHives>0){
      // Hive tiles
      const deadVal=lv('dead_hives')||lv('dead');
      const hiveItems=[
        {l:'Hives',v:currentHives,show:currentHives>0,bold:true},
        {l:'Dead',v:deadVal,show:currentHives>0,red:deadVal>0},
        {l:'Alive',v:lv('alive_hives'),show:lv('alive_hives')>0,green:true},
        {l:'Singles',v:lv('singles'),show:lv('singles')>0},
        {l:'Doubles',v:lv('doubles'),show:lv('doubles')>0},
        {l:'Light',v:lv('light'),show:lv('light')>0},
      ].filter(x=>x.show);
      if(hiveItems.length){
        const hRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginTop:'10px',marginBottom:'6px'}});
        hiveItems.forEach(f=>hRow.appendChild(h('span',{style:{fontSize:'13px',fontWeight:'700',color:f.red?'#c0392b':f.green?'#3d7a4f':'#333',background:f.red?'#fde8e8':f.green?'#e6f2eb':'#f5f5f3',borderRadius:'6px',padding:'3px 8px'}},f.v+' '+f.l)));
        body.appendChild(hRow);
      }
      // Boxes on
      const boxOn=[{l:'FD on',v:lv('fd_on')},{l:'3/4 on',v:lv('on_34')},{l:'HC FD',v:lv('honeycomb_fd')},{l:'HC ½',v:lv('honeycomb_hd')}].filter(x=>x.v>0);
      if(boxOn.length){
        const bRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'6px'}});
        boxOn.forEach(f=>bRow.appendChild(h('span',{style:{fontSize:'12px',color:'#555',background:'#f0f0ee',borderRadius:'6px',padding:'2px 7px'}},f.v+' '+f.l)));
        body.appendChild(bRow);
      }
      // Boxes harvested
      const boxHarv=[{l:'FD Harv',v:lv('fd_harv')},{l:'3/4 Harv',v:lv('harv_34')}].filter(x=>x.v>0);
      if(boxHarv.length){
        const hRow2=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'6px'}});
        boxHarv.forEach(f=>hRow2.appendChild(h('span',{style:{fontSize:'12px',color:'#b05a1a',background:'#faeeda',borderRadius:'6px',padding:'2px 7px'}},f.v+' '+f.l)));
        body.appendChild(hRow2);
      }
      // Breeders / Finishers
      const sp=springEntries[0];
      const br=parseInt(sp?.breeders)||0,fi=parseInt(sp?.finishers)||0;
      if(br>0||fi>0){
        const qRow=h('div',{style:{display:'flex',gap:'6px',marginBottom:'6px'}});
        if(br>0)qRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'700',color:'#7a4fa8',background:'#f3e8ff',borderRadius:'6px',padding:'2px 8px'}},br+' Breeder'+(br!==1?'s':'')));
        if(fi>0)qRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'700',color:'#3d7a4f',background:'#e6f2eb',borderRadius:'6px',padding:'2px 8px'}},fi+' Finisher'+(fi!==1?'s':'')));
        body.appendChild(qRow);
      }
      // Treatment
      const tx=allReal.find(e=>e.treatment)?.treatment;
      if(tx) body.appendChild(h('div',{style:{fontSize:'12px',color:'#9b59b6',fontWeight:'600',marginBottom:'4px'}},'Tx: '+tx));
      // Latest comment — skip if it's the same as the flag (avoid duplication)
      if(latest?.comments&&latest.comments!==flag?.comment){
        body.appendChild(h('div',{style:{fontSize:'12px',color:'#555',background:'#f8f8f6',borderRadius:'5px',padding:'5px 8px',marginBottom:'6px'}},latest.comments));
      }
    } else {
      body.appendChild(h('div',{style:{fontSize:'13px',color:'#bbb',padding:'8px 0'}},'No entries yet'));
    }

    // Flag / check
    if(flag){
      const fb=h('div',{style:{background:'#fff8e6',border:'1px solid #ef9f27',borderRadius:'6px',padding:'5px 8px',fontSize:'12px',color:'#b07800',cursor:'pointer',marginBottom:'4px',display:'flex',gap:'5px'}},
        h('span',{style:{fontWeight:'700'}},'!'),h('span',null,flag.comment));
      fb.addEventListener('click',e=>{e.stopPropagation();showFlagModal(op,site);});
      body.appendChild(fb);
    }
    if(chk){
      const cb=h('div',{style:{background:'#e8f4fd',border:'1px solid #6ab0e0',borderRadius:'6px',padding:'5px 8px',fontSize:'12px',color:'#1a6fb0',cursor:'pointer',display:'flex',gap:'5px'}},
        h('span',{style:{fontWeight:'700'}},'✓'),h('span',null,chk.note));
      cb.addEventListener('click',e=>{e.stopPropagation();showCheckModal(op,site);});
      body.appendChild(cb);
    }

    // Clicking the site name / left side navigates
    hLeft.addEventListener('click',()=>setState({site,diaryView:'entries'}));

    card.appendChild(body);
    wrap.appendChild(card);
  });
  return wrap;
}

function renderEntriesList(){
  const op=STATE.op,site=STATE.site;
  const opData=OPERATIONS[op];
  // Gather ALL entries across all rounds, tag with round, sort newest first
  const allEntries=[];
  Object.entries(ROUNDS).forEach(([rk,rd])=>{
    const list=STATE.entries[eKey(op,site,rk)]||[];
    list.forEach((entry,idx)=>allEntries.push({entry,rk,rd,idx}));
  });
  allEntries.sort((a,b)=>(b.entry.date||'').localeCompare(a.entry.date||''));

  // Real entries only (no movement auto-entries)
  const realEntries=allEntries.filter(x=>!x.entry._movement);

  const wrap=h('div',null);

  // ── Yard summary panel ──
  // Build entries list: attach original array index so we can use it as tiebreaker
  // (entries are stored newest-first, so lower index = more recently saved)
  const allSiteEntries=Object.keys(ROUNDS).flatMap(rk=>
    (STATE.entries[eKey(op,site,rk)]||[]).filter(e=>!e._movement).map((e,i)=>({...e,_arrIdx:i}))
  ).sort((a,b)=>{
    // Primary: date DESC (YYYY-MM-DD sorts correctly as string)
    const dc=(b.date||'').localeCompare(a.date||'');
    if(dc!==0) return dc;
    // Tiebreaker 1: saved_at DESC
    const sc=(b.saved_at||'').localeCompare(a.saved_at||'');
    if(sc!==0) return sc;
    // Tiebreaker 2: array index ASC (lower index = newer in storage)
    return a._arrIdx-b._arrIdx;
  });
  const HIVE_FIELDS3=['hives','dead','singles','doubles','light','alive_hives','dead_hives'];
  // For hive count fields: use the single most recent entry by date (then saved_at)
  // All hive fields come from that one entry as a snapshot — no mixing across entries
  const lv=k=>{
    if(HIVE_FIELDS3.includes(k)){
      // Use value from most recent entry only — don't fall back to older entries
      if(allSiteEntries[0]){
        const raw=allSiteEntries[0][k];
        if(raw!==undefined&&raw!==null&&raw!=='') return parseInt(raw)||0;
      }
      return 0;
    }
    // For non-hive fields (boxes etc): fall back to last non-zero across all entries
    for(const e of allSiteEntries){
      const raw=e[k];
      if(raw===undefined||raw===null||raw==='') continue;
      const v=parseInt(raw);
      if(!isNaN(v)&&v>0) return v;
    }
    return 0;
  };
  const latestReal=allSiteEntries[0]||null;
  const days=latestReal?daysBetween(latestReal.date):null;

  // Calculate current hive count:
  // 1. Use most recent real diary entry hive count as base
  // 2. Also check movement diary entries (_movement:true) for hive count
  // 3. Adjust by net movements logged in hive movements log
  const allMovements=loadMovements();
  // Only count movements AFTER the most recent diary entry — earlier ones are baked in
  const latestDiaryDate2=allSiteEntries[0]?.date||'';
  let movementNet=0;
  allMovements.forEach(m=>{
    if(latestDiaryDate2&&m.date<latestDiaryDate2) return; // movements on same date as diary still count
    const hives=parseInt(m.hives)||((parseInt(m.pallets)||0)*4+(m.half_pallet?2:0)+(parseInt(m.singles)||0));
    if(m.direction==='to_orchard'&&m.from_site===site) movementNet-=hives;
    else if(m.direction==='from_orchard'&&m.to_site===site) movementNet+=hives;
    else if(m.direction==='yard_yard'&&m.from_site===site) movementNet-=hives;
    else if(m.direction==='yard_yard'&&m.to_site===site) movementNet+=hives;
  });
  const baseHives=lv('hives');
  // Also check movement diary entries for hive count (these have _movement:true)
  const movementEntries=Object.keys(ROUNDS).flatMap(rk=>(STATE.entries[eKey(op,site,rk)]||[]).filter(e=>e._movement)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const latestMovementHives=parseInt(movementEntries[0]?.hives)||0;
  // Use whichever source gives us data
  let currentHives=0;
  if(latestReal) currentHives=Math.max(0,baseHives+movementNet); // use diary entry (even if 0) + net movements
  else if(latestMovementHives>0) currentHives=latestMovementHives;
  else if(movementNet>0) currentHives=movementNet;
  const hasMovement=movementNet!==0||latestMovementHives>0;

  // Spring score avg
  const bd=STATE.entries[eKey(op,site,'spring')]?.find(e=>!e._movement)?.score_breakdown||{};
  let at=0,ac=0;[0,1,2,3,4,5,6].forEach(n=>{const v=parseInt(bd[n]);if(!isNaN(v)&&v>0){at+=n*v;ac+=v;}});
  const avg=ac>0?Math.round(at/ac):null;

  const summaryPanel=h('div',{style:{background:opData.color,borderRadius:'12px',padding:'13px 14px',marginBottom:'14px'}});
  // Large site name
  summaryPanel.appendChild(h('div',{style:{fontSize:'22px',fontWeight:'800',color:'#fff',letterSpacing:'-.02em',marginBottom:'4px'}},site));
  // Last visited
  summaryPanel.appendChild(h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'10px'}},
    latestReal?'Last visit: '+fmtDate(latestReal.date)+(days!==null?' · '+days+'d ago':''):(currentHives>0?'No diary entries yet':'Not yet visited')));

  if(latestReal||currentHives>0){
    // Hive counts row — use movement-adjusted count for hives
    const deadVal=lv('dead_hives')||lv('dead');
    const hiveCounts=[
      {l:'Hives',v:currentHives,show:currentHives>0,bright:hasMovement},
      {l:'Alive',v:lv('alive_hives'),show:lv('alive_hives')>0,green:true},
      {l:'Dead',v:deadVal,show:currentHives>0||deadVal>0,red:deadVal>0},  // always show Dead if hives present
      {l:'Singles',v:lv('singles'),show:lv('singles')>0},
      {l:'Doubles',v:lv('doubles'),show:lv('doubles')>0},
      {l:'Light',v:lv('light'),show:lv('light')>0},
    ].filter(x=>x.show);
    if(hiveCounts.length){
      const hRow=h('div',{style:{display:'grid',gridTemplateColumns:`repeat(${Math.min(hiveCounts.length,4)},1fr)`,gap:'6px',marginBottom:'8px'}});
      hiveCounts.forEach(f=>{
        hRow.appendChild(h('div',{style:{background:f.bright?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.1)',borderRadius:'7px',padding:'7px 4px',textAlign:'center',border:f.bright?'1px solid rgba(255,255,255,0.4)':'none'}},
          h('div',{style:{fontSize:'18px',fontWeight:'800',color:f.red?'#f4a0a0':f.green?'#7ecb8f':'#fff',lineHeight:'1.1'}},f.v),
          h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'.04em',marginTop:'2px'}},f.l)
        ));
      });
      summaryPanel.appendChild(hRow);
    }
    // Boxes on row
    const boxes=[
      {l:'FD on',v:lv('fd_on'),show:lv('fd_on')>0},
      {l:'3/4 on',v:lv('on_34'),show:lv('on_34')>0},
      {l:'HC FD',v:lv('honeycomb_fd'),show:lv('honeycomb_fd')>0},
      {l:'HC ½',v:lv('honeycomb_hd'),show:lv('honeycomb_hd')>0},
    ].filter(x=>x.show);
    if(boxes.length){
      const bRow=h('div',{style:{display:'grid',gridTemplateColumns:`repeat(${Math.min(boxes.length,4)},1fr)`,gap:'6px',marginBottom:'8px'}});
      boxes.forEach(f=>{
        bRow.appendChild(h('div',{style:{background:'rgba(255,255,255,0.07)',borderRadius:'7px',padding:'6px 4px',textAlign:'center'}},
          h('div',{style:{fontSize:'16px',fontWeight:'700',color:'#fff',lineHeight:'1.1'}},f.v),
          h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:'.04em',marginTop:'2px'}},f.l)
        ));
      });
      summaryPanel.appendChild(bRow);
    }
    // Extra fields row — pol pallets, part pallets, carrot, check, QR etc
    const extras=[
      {l:'POL pallet',v:lv('pol_pallet'),show:lv('pol_pallet')>0},
      {l:'Part pallet',v:lv('part_pallet'),show:lv('part_pallet')>0},
      {l:'Pol singles',v:lv('pol_singles'),show:lv('pol_singles')>0},
      {l:'Carrot pal',v:lv('carrot'),show:lv('carrot')>0},
      {l:'Check',v:lv('check'),show:lv('check')>0},
      {l:'QR',v:lv('qr'),show:lv('qr')>0},
      {l:'Virgin',v:lv('virgin'),show:lv('virgin')>0},
      {l:'Splits',v:lv('splits'),show:lv('splits')>0},
      {l:'Tops',v:lv('tops'),show:lv('tops')>0},
      {l:'FD Harv',v:lv('fd_harv'),show:lv('fd_harv')>0},
      {l:'3/4 Harv',v:lv('harv_34'),show:lv('harv_34')>0},
      {l:'HC FD Harv',v:lv('honeycomb_fd'),show:false}, // already in boxes
      {l:'HC ½ Harv',v:lv('honeycomb_hd'),show:false},
    ].filter(x=>x.show);
    if(extras.length){
      const eRow=h('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'8px'}});
      extras.forEach(f=>{
        eRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'600',color:'rgba(255,255,255,0.85)',background:'rgba(255,255,255,0.1)',borderRadius:'6px',padding:'3px 8px'}},f.v+' '+f.l));
      });
      summaryPanel.appendChild(eRow);
    }
    // Spring score circle
    if(avg!==null){
      summaryPanel.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'4px'}},
        h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:'.05em'}},'Spring score avg'),
        scoreCircle(avg,28,13)
      ));
    }
    // Treatment
    const tx=allSiteEntries.find(e=>e.treatment)?.treatment;
    if(tx) summaryPanel.appendChild(h('div',{style:{fontSize:'12px',color:'#c39bd3',marginTop:'6px','fontWeight':'600'}},'Tx: '+tx));
  }
  wrap.appendChild(summaryPanel);

  // Flag if present (urgent — amber)
  const flag=getFlag(op,site);
  if(flag){
    const fb=h('div',{style:{background:'#fff8e6',border:'1px solid #ef9f27',borderRadius:'8px',padding:'8px 12px',marginBottom:'6px',cursor:'pointer',display:'flex',gap:'6px',alignItems:'flex-start'}},
      h('span',{style:{fontWeight:'700',color:'#ef9f27',flexShrink:'0'}},'!'),h('span',{style:{fontSize:'13px',color:'#b07800'}},flag.comment));
    fb.addEventListener('click',()=>showFlagModal(op,site));
    wrap.appendChild(fb);
  }
  // Check reminder (less urgent — blue)
  const chkYard=getCheck(op,site);
  if(chkYard){
    const cb=h('div',{style:{background:'#e8f4fd',border:'1px solid #6ab0e0',borderRadius:'8px',padding:'8px 12px',marginBottom:'10px',cursor:'pointer',display:'flex',gap:'6px',alignItems:'flex-start'}},
      h('span',{style:{fontWeight:'700',color:'#1a6fb0',flexShrink:'0'}},'✓'),h('span',{style:{fontSize:'13px',color:'#1a6fb0'}},chkYard.note));
    cb.addEventListener('click',()=>showCheckModal(op,site));
    wrap.appendChild(cb);
  }

  const topRow=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}});
  topRow.appendChild(h('div',{className:'section-label',style:{marginBottom:'0'}},realEntries.length===0?'No entries':`${realEntries.length} entr${realEntries.length===1?'y':'ies'}`));
  topRow.appendChild(h('button',{style:{background:opData.color,color:'#fff',border:'none',borderRadius:'20px',padding:'7px 14px',fontSize:'13px',fontWeight:'700',cursor:'pointer'},
    onClick:()=>setState({diaryView:'round-picker'})},'+ New entry'));
  wrap.appendChild(topRow);

  if(!allEntries.length){wrap.appendChild(h('div',{className:'empty-msg'},"Tap '+ New entry' to log a visit"));return wrap;}

  allEntries.forEach(({entry,rk,rd,idx})=>{
    const bd=entry.score_breakdown||{};
    const hasScores=Object.values(bd).some(v=>v!==''&&v!==undefined&&v!==null);
    let at=0,ac=0;[0,1,2,3,4,5,6].forEach(n=>{const v=parseInt(bd[n]);if(!isNaN(v)&&v>0){at+=n*v;ac+=v;}});
    const avg=ac>0?Math.round(at/ac):null;
    const ec=h('div',{style:{background:'#fff',border:`.5px solid ${rd.color}33`,borderLeft:`3px solid ${rd.color}`,borderRadius:'10px',marginBottom:'8px',overflow:'hidden'}});
    const hdr=h('div',{className:'entry-header'});

    hl.appendChild(h('span',{style:{fontSize:'11px',background:rd.bg||'#eee',color:rd.color,borderRadius:'10px',padding:'2px 8px',fontWeight:'600'}},rd.label));
    if(entry.hives)hl.appendChild(h('span',{style:{fontSize:'13px',color:'#666'}},entry.hives+' hives'));
    if(entry.treatment)hl.appendChild(h('span',{style:{fontSize:'11px',background:'#f3e8ff',color:'#7a4fa8',borderRadius:'10px',padding:'2px 7px',fontWeight:'600'}},'Tx: '+entry.treatment));
    if(entry.logged_by)hl.appendChild(h('span',{style:{fontSize:'11px',color:'#bbb'}},entry.logged_by+(entry.edited_by?' · edited by '+entry.edited_by:'')));
    if(rk==='spring'&&avg!==null)hl.appendChild(scoreCircle(avg,22,11));
    // Carrot score avg in header

    inp.addEventListener('input',e=>vals[f.k]=e.target.value);

  });
  box.appendChild(grid);

  const btnRow=h('div',{style:{display:'flex',gap:'10px'}});
  btnRow.appendChild(h('button',{style:{flex:'1',padding:'12px',background:'#9b59b6',color:'#fff',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'700',cursor:'pointer'},
    onClick:async()=>{
      // Update movement in list
      const newMov={...m,...vals};
      const updated=loadMovements().map(x=>x.id===m.id?newMov:x);
      saveMovements(updated);
      await pushToSupabase('hive_movements',updated);

      // Update the matching auto-generated diary entry in the yard
      // Find and update the _movement diary entry that matches this movement
      async function updateMovDiaryEntry(opName, siteKey, oldDate, newMov2){
        if(!opName||!siteKey) return;
        const k=eKey(opName,siteKey,'spring');
        const existing=STATE.entries[k]||[];
        const entryIdx=existing.findIndex(e=>e._movement&&e.date===oldDate&&e.comments&&(
          e.comments.includes(m.to_orchard||'')||
          e.comments.includes(m.from_orchard||'')||
          e.comments.includes(m.to_site||'')||
          e.comments.includes(m.from_site||'')
        ));
        if(entryIdx===-1) return;
        // Rebuild the description with new values
        const hiveChange=((parseInt(newMov2.pallets)||0)*4+(newMov2.half_pallet?2:0)+(parseInt(newMov2.singles)||0));
        const truckStr=(parseInt(newMov2.pallets)||0)+(newMov2.half_pallet?'½':'')+'p'+(parseInt(newMov2.singles)>0?' + '+newMov2.singles+'s':'');
        const isOut=newMov2.direction==='to_orchard';
        const isYY=newMov2.direction==='yard_yard';
        let desc;
        if(isOut) desc=`MOVEMENT OUT: ${truckStr} → ${newMov2.to_orchard}`;
        else if(!isOut&&!isYY) desc=`MOVEMENT IN: ${truckStr} ← ${newMov2.from_orchard}`;
        else if(isYY&&siteKey===newMov2.from_site) desc=`MOVED OUT: ${truckStr} → ${newMov2.to_site}`;
        else desc=`MOVED IN: ${truckStr} ← ${newMov2.from_site}`;
        const updatedEntry={...existing[entryIdx],date:newMov2.date,comments:desc,saved_at:new Date().toISOString()};
        const updatedList=[...existing];
        updatedList[entryIdx]=updatedEntry;
        const updEntries={...STATE.entries,[k]:updatedList};
        saveLocal(updEntries);
        await pushToSupabase(k,updatedList);
        STATE.entries=updEntries;
      }
      const isOut=newMov.direction==='to_orchard';
      const isYY=newMov.direction==='yard_yard';
      if(isOut) await updateMovDiaryEntry(newMov.from_op,newMov.from_site,m.date,newMov);
      else if(!isOut&&!isYY) await updateMovDiaryEntry(newMov.to_op,newMov.to_site,m.date,newMov);
      else if(isYY){
        await updateMovDiaryEntry(newMov.from_op,newMov.from_site,m.date,newMov);
        await updateMovDiaryEntry(newMov.to_op,newMov.to_site,m.date,newMov);
      }

      overlay.remove();
      showToast('Movement updated');
      setState({tab:'history'});
    }
  },'Save changes'));
  btnRow.appendChild(h('button',{style:{flex:'1',padding:'12px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
    onClick:()=>overlay.remove()
  },'Cancel'));
  box.appendChild(btnRow);

  overlay.appendChild(box);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

    });

    // Vehicle
    const vehWrap=h('div',null);
    vehWrap.appendChild(h('label',{className:'lbl'},'Vehicle'));
    const vehSel=h('select',{style:{display:'block',width:'100%',padding:'9px 8px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'14px',background:'#fafafa',boxSizing:'border-box'}});

    vehSel.addEventListener('change',e=>loadVehicle.val=e.target.value);
    vehWrap.appendChild(vehSel);
    dvRow.appendChild(vehWrap);
    headerCard.appendChild(dvRow);

    headerCard.appendChild(h('label',{className:'lbl'},'Notes (optional)'));
    const ta=h('textarea',{rows:'2',placeholder:'e.g. Truck run 1',style:{display:'block',width:'100%',padding:'9px 10px',border:'.5px solid #ccc',borderRadius:'7px',fontSize:'15px',background:'#fafafa',resize:'vertical',boxSizing:'border-box'}});
    ta.addEventListener('input',e=>loadNotes.val=e.target.value);
    headerCard.appendChild(ta);
    wrap.appendChild(headerCard);

    const pickupContainer=h('div',null);
    wrap.appendChild(pickupContainer);
    const addPickupArea=h('div',null);
    wrap.appendChild(addPickupArea);

    function totalHivesForPickup(p){
      // If alive+dead hives entered, use that; otherwise estimate from pallets
      const alive=parseInt(p.alive_hives)||0;
      const dead=parseInt(p.dead_hives)||0;
      if(alive+dead>0) return alive+dead;
      return (parseInt(p.pallets)||0)*4+(p.half_pallet?2:0)+(parseInt(p.singles)||0);
    }
    function remaining(p){
      const used=(p.splits||[]).reduce((a,s)=>(a+(parseInt(s.hives)||0)),0);
      return Math.max(0,totalHivesForPickup(p)-used);
    }

    function renderPickups(){
      pickupContainer.innerHTML='';
      if(!pickups.length) return;
      const allDone=pickups.every(p=>remaining(p)===0);
      const totalSplits=pickups.reduce((a,p)=>a+(p.splits||[]).length,0);
      const anyUnassigned=pickups.some(p=>remaining(p)>0);

      // Each pickup card
      pickups.forEach(p=>{
        const rem=remaining(p);
        const isDone=rem===0;
        const totalHives=totalHivesForPickup(p);
        const assignedHives=totalHives-rem;
        const pct=totalHives>0?Math.round((assignedHives/totalHives)*100):0;

        rightDiv.appendChild(h('button',{style:{background:'none',border:'none',color:'#e24b4a',fontSize:'20px',cursor:'pointer',padding:'0',lineHeight:'1'},
          onClick:()=>confirmAction('Remove '+p.site+' from the truck?',()=>{const idx=pickups.findIndex(x=>x.id===p.id);if(idx>-1)pickups.splice(idx,1);rebuildAll();})
        },'×'));
        topRow.appendChild(rightDiv);
        card.appendChild(topRow);

        // Existing splits
        if((p.splits||[]).length>0){
          p.splits.forEach((s,si)=>{

            splitRow.appendChild(h('span',{style:{fontSize:'13px',color:'#333'}},`→ ${s.dest} — ${s.desc||((s.hives||0)+' hive'+((s.hives||0)!==1?'s':''))}`));

        // Add split form (inline, only if hives remaining)

            // Yard search for destination

          // Assignment input — toggle between hives or pallets+singles

          const splitInputArea=h('div',{style:{marginBottom:'6px'}});

          // Toggle button

          const splitHiveInp=h('input',{type:'number',inputmode:'numeric',min:'1',max:String(rem2),placeholder:String(rem2),style:{width:'100%',padding:'7px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
          splitHiveInp.value=rem2;
          hiveWrap.appendChild(splitHiveInp);
          splitInputArea.appendChild(hiveWrap);

          // Pallets+singles input (hidden by default)
          const psWrap=h('div',{style:{display:'none'}});

          const spInpWrap=h('div',null);

          spInpWrap.appendChild(splitPalInp);psGrid.appendChild(spInpWrap);

          let spHalf=false;
          spHalfBtn.addEventListener('click',()=>{spHalf=!spHalf;spHalfBtn.style.background=spHalf?movColor:'#fff';spHalfBtn.style.color=spHalf?'#fff':'#aaa';spHalfBtn.style.border=spHalf?`1.5px solid ${movColor}`:'1.5px solid #ddd';});
          spHalfWrap.appendChild(spHalfBtn);psGrid.appendChild(spHalfWrap);
          // Singles
          const ssSingWrap=h('div',null);
          ssSingWrap.appendChild(h('label',{style:{fontSize:'10px',color:'#9b59b6',textTransform:'uppercase',letterSpacing:'.04em',fontWeight:'700',display:'block',marginBottom:'3px'}},'Singles'));
          const splitSingInp=h('input',{type:'number',inputmode:'numeric',min:'0',placeholder:'0',style:{width:'100%',padding:'7px 8px',border:'1px solid #9b59b6',borderRadius:'6px',fontSize:'15px',background:'#fafafa',boxSizing:'border-box',fontWeight:'700'}});
          ssSingWrap.appendChild(splitSingInp);psGrid.appendChild(ssSingWrap);

          splitInputArea.appendChild(psWrap);

          toggleBtn.addEventListener('click',()=>{
            usePS=!usePS;

          });
          splitForm.appendChild(splitInputArea);

          // Helper to get hive count from current input mode
          function getSplitHives(){
            if(usePS){return(parseInt(splitPalInp.value)||0)*4+(spHalf?2:0)+(parseInt(splitSingInp.value)||0);}
            return parseInt(splitHiveInp.value)||0;
          }
          function getSplitDesc(){
            if(usePS){const p2=(parseInt(splitPalInp.value)||0)+(spHalf?'½':'');const s2=parseInt(splitSingInp.value)||0;return p2+'p'+(s2?' '+s2+'s':'');}
            return getSplitHives()+' hives';
          }

          const assignBtnRow=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}});
          // + Assign (split this pickup)
          assignBtnRow.appendChild(h('button',{style:{padding:'7px',background:'rgba(155,89,182,0.1)',border:'1px solid '+movColor,borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:movColor,cursor:'pointer'},
            onClick:()=>{
              const dest=(loadDirection.val==='yard_yard'||loadDirection.val==='from_orchard')?(destSel._selectedSite||''):destSel.value;
              if(!dest){showToast(loadDirection.val==='to_orchard'?'Select an orchard':'Select a yard site');return;}
              const sh=getSplitHives();
              if(!sh){showToast('Enter hives, pallets or singles for this split');return;}
              if(sh>remaining(p)){showToast(`Only ${remaining(p)} hives remaining to assign`);return;}
              const destOp=loadDirection.val==='yard_yard'?(destSel._selectedOp||''):(loadDirection.val==='from_orchard'?(Object.values(OPERATIONS['A2Bee'].yards).flatMap(y=>y.sites).includes(dest)?'A2Bee':'DH Alex'):'');
              if(!p.splits)p.splits=[];
              p.splits.push({dest,dest_op:destOp,hives:sh,desc:getSplitDesc()});
              renderPickups();
            }
          },'+ Assign'));
          // Assign ALL remaining pickups to same destination
          assignBtnRow.appendChild(h('button',{style:{padding:'7px',background:'rgba(155,89,182,0.05)',border:'1px dashed '+movColor,borderRadius:'6px',fontSize:'11px',fontWeight:'700',color:movColor,cursor:'pointer'},
            onClick:()=>{
              const dest=(loadDirection.val==='yard_yard'||loadDirection.val==='from_orchard')?(destSel._selectedSite||''):destSel.value;
              if(!dest){showToast(loadDirection.val==='to_orchard'?'Select an orchard':'Select a yard site');return;}
              const destOp=loadDirection.val==='yard_yard'?(destSel._selectedOp||''):(loadDirection.val==='from_orchard'?(Object.values(OPERATIONS['A2Bee'].yards).flatMap(y=>y.sites).includes(dest)?'A2Bee':'DH Alex'):'');
              // Assign ALL pickups with remaining hives to this destination
              pickups.forEach(pk=>{
                const r=remaining(pk);
                if(r<=0) return;
                if(!pk.splits)pk.splits=[];
                pk.splits.push({dest,dest_op:destOp,hives:r});
              });
              renderPickups();
            }
          },'Assign all → here'));
          splitForm.appendChild(assignBtnRow);
          card.appendChild(splitForm);
        }
        pickupContainer.appendChild(card);
      });

      // ── Truck total tile — sits below all pickups ──
      if(pickups.length>0){
        const totalPallets=pickups.reduce((a,p)=>a+(parseInt(p.pallets)||0),0);
        const totalHalfPallets=pickups.filter(p=>p.half_pallet).length;
        const totalSingles=pickups.reduce((a,p)=>a+(parseInt(p.singles)||0),0);
        const totalAlive=pickups.reduce((a,p)=>a+(parseInt(p.alive_hives)||0),0);
        const totalDead=pickups.reduce((a,p)=>a+(parseInt(p.dead_hives)||0),0);
        const totalHives=pickups.reduce((a,p)=>a+totalHivesForPickup(p),0);
        const assignedHives=pickups.reduce((a,p)=>a+(totalHivesForPickup(p)-remaining(p)),0);
        const unassignedHives=totalHives-assignedHives;
        const pct=totalHives>0?Math.round((assignedHives/totalHives)*100):0;

        const truckBar=h('div',{style:{background:'#2a1f3d',borderRadius:'10px',padding:'10px 14px',marginBottom:'10px'}});
        truckBar.appendChild(h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.45)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:'6px'}},'On truck · '+pickups.length+' pickup'+(pickups.length!==1?'s':'')));
        const spaceRow=h('div',{style:{display:'flex',gap:'8px',alignItems:'baseline',flexWrap:'wrap',marginBottom:(totalAlive>0||totalDead>0)?'6px':'4px'}});
        spaceRow.appendChild(h('span',{style:{fontSize:'22px',fontWeight:'800',color:'#fff',lineHeight:'1'}},totalPallets+(totalHalfPallets?'½':'')+'p'));
        if(totalSingles>0) spaceRow.appendChild(h('span',{style:{fontSize:'20px',fontWeight:'700',color:'rgba(255,255,255,0.7)',lineHeight:'1'}},totalSingles+'s'));
        spaceRow.appendChild(h('span',{style:{fontSize:'13px',color:'rgba(255,255,255,0.4)'}},'= '+totalHives+' hive'+(totalHives!==1?'s':'')));
        truckBar.appendChild(spaceRow);
        if(totalAlive>0||totalDead>0){
          const adRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'6px'}});
          if(totalAlive>0) adRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'700',color:'#7ecb8f',background:'rgba(255,255,255,0.08)',borderRadius:'6px',padding:'2px 8px'}},totalAlive+' alive'));
          if(totalDead>0) adRow.appendChild(h('span',{style:{fontSize:'12px',fontWeight:'700',color:'#f4a0a0',background:'rgba(255,255,255,0.08)',borderRadius:'6px',padding:'2px 8px'}},totalDead+' dead'));
          truckBar.appendChild(adRow);
        }
        if(totalHives>0){
          const progBar=h('div',{style:{width:'100%',height:'5px',background:'rgba(255,255,255,0.15)',borderRadius:'3px',overflow:'hidden',marginBottom:'4px'}});
          progBar.appendChild(h('div',{style:{width:pct+'%',height:'100%',background:allDone?'#7ecb8f':'#ef9f27',borderRadius:'3px'}}));
          truckBar.appendChild(progBar);
          truckBar.appendChild(h('div',{style:{fontSize:'11px',color:'rgba(255,255,255,0.45)'}},
            allDone?'All assigned ✓':`${assignedHives}/${totalHives} assigned · ${unassignedHives} remaining`));
        }
        pickupContainer.appendChild(truckBar);
      }

      // Save button — shown once all pickups have all hives assigned
      if(pickups.length>0){
        const allDone2=pickups.every(p=>remaining(p)===0&&(p.splits||[]).length>0);
        const anyAssigned=pickups.some(p=>(p.splits||[]).length>0);
        if(anyAssigned){
          const label=allDone2?`Save load (${totalSplits} movement${totalSplits!==1?'s':''})`:`${pickups.filter(p=>remaining(p)>0).length} pickup${pickups.filter(p=>remaining(p)>0).length!==1?'s':''} still unassigned`;
          pickupContainer.appendChild(h('button',{
            style:{width:'100%',padding:'13px',background:allDone2?movColor:'#aaa',color:'#fff',border:'none',borderRadius:'8px',fontSize:'15px',fontWeight:'700',cursor:'pointer',marginTop:'8px'},

              if(!allDone2){
                // Build a clear warning showing exactly which pickups have unassigned hives
                const probs=pickups.filter(p=>remaining(p)>0);
                const existing=document.getElementById('unassigned-warning');
                if(existing) existing.remove();
                const warn=h('div',{id:'unassigned-warning',style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'200',padding:'20px'}});
                const box=h('div',{style:{background:'#fff',borderRadius:'14px',padding:'20px',width:'100%',maxWidth:'340px'}});
                box.appendChild(h('div',{style:{fontWeight:'700',fontSize:'16px',marginBottom:'6px',color:'#c0392b'}},'Unassigned hives'));
                box.appendChild(h('div',{style:{fontSize:'13px',color:'#666',marginBottom:'12px'}},'The following pickups have hives not yet assigned to a destination:'));
                probs.forEach(p=>{
                  const rem2=remaining(p);
                  box.appendChild(h('div',{style:{background:'#fff8e6',border:'1px solid #ef9f27',borderRadius:'8px',padding:'8px 12px',marginBottom:'6px'}},
                    h('div',{style:{fontWeight:'700',fontSize:'14px'}},p.site),
                    h('div',{style:{fontSize:'13px',color:'#ef9f27',fontWeight:'600'}},`${rem2} hive${rem2!==1?'s':''} (${Math.floor(rem2/4)}p ${rem2%4}s) unassigned`)
                  ));
                });
                box.appendChild(h('div',{style:{fontSize:'12px',color:'#aaa',marginBottom:'14px'}},'Go back and assign them, or save anyway if the count was a mistake.'));
                const btnRow3=h('div',{style:{display:'flex',gap:'8px'}});
                btnRow3.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#f0f0ee',color:'#333',border:'none',borderRadius:'8px',fontSize:'14px',fontWeight:'600',cursor:'pointer'},
                  onClick:()=>warn.remove()},'Fix it'));
                btnRow3.appendChild(h('button',{style:{flex:'1',padding:'11px',background:'#c0392b',color:'#fff',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:'700',cursor:'pointer'},
                  onClick:async()=>{warn.remove();/* fall through to save */
                    const ts2=Date.now();let j=0;
                    for(const p of pickups){for(const s of (p.splits||[])){
                      const isOutMov2=loadDirection.val==='to_orchard';const isYYMov2=loadDirection.val==='yard_yard';
                      await addMovement({direction:loadDirection.val,date:loadDate.val,notes:loadNotes.val,driver:loadDriver.val,vehicle:loadVehicle.val,from_site:(isOutMov2||isYYMov2)?p.site:'',from_op:(isOutMov2||isYYMov2)?p.op:'',to_orchard:isOutMov2?s.dest:'',from_orchard:(!isOutMov2&&!isYYMov2)?p.site:'',to_site:(!isOutMov2)?s.dest:'',to_op:(!isOutMov2)?s.dest_op:'',pallets:s.pallets,singles:s.singles,logged_by:STATE.userName||'Unknown',id:ts2+(j++),truckload_id:ts2});
                    }}
                    showToast(`${totalSplits} movements saved`);setState({tab:'orchards'});
                  }},'Save anyway'));
                box.appendChild(btnRow3);
                warn.appendChild(box);
                warn.addEventListener('click',e=>{if(e.target===warn)warn.remove();});
                document.body.appendChild(warn);
                return;
              }
              const ts=Date.now();
              let i=0;
              for(const p of pickups){
                for(const s of (p.splits||[])){
                  const isOut=loadDirection.val==='to_orchard';
                  const isOutMov=loadDirection.val==='to_orchard';
                  const isYYMov=loadDirection.val==='yard_yard';
                  const isOOMov=loadDirection.val==='orchard_orchard';
                  const mov={
                    direction:loadDirection.val,
                    date:loadDate.val,
                    notes:loadNotes.val,
                    driver:loadDriver.val,
                    vehicle:loadVehicle.val,
                    from_site:(isOutMov||isYYMov)?p.site:'',
                    from_op:(isOutMov||isYYMov)?p.op:'',
                    to_orchard:(isOutMov||isOOMov)?s.dest:'',
                    from_orchard:(!isOutMov&&!isYYMov)?p.site:'',
                    from_yards:isOOMov?(p.from_yards||[]):[],
                    to_site:(!isOutMov&&!isOOMov)?s.dest:'',
                    to_op:(!isOutMov&&!isOOMov)?s.dest_op:'',
                    pallets:p.pallets,
                    singles:p.singles,
                    half_pallet:p.half_pallet||false,
                    alive_hives:p.alive_hives||'',
                    dead_hives:p.dead_hives||'',
                    hives:s.hives,
                    logged_by:STATE.userName||'Unknown',
                    id:ts+(i++),
                    truckload_id:ts
                  };
                  await addMovement(mov);

              showToast(`${totalSplits} movement${totalSplits!==1?'s':''} saved`);
              setState({tab:'orchards'});
            }
          },label));

    }

    // Builds an op→batch→site navigator, calls onSelect(site, opName) when done
    function makeYardSearch(container, onSelect, excludeSite){
      // Build flat list of all sites with batch AND op name
      const allSites=[];
      Object.entries(OPERATIONS).forEach(([opName,op])=>{
        Object.entries(getYards(opName)).forEach(([batchName,batch])=>{
          batch.sites.forEach(site=>{
            if(site!==excludeSite) allSites.push({site,batchName,opName});
          });
        });
      });
      allSites.sort((a,b)=>a.site.localeCompare(b.site));

      const wrap=h('div',{style:{marginBottom:'10px'}});

      const results=h('div',{style:{maxHeight:'220px',overflowY:'auto',borderRadius:'7px',border:'.5px solid #ddd',background:'#fff',display:'none'}});

      searchInp.addEventListener('input',()=>{
        const q=searchInp.value.trim().toLowerCase();
        results.innerHTML='';
        if(!q){results.style.display='none';return;}
        const matches=allSites.filter(x=>
          x.site.toLowerCase().includes(q)||
          x.batchName.toLowerCase().includes(q)||
          x.opName.toLowerCase().includes(q)
        );
        if(!matches.length){
          results.appendChild(h('div',{style:{padding:'10px',color:'#aaa',fontSize:'13px'}},'No yards found'));
        } else {
          matches.forEach(({site,batchName,opName})=>{
            const row=h('div',{style:{padding:'9px 12px',cursor:'pointer',borderBottom:'.5px solid #f0f0ee',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'8px'}});
